<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carte Design Gallery — 25 Variants</title>
<link href="https://fonts.googleapis.com/css2?family=Geologica:wght@700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080808;color:#fff;font-family:'Inter',sans-serif;min-height:100vh}
.page-header{max-width:1440px;margin:0 auto;padding:48px 36px 28px}
.page-header h1{font-family:'Geologica',sans-serif;font-weight:900;font-size:clamp(22px,2.8vw,34px);letter-spacing:-.03em;margin-bottom:8px}
.page-header h1 em{color:#14b8a6;font-style:normal}
.page-header p{font-size:13px;color:#484848;line-height:1.65;max-width:600px;margin-top:6px}
.legend{max-width:1440px;margin:0 auto;padding:16px 36px 20px;display:flex;gap:24px;flex-wrap:wrap;border-bottom:1px solid #111;align-items:center}
.legend-item{display:flex;align-items:center;gap:7px;font-size:10px;color:#3a3a3a;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.legend-swatch{width:7px;height:7px;border-radius:50%}
.legend-note{margin-left:auto;font-size:10px;color:#2a2a2a;font-style:italic}
.gallery{max-width:1440px;margin:0 auto;padding:32px 36px 80px;display:grid;grid-template-columns:repeat(5,1fr);gap:18px}
.group-label{grid-column:1/-1;display:flex;align-items:center;gap:14px;padding:16px 0 6px}
.group-label span{font-family:'Geologica',sans-serif;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.14em;color:#2a2a2a}
.group-label .line{flex:1;height:1px;background:#131313}
.card{cursor:pointer;transition:transform .18s}
.card:hover{transform:translateY(-3px)}
.card:hover .pf{box-shadow:0 24px 60px rgba(0,0,0,.75)!important}
.card.sel .pf{outline:2px solid var(--a);outline-offset:2px}
.pf{width:100%;aspect-ratio:.72;border-radius:10px;overflow:hidden;background:#0c0c0c;border:1px solid #161616;box-shadow:0 6px 24px rgba(0,0,0,.5);transition:box-shadow .18s}
.card-foot{padding:8px 2px 0;display:flex;align-items:center;gap:7px}
.cn{font-size:10px;font-weight:700;color:#222;font-family:'Geologica',sans-serif;width:18px;flex-shrink:0}
.nm{font-size:11px;font-weight:600;color:#777;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.ds{font-size:9px;color:#2c2c2c;padding:3px 2px 0;line-height:1.55}
@media(max-width:1100px){.gallery{grid-template-columns:repeat(4,1fr)}}
@media(max-width:800px){.gallery{grid-template-columns:repeat(3,1fr)}}
@media(max-width:540px){.gallery{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<div class="page-header">
  <h1>Carte Design Gallery <em>— 25 Variants</em></h1>
  <p>Five layout archetypes × five color themes. <strong style="color:#333">No score cards. No ranking sidebars.</strong> Short editorial prose, highlighted picks, callout boxes, info image pre-close, email CTA at bottom. Distinct from The Dish.</p>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-swatch" style="background:#14b8a6"></div>Teal</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#f59e0b"></div>Amber</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#6366f1"></div>Indigo</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#10b981"></div>Emerald</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#0ea5e9"></div>Sky</div>
  <div class="legend-note">Click to mark your pick →</div>
</div>

<div id="gallery" class="gallery"></div>

<script>
/* ──────────────────────────────────────────────────────────────────────────
   LAYOUT ARCHETYPES — all editorial / guide, no scorecard / ranking sidebar
   ────────────────────────────────────────────────────────────────────────── */

// I — SHORT PROSE
// Small hero strip · single narrow col · 2 paras · pill highlights (top picks) mid-content
// info image as full-width tinted panel PRE-CLOSE · last sentence · email CTA full banner
function lProse(a, a2, bg) {
  return `<div style="height:100%;background:${bg};display:flex;flex-direction:column;font-family:sans-serif">
    <div style="height:9px;background:#111;border-bottom:1px solid #191919;flex-shrink:0"></div>
    <div style="height:38px;background:linear-gradient(90deg,${a}18,transparent);border-bottom:1px solid ${a}20;padding:0 12px;display:flex;align-items:center;gap:8px;flex-shrink:0">
      <div style="flex:1"><div style="height:4px;width:52%;background:${a};border-radius:2px;margin-bottom:3px"></div><div style="height:2px;width:24%;background:#282828;border-radius:2px"></div></div>
    </div>
    <div style="height:36px;background:${a}0f;border-bottom:1px solid ${a}18;display:flex;align-items:center;justify-content:center;flex-shrink:0">
      <div style="font-size:6px;color:${a};opacity:.5;font-weight:700;letter-spacing:.1em">HERO IMAGE</div>
    </div>
    <div style="flex:1;padding:10px 14px 0;display:flex;flex-direction:column;overflow:hidden">
      <div style="height:3px;background:#222;border-radius:2px;margin-bottom:4px"></div>
      <div style="height:3px;background:#1d1d1d;border-radius:2px;margin-bottom:4px;width:90%"></div>
      <div style="height:3px;background:#1a1a1a;border-radius:2px;margin-bottom:8px;width:74%"></div>
      <div style="display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap">
        ${['Top Pick','Budget Find','Hidden Gem'].map(t=>`<div style="height:13px;padding:0 7px;background:${a}1a;border:1px solid ${a}30;border-radius:20px;display:flex;align-items:center"><div style="height:2px;width:${22+Math.random()*14|0}px;background:${a}70;border-radius:2px"></div></div>`).join('')}
      </div>
      <div style="height:3px;background:#1a1a1a;border-radius:2px;margin-bottom:4px"></div>
      <div style="height:3px;background:#171717;border-radius:2px;margin-bottom:4px;width:83%"></div>
      <div style="flex:1"></div>
      <div style="height:36px;background:${a}14;border-radius:5px;border:1px solid ${a}28;display:flex;align-items:center;justify-content:center;margin-bottom:6px;flex-shrink:0">
        <div style="font-size:6px;color:${a};font-weight:700;letter-spacing:.1em;opacity:.8">INFO IMAGE</div>
      </div>
      <div style="height:3px;background:#1a1a1a;border-radius:2px;margin-bottom:4px;width:76%"></div>
      <div style="height:24px;background:${a}1e;border:1px solid ${a}38;border-radius:6px;display:flex;align-items:center;justify-content:space-between;padding:0 9px;flex-shrink:0;margin-bottom:8px">
        <div style="height:2px;width:44%;background:${a}55;border-radius:2px"></div>
        <div style="height:12px;width:36px;background:${a};border-radius:20px"></div>
      </div>
    </div>
    <div style="padding:5px 12px 7px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px;flex-shrink:0">
      <div style="height:13px;background:#111;border-radius:3px"></div><div style="height:13px;background:#111;border-radius:3px"></div><div style="height:13px;background:#111;border-radius:3px"></div>
    </div>
  </div>`;
}

// II — DISH CARDS
// Short header · intro para · 3 horizontal dish cards (image thumb + name + 1-line desc) · info image before close · email CTA strip
function lDishCards(a, a2, bg) {
  return `<div style="height:100%;background:${bg};display:flex;flex-direction:column">
    <div style="height:9px;background:#111;border-bottom:1px solid #191919;flex-shrink:0"></div>
    <div style="height:42px;background:linear-gradient(135deg,${a}1c,transparent);border-bottom:1px solid ${a}22;padding:8px 13px;display:flex;flex-direction:column;justify-content:flex-end;gap:3px;flex-shrink:0">
      <div style="height:4px;width:44%;background:${a};border-radius:2px"></div>
      <div style="height:2px;width:26%;background:#282828;border-radius:2px"></div>
    </div>
    <div style="flex:1;padding:9px 13px 0;display:flex;flex-direction:column;overflow:hidden;gap:4px">
      <div style="height:3px;background:#222;border-radius:2px"></div>
      <div style="height:3px;background:#1d1d1d;border-radius:2px;width:82%"></div>
      <div style="height:3px;background:#1a1a1a;border-radius:2px;width:67%;margin-bottom:4px"></div>
      ${Array.from({length:3},(_,i)=>`
        <div style="display:flex;gap:7px;background:#111;border-radius:5px;border:1px solid #1c1c1c;padding:6px 7px;flex-shrink:0;align-items:center">
          <div style="width:28px;height:22px;background:${a}${i===0?'28':'18'};border-radius:3px;flex-shrink:0;border:1px solid ${a}${i===0?'40':'22'}"></div>
          <div style="flex:1">
            <div style="height:3px;width:${50+i*8}%;background:${i===0?a+'80':'#282828'};border-radius:2px;margin-bottom:3px"></div>
            <div style="height:2px;width:80%;background:#1e1e1e;border-radius:2px"></div>
          </div>
          ${i===0?`<div style="width:18px;height:9px;background:${a};border-radius:20px;flex-shrink:0"></div>`:''}
        </div>
      `).join('')}
      <div style="flex:1"></div>
      <div style="height:30px;background:${a}12;border-radius:5px;border:1px solid ${a}25;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-bottom:4px">
        <div style="font-size:6px;color:${a};font-weight:700;letter-spacing:.1em;opacity:.8">INFO IMAGE</div>
      </div>
      <div style="height:3px;background:#191919;border-radius:2px;width:72%;margin-bottom:4px"></div>
      <div style="height:22px;background:linear-gradient(90deg,${a}22,${a}10);border:1px solid ${a}30;border-radius:6px;display:flex;align-items:center;justify-content:space-between;padding:0 8px;flex-shrink:0;margin-bottom:8px">
        <div style="height:2px;width:38%;background:${a}50;border-radius:2px"></div>
        <div style="height:10px;width:32px;background:${a};border-radius:20px"></div>
      </div>
    </div>
    <div style="padding:4px 12px 6px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px;flex-shrink:0">
      <div style="height:12px;background:#111;border-radius:3px"></div><div style="height:12px;background:#111;border-radius:3px"></div><div style="height:12px;background:#111;border-radius:3px"></div>
    </div>
  </div>`;
}

// III — TWO-COL + QUICK FACTS
// Medium hero · two-col (prose left, "Quick Facts" right — neighborhoods, price, vibe) · info image left col pre-close · inline email CTA
function lTwoCol(a, a2, bg) {
  const facts = ['Neighborhood','Best For','Price Range','Hours'];
  return `<div style="height:100%;background:${bg};display:flex;flex-direction:column">
    <div style="height:9px;background:#111;border-bottom:1px solid #191919;flex-shrink:0"></div>
    <div style="height:36px;background:linear-gradient(90deg,${a}18,transparent);border-bottom:1px solid ${a}20;padding:0 12px;display:flex;align-items:center;flex-shrink:0">
      <div style="height:4px;width:40%;background:${a};border-radius:2px"></div>
      <div style="margin-left:auto;height:14px;width:34px;background:${a};border-radius:20px;opacity:.9"></div>
    </div>
    <div style="height:34px;background:${a}0e;border-bottom:1px solid ${a}16;display:flex;align-items:center;justify-content:center;flex-shrink:0">
      <div style="font-size:6px;color:${a};opacity:.5;letter-spacing:.1em;font-weight:700">HERO</div>
    </div>
    <div style="flex:1;padding:9px 12px;display:grid;grid-template-columns:62fr 38fr;gap:8px;overflow:hidden">
      <div style="display:flex;flex-direction:column;gap:3px;overflow:hidden">
        <div style="height:3px;background:#222;border-radius:2px"></div>
        <div style="height:3px;background:#1e1e1e;border-radius:2px;width:88%"></div>
        <div style="height:3px;background:#1b1b1b;border-radius:2px;width:72%;margin-bottom:5px"></div>
        <div style="height:3px;background:#1a1a1a;border-radius:2px"></div>
        <div style="height:3px;background:#171717;border-radius:2px;width:84%"></div>
        <div style="flex:1"></div>
        <div style="height:26px;background:${a}12;border-radius:4px;border:1px solid ${a}22;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-bottom:3px">
          <div style="font-size:5px;color:${a};font-weight:700;opacity:.8;letter-spacing:.08em">INFO IMAGE</div>
        </div>
        <div style="height:3px;background:#191919;border-radius:2px;width:70%;margin-bottom:4px"></div>
        <div style="height:20px;background:${a}18;border:1px solid ${a}2e;border-radius:5px;display:flex;align-items:center;justify-content:space-between;padding:0 7px;flex-shrink:0">
          <div style="height:2px;width:40%;background:${a}50;border-radius:2px"></div>
          <div style="height:10px;width:26px;background:${a};border-radius:20px"></div>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:3px">
        <div style="background:#0f0f0f;border:1px solid #1a1a1a;border-radius:6px;padding:7px 7px;flex-shrink:0">
          <div style="height:3px;width:55%;background:${a}60;border-radius:2px;margin-bottom:7px"></div>
          ${facts.map(f=>`<div style="margin-bottom:5px"><div style="height:2px;width:40%;background:#252525;border-radius:2px;margin-bottom:2px"></div><div style="height:2px;width:65%;background:#1e1e1e;border-radius:2px"></div></div>`).join('')}
        </div>
        <div style="background:#0f0f0f;border:1px solid ${a}20;border-radius:6px;padding:7px 7px;flex-shrink:0;margin-top:4px">
          <div style="height:2px;width:45%;background:${a}40;border-radius:2px;margin-bottom:5px"></div>
          <div style="display:flex;flex-wrap:wrap;gap:3px">
            ${['Italian','Date Night','Under $20'].map(t=>`<div style="height:10px;padding:0 5px;background:${a}18;border:1px solid ${a}28;border-radius:20px;display:flex;align-items:center"><div style="height:2px;width:${14+Math.random()*10|0}px;background:${a}60;border-radius:2px"></div></div>`).join('')}
          </div>
        </div>
      </div>
    </div>
    <div style="padding:4px 12px 6px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px;flex-shrink:0">
      <div style="height:12px;background:#111;border-radius:3px"></div><div style="height:12px;background:#111;border-radius:3px"></div><div style="height:12px;background:#111;border-radius:3px"></div>
    </div>
  </div>`;
}

// IV — NUMBERED LIST
// Short header · intro · numbered items 1-4 (each: bold dish name + 2-line desc + location tag) · info image between #2 and #3 · email CTA pill
function lNumbered(a, a2, bg) {
  return `<div style="height:100%;background:${bg};display:flex;flex-direction:column">
    <div style="height:9px;background:#111;border-bottom:1px solid #191919;flex-shrink:0"></div>
    <div style="height:48px;background:linear-gradient(160deg,${a}1c,transparent);border-bottom:1px solid ${a}22;padding:9px 13px 9px;display:flex;flex-direction:column;justify-content:flex-end;gap:3px;flex-shrink:0">
      <div style="height:2px;width:14%;background:${a}80;border-radius:2px"></div>
      <div style="height:5px;width:58%;background:#eee;border-radius:2px;opacity:.8"></div>
      <div style="height:3px;width:36%;background:#eee;border-radius:2px;opacity:.45"></div>
    </div>
    <div style="flex:1;padding:10px 13px 0;display:flex;flex-direction:column;overflow:hidden;gap:0">
      <div style="height:3px;background:#222;border-radius:2px;margin-bottom:3px"></div>
      <div style="height:3px;background:#1c1c1c;border-radius:2px;margin-bottom:8px;width:78%"></div>
      ${[0,1].map(i=>`
        <div style="display:flex;gap:7px;margin-bottom:7px;flex-shrink:0">
          <div style="width:18px;height:18px;border-radius:4px;background:${a};display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;color:#000;flex-shrink:0;font-family:sans-serif">${i+1}</div>
          <div style="flex:1">
            <div style="height:3px;width:60%;background:#ccc;border-radius:2px;margin-bottom:3px;opacity:.4"></div>
            <div style="height:2px;background:#1d1d1d;border-radius:2px;margin-bottom:2px"></div>
            <div style="height:2px;background:#191919;border-radius:2px;width:70%"></div>
            <div style="height:9px;padding:0 5px;background:${a}18;border-radius:20px;display:inline-flex;align-items:center;margin-top:3px;border:1px solid ${a}28">
              <div style="height:2px;width:22px;background:${a}60;border-radius:2px"></div>
            </div>
          </div>
        </div>
      `).join('')}
      <div style="height:26px;background:${a}12;border-radius:5px;border:1px solid ${a}22;display:flex;align-items:center;justify-content:center;margin-bottom:7px;flex-shrink:0">
        <div style="font-size:6px;color:${a};font-weight:700;letter-spacing:.1em;opacity:.8">INFO IMAGE</div>
      </div>
      ${[2,3].map(i=>`
        <div style="display:flex;gap:7px;margin-bottom:6px;flex-shrink:0">
          <div style="width:18px;height:18px;border-radius:4px;background:${a}28;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;color:${a};flex-shrink:0;font-family:sans-serif;border:1px solid ${a}40">${i+1}</div>
          <div style="flex:1">
            <div style="height:3px;width:50%;background:#252525;border-radius:2px;margin-bottom:3px"></div>
            <div style="height:2px;background:#1a1a1a;border-radius:2px;margin-bottom:2px"></div>
            <div style="height:2px;background:#171717;border-radius:2px;width:65%"></div>
          </div>
        </div>
      `).join('')}
      <div style="flex:1"></div>
      <div style="height:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-bottom:8px">
        <div style="height:16px;padding:0 14px;border:1px solid ${a}35;border-radius:20px;background:${a}0e;display:flex;align-items:center;gap:7px">
          <div style="height:2px;width:32px;background:${a}50;border-radius:2px"></div>
          <div style="height:10px;width:28px;background:${a};border-radius:20px;flex-shrink:0"></div>
        </div>
      </div>
    </div>
    <div style="padding:4px 12px 6px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px;flex-shrink:0">
      <div style="height:12px;background:#111;border-radius:3px"></div><div style="height:12px;background:#111;border-radius:3px"></div><div style="height:12px;background:#111;border-radius:3px"></div>
    </div>
  </div>`;
}

// V — MAGAZINE
// Tall hero (smaller than Dish) · pull stat box top · 2-para prose · horizontal photo-callout card · last sentence · email CTA card with input field visual
function lMagazine(a, a2, bg) {
  return `<div style="height:100%;background:${bg};display:flex;flex-direction:column">
    <div style="height:9px;background:#111;border-bottom:1px solid #191919;flex-shrink:0"></div>
    <div style="height:52px;background:linear-gradient(180deg,${a}22,${bg});padding:10px 13px;display:flex;flex-direction:column;justify-content:flex-end;gap:3px;flex-shrink:0;position:relative">
      <div style="height:2px;width:16%;background:${a}90;border-radius:2px"></div>
      <div style="height:5px;width:62%;background:#fff;border-radius:2px;opacity:.85"></div>
      <div style="height:3px;width:40%;background:#fff;border-radius:2px;opacity:.4"></div>
    </div>
    <div style="height:40px;background:${a}10;position:relative;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-top:1px solid ${a}18">
      <div style="font-size:6px;color:${a};opacity:.5;letter-spacing:.1em;font-weight:700">HERO — SMALLER THAN DISH</div>
    </div>
    <div style="flex:1;padding:9px 13px 0;display:flex;flex-direction:column;overflow:hidden">
      <div style="background:${a}16;border-left:3px solid ${a};border-radius:0 5px 5px 0;padding:6px 8px;margin-bottom:7px;flex-shrink:0">
        <div style="font-size:8px;color:${a};font-weight:700;margin-bottom:2px">47 dishes tested</div>
        <div style="height:2px;width:65%;background:${a}40;border-radius:2px"></div>
      </div>
      <div style="height:3px;background:#222;border-radius:2px;margin-bottom:3px"></div>
      <div style="height:3px;background:#1d1d1d;border-radius:2px;margin-bottom:3px;width:88%"></div>
      <div style="height:3px;background:#1a1a1a;border-radius:2px;margin-bottom:7px;width:70%"></div>
      <div style="display:flex;gap:7px;background:#111;border:1px solid #1c1c1c;border-radius:6px;padding:6px 7px;flex-shrink:0;margin-bottom:7px;align-items:center">
        <div style="width:32px;height:26px;background:${a}20;border-radius:3px;border:1px solid ${a}30;flex-shrink:0;display:flex;align-items:center;justify-content:center">
          <div style="font-size:5px;color:${a};opacity:.7">IMG</div>
        </div>
        <div style="flex:1">
          <div style="height:3px;background:#2a2a2a;border-radius:2px;margin-bottom:3px;width:65%"></div>
          <div style="height:2px;background:#1e1e1e;border-radius:2px;margin-bottom:2px"></div>
          <div style="height:2px;background:#1b1b1b;border-radius:2px;width:80%"></div>
        </div>
      </div>
      <div style="height:3px;background:#1a1a1a;border-radius:2px;margin-bottom:3px"></div>
      <div style="height:3px;background:#171717;border-radius:2px;margin-bottom:3px;width:77%"></div>
      <div style="flex:1"></div>
      <div style="background:#111;border:1px solid ${a}28;border-radius:7px;padding:8px 9px;flex-shrink:0;margin-bottom:7px">
        <div style="height:2px;width:50%;background:${a}50;border-radius:2px;margin-bottom:5px"></div>
        <div style="display:flex;gap:5px;align-items:center">
          <div style="flex:1;height:14px;background:#181818;border-radius:4px;border:1px solid #252525"></div>
          <div style="height:14px;width:36px;background:${a};border-radius:4px;flex-shrink:0"></div>
        </div>
      </div>
    </div>
    <div style="padding:4px 12px 6px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px;flex-shrink:0">
      <div style="height:12px;background:#111;border-radius:3px"></div><div style="height:12px;background:#111;border-radius:3px"></div><div style="height:12px;background:#111;border-radius:3px"></div>
    </div>
  </div>`;
}

/* ── Card data ────────────────────────────────────────────────────────────── */
const LAYOUTS = [
  { fn: lProse,     label: 'Short Prose',    desc: 'Pill picks · narrow col · info panel pre-close · full CTA banner' },
  { fn: lDishCards, label: 'Dish Cards',     desc: '3 editorial dish cards · thumb + name + 1-liner · info image · strip CTA' },
  { fn: lTwoCol,    label: 'Two-Col + Facts',desc: '2-col: prose left / quick-facts right · info image in content · inline CTA' },
  { fn: lNumbered,  label: 'Numbered List',  desc: '1–4 items · info image between #2 and #3 · pill CTA' },
  { fn: lMagazine,  label: 'Magazine',       desc: 'Shorter hero · stat pull · photo-callout card · email field CTA card' },
];

const COLORS = [
  { name: 'Teal',    a: '#14b8a6', a2: '#0d9488', bg: '#080d0c', tag: '#14b8a6' },
  { name: 'Amber',   a: '#f59e0b', a2: '#d97706', bg: '#0d0b07', tag: '#f59e0b' },
  { name: 'Indigo',  a: '#6366f1', a2: '#4f46e5', bg: '#08080e', tag: '#818cf8' },
  { name: 'Emerald', a: '#10b981', a2: '#059669', bg: '#07100c', tag: '#10b981' },
  { name: 'Sky',     a: '#0ea5e9', a2: '#0284c7', bg: '#07090d', tag: '#38bdf8' },
];

/* ── Render ───────────────────────────────────────────────────────────────── */
const grid = document.getElementById('gallery');
let n = 0;

COLORS.forEach((col) => {
  const grp = document.createElement('div');
  grp.className = 'group-label';
  grp.style.cssText = 'grid-column:1/-1';
  grp.innerHTML = `<span>${col.name}</span><div class="line"></div>`;
  grid.appendChild(grp);

  LAYOUTS.forEach((layout) => {
    n++;
    const card = document.createElement('div');
    card.className = 'card';
    card.style.setProperty('--a', col.a);
    card.innerHTML = `
      <div class="pf">${layout.fn(col.a, col.a2, col.bg)}</div>
      <div class="card-foot">
        <span class="cn">${String(n).padStart(2,'0')}</span>
        <span class="nm">${col.name} ${layout.label}</span>
        <div class="dot" style="background:${col.tag}"></div>
      </div>
      <div class="ds">${layout.desc}</div>
    `;
    card.addEventListener('click', () => {
      document.querySelectorAll('.card').forEach(c => c.classList.remove('sel'));
      card.classList.add('sel');
    });
    grid.appendChild(card);
  });
});
</script>
</body>
</html>
