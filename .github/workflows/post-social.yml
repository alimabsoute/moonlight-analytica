name: Post Social

on:
  schedule:
    # Hourly at :30 — picks up any social.json from the last 2hr without a .scheduled.lock
    - cron: '30 * * * *'
  workflow_dispatch:
    inputs:
      test:
        description: 'Dry run (no real posts)'
        default: 'true'
        type: boolean
      target:
        description: 'carte or dish'
        default: 'carte'
        type: choice
        options: [carte, dish]

jobs:
  post:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: forkfox

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Post to social platforms
        env:
          AYRSHARE_API_KEY: ${{ secrets.AYRSHARE_API_KEY }}
        run: |
          TARGET=${{ github.event.inputs.target || 'carte' }}
          TEST=${{ github.event.inputs.test || 'false' }}
          TEST_FLAG=""
          if [ "$TEST" = "true" ]; then
            TEST_FLAG="--test"
          fi
          if [ "$TARGET" = "dish" ]; then
            python pipeline/post_social.py --recent-dish $TEST_FLAG
          else
            # Post both (carte first, then any recent dish)
            python pipeline/post_social.py --recent-carte $TEST_FLAG
            python pipeline/post_social.py --recent-dish $TEST_FLAG
          fi
