<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Janus — Hotel Operations.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c10;
    --bg-elev: #11141b;
    --line: rgba(255,255,255,0.06);
    --line-strong: rgba(255,255,255,0.12);
    --text: #f0f2f6;
    --text-mute: #8a909c;
    --text-dim: #5a606b;
    --accent: #4d9bff;
    --accent-bg: rgba(77, 155, 255, 0.10);
    --good: #2ecc71;
    --warn: #ffb547;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text);
    font-family: 'Inter', -apple-system, "SF Pro Display", system-ui, sans-serif;
    font-feature-settings: "cv02", "cv03", "cv04", "cv11";
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  #app { position: fixed; inset: 0; }

  /* ============== HUD: brand + status ============== */
  #hud {
    position: fixed; top: 24px; left: 24px; z-index: 10; width: 360px;
    background: rgba(12, 14, 20, 0.72); backdrop-filter: blur(18px) saturate(1.4);
    -webkit-backdrop-filter: blur(18px) saturate(1.4);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 18px 20px 16px;
    box-shadow: 0 20px 60px -20px rgba(0,0,0,0.6);
  }
  .brandRow { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .brandMark {
    width: 28px; height: 28px; border-radius: 7px;
    background: linear-gradient(135deg, #4d9bff 0%, #b56cff 100%);
    display: grid; place-items: center;
    box-shadow: 0 4px 12px -4px rgba(77, 155, 255, 0.6);
  }
  .brandMark svg { width: 16px; height: 16px; color: white; }
  .brandWord { font-weight: 800; font-size: 17px; letter-spacing: -0.02em; }
  .brandByline {
    font-size: 11px; color: var(--text-dim); letter-spacing: 0.02em;
    margin-top: -2px;
  }
  .liveBadge {
    margin-left: auto;
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 9px; background: rgba(46, 204, 113, 0.10);
    color: var(--good); border-radius: 999px;
    font-size: 10px; font-weight: 600; letter-spacing: 0.10em;
  }
  .liveBadge::before {
    content: ""; width: 6px; height: 6px; border-radius: 50%;
    background: var(--good); animation: livePulse 2s ease-in-out infinite;
  }
  @keyframes livePulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.85); } }

  /* ============== Step pill ============== */
  .stepPill {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px;
    background: rgba(255,255,255,0.025);
    border: 1px solid var(--line);
    border-radius: 10px;
    margin-bottom: 14px;
  }
  .stepNum {
    font-size: 11px; font-weight: 700; letter-spacing: 0.10em;
    color: var(--accent); min-width: 38px;
  }
  .stepName {
    font-size: 13px; font-weight: 600; color: var(--text);
    flex: 1; transition: opacity 0.4s;
  }
  .stepProgress {
    height: 2px; background: rgba(255,255,255,0.06);
    border-radius: 2px; overflow: hidden;
    margin-top: 2px;
  }
  .stepProgressFill {
    height: 100%; background: linear-gradient(90deg, var(--accent), #b56cff);
    width: 0%; transition: width 0.12s linear;
  }

  /* ============== Zones list ============== */
  .zonesHeader {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 8px;
  }
  .zonesLabel {
    font-size: 10px; font-weight: 600; letter-spacing: 0.14em;
    color: var(--text-dim); text-transform: uppercase;
  }
  .zonesTotal { font-size: 11px; color: var(--text-mute); font-variant-numeric: tabular-nums; }
  #zones { display: grid; gap: 6px; }
  .zoneRow {
    display: grid; grid-template-columns: 8px 1fr auto;
    align-items: center; gap: 12px;
    padding: 10px 12px;
    background: rgba(255,255,255,0.02);
    border: 1px solid transparent;
    border-radius: 8px;
    transition: background 0.3s, border-color 0.3s;
  }
  .zoneRow.active { background: rgba(255,255,255,0.04); border-color: var(--line); }
  .swatch { width: 8px; height: 8px; border-radius: 50%; }
  .zoneName { font-size: 13px; font-weight: 500; color: var(--text); }
  .count {
    font-size: 14px; font-weight: 700; color: var(--text);
    font-variant-numeric: tabular-nums;
    min-width: 22px; text-align: right;
  }
  .countDash { color: var(--text-dim); font-weight: 400; }

  /* ============== Caption (zone value prop) ============== */
  #caption {
    position: fixed; bottom: 92px; left: 50%; transform: translate(-50%, 8px);
    z-index: 10;
    background: rgba(12, 14, 20, 0.78); backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 10px 22px;
    font-size: 13px; font-weight: 500;
    color: var(--text);
    opacity: 0;
    transition: opacity 0.5s, transform 0.5s;
    pointer-events: none;
    white-space: nowrap;
    max-width: calc(100vw - 80px);
  }
  #caption.visible { opacity: 1; transform: translate(-50%, 0); }
  #caption .caret {
    color: var(--accent); margin-right: 8px; font-weight: 700;
  }

  /* ============== Footer / scrubber ============== */
  #footer {
    position: fixed; bottom: 0; left: 0; right: 0;
    z-index: 9;
    padding: 18px 24px 16px;
    background: linear-gradient(180deg, transparent 0%, rgba(10,12,16,0.85) 60%);
    pointer-events: none;
  }
  #scrubber {
    height: 2px; background: rgba(255,255,255,0.08);
    border-radius: 2px; overflow: hidden;
    margin-bottom: 12px;
  }
  #scrubberFill {
    height: 100%; background: linear-gradient(90deg, #4d9bff 0%, #b56cff 50%, #ff8a3d 100%);
    width: 0%; transition: width 0.08s linear;
  }
  .footerRow {
    display: flex; align-items: center; gap: 16px;
    color: var(--text-dim); font-size: 11px; letter-spacing: 0.04em;
  }
  .footerHint { flex: 1; }
  .footerCtrl {
    display: inline-flex; align-items: center; gap: 6px;
    pointer-events: auto;
    padding: 6px 12px;
    border: 1px solid var(--line);
    background: rgba(255,255,255,0.03);
    color: var(--text-mute);
    border-radius: 6px;
    font-size: 11px; font-weight: 500; letter-spacing: 0.05em;
    cursor: pointer;
    transition: background 0.2s, color 0.2s, border-color 0.2s;
    font-family: inherit;
  }
  .footerCtrl:hover { background: rgba(255,255,255,0.06); color: var(--text); border-color: var(--line-strong); }

  /* ============== End card ============== */
  #endCard {
    position: fixed; inset: 0; z-index: 20;
    display: grid; place-items: center;
    background: radial-gradient(ellipse at center, rgba(15, 18, 25, 0.92) 0%, rgba(8, 10, 14, 0.96) 70%);
    backdrop-filter: blur(8px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.6s;
  }
  #endCard.visible { opacity: 1; pointer-events: auto; }
  .endCardInner { text-align: center; max-width: 540px; padding: 0 32px; }
  .endCardMark {
    width: 56px; height: 56px; border-radius: 14px; margin: 0 auto 24px;
    background: linear-gradient(135deg, #4d9bff 0%, #b56cff 100%);
    display: grid; place-items: center;
    box-shadow: 0 16px 40px -10px rgba(77, 155, 255, 0.5);
  }
  .endCardMark svg { width: 30px; height: 30px; color: white; }
  .endCardTag {
    font-size: clamp(28px, 4vw, 44px);
    font-weight: 700; letter-spacing: -0.025em; line-height: 1.1;
    margin: 0 0 14px;
  }
  .endCardSub {
    font-size: 16px; color: var(--text-mute);
    line-height: 1.5; margin: 0 0 28px;
    font-weight: 400;
  }
  .endCardCta {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 20px;
    background: var(--text); color: var(--bg);
    border-radius: 10px;
    font-size: 14px; font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    pointer-events: auto;
  }
  .endCardCta:hover { transform: translateY(-1px); box-shadow: 0 12px 30px -8px rgba(255,255,255,0.2); }
  .endCardCta svg { width: 14px; height: 14px; }

  /* ============== Loading ============== */
  #loading {
    position: fixed; inset: 0; z-index: 30;
    display: grid; place-items: center;
    background: var(--bg);
    transition: opacity 0.6s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
  .loadingDot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    animation: loadPulse 1.4s ease-in-out infinite;
  }
  @keyframes loadPulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
</style>
</head>

<div id="app"></div>

<div id="hud">
  <div class="brandRow">
    <div class="brandMark">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 7 L12 3 L21 7 L12 11 Z" />
        <path d="M3 7 L3 17 L12 21 L21 17 L21 7" opacity="0.55" />

      <div class="brandWord">Janus</div>

  <div class="stepPill">

        <path d="M3 7 L3 17 L12 21 L21 17 L21 7" opacity="0.55" />
        <path d="M12 11 L12 21" opacity="0.55" />
      </svg>
    </div>
    <h1 class="endCardTag" id="endTag">Know what your lobby<br>is doing.</h1>
    <p class="endCardSub" id="endSub">Live counts at check-in, the bar, the elevators. No facial recognition. No badges.</p>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { OutputPass } from 'three/addons/postprocessing/OutputPass.js';

// ====================== AUDIO (Web Audio API synthesized) ======================
let audioCtx = null;
let masterGain = null;
let ambientNode = null;
let soundEnabled = false;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0;
  masterGain.connect(audioCtx.destination);
  startAmbient();
}
function startAmbient() {
  // Soft sub-bass drone with very slow LFO modulation — lives under everything else
  const osc1 = audioCtx.createOscillator();
  const osc2 = audioCtx.createOscillator();
  const filter = audioCtx.createBiquadFilter();
  const gain = audioCtx.createGain();
  osc1.type = 'sine'; osc1.frequency.value = 55;
  osc2.type = 'sine'; osc2.frequency.value = 82.4; // E2
  filter.type = 'lowpass'; filter.frequency.value = 280; filter.Q.value = 0.7;
  gain.gain.value = 0.06;
  osc1.connect(filter); osc2.connect(filter); filter.connect(gain); gain.connect(masterGain);
  // very slow tremolo
  const lfo = audioCtx.createOscillator();
  const lfoGain = audioCtx.createGain();
  lfo.frequency.value = 0.08; lfoGain.gain.value = 0.025;
  lfo.connect(lfoGain); lfoGain.connect(gain.gain);
  osc1.start(); osc2.start(); lfo.start();
  ambientNode = gain;
}
function sfxClick() {
  if (!audioCtx || !soundEnabled) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'sine'; osc.frequency.setValueAtTime(2400, t);
  osc.frequency.exponentialRampToValueAtTime(1200, t + 0.05);
  g.gain.setValueAtTime(0.12, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
  osc.connect(g); g.connect(masterGain); osc.start(t); osc.stop(t + 0.07);
}
function sfxWhoosh() {
  if (!audioCtx || !soundEnabled) return;
  const t = audioCtx.currentTime;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.5, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) {
    const env = Math.exp(-i / (data.length * 0.4));
    data[i] = (Math.random() * 2 - 1) * env;
  }
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'bandpass';
  filter.frequency.setValueAtTime(400, t);
  filter.frequency.exponentialRampToValueAtTime(2400, t + 0.4);
  filter.Q.value = 3;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.10, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
  src.connect(filter); filter.connect(g); g.connect(masterGain); src.start(t);
}
function sfxPlace() {
  if (!audioCtx || !soundEnabled) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(180, t);
  osc.frequency.exponentialRampToValueAtTime(90, t + 0.15);
  g.gain.setValueAtTime(0.18, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
  osc.connect(g); g.connect(masterGain); osc.start(t); osc.stop(t + 0.2);
}
function sfxCommit() {
  if (!audioCtx || !soundEnabled) return;
  const t = audioCtx.currentTime;
  // E5 + B5 chime
  [659.25, 987.77].forEach((freq, idx) => {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    g.gain.setValueAtTime(0, t + idx * 0.04);
    g.gain.linearRampToValueAtTime(0.10, t + idx * 0.04 + 0.01);
    g.gain.exponentialRampToValueAtTime(0.001, t + idx * 0.04 + 0.5);
    osc.connect(g); g.connect(masterGain); osc.start(t + idx * 0.04); osc.stop(t + idx * 0.04 + 0.55);
  });
}
function sfxLiveStart() {
  if (!audioCtx || !soundEnabled) return;
  const t = audioCtx.currentTime;
  // Three quick rising notes
  [523.25, 659.25, 783.99].forEach((freq, idx) => {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'sine'; osc.frequency.value = freq;
    g.gain.setValueAtTime(0, t + idx * 0.06);
    g.gain.linearRampToValueAtTime(0.08, t + idx * 0.06 + 0.01);
    g.gain.exponentialRampToValueAtTime(0.001, t + idx * 0.06 + 0.3);
    osc.connect(g); g.connect(masterGain); osc.start(t + idx * 0.06); osc.stop(t + idx * 0.06 + 0.35);
  });
}

document.getElementById('soundToggle').addEventListener('click', () => {
  if (!audioCtx) initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  soundEnabled = !soundEnabled;
  masterGain.gain.linearRampToValueAtTime(soundEnabled ? 1.0 : 0.0, audioCtx.currentTime + 0.3);
  document.getElementById('soundIcon').textContent = soundEnabled ? '♪' : '♪';
  document.getElementById('soundLabel').textContent = soundEnabled ? 'sound on' : 'sound off';
});

// ====================== THREE.JS SCENE ======================
const root = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
root.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0c10);
scene.fog = new THREE.Fog(0x0a0c10, 32, 80);

const camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(14, 11, 18);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.5, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.maxPolarAngle = Math.PI * 0.49;
controls.minDistance = 6;
controls.maxDistance = 50;
controls.enabled = false; // disabled during cinematic intro

// ============= IMAGE-BASED LIGHTING (PMREM from RoomEnvironment) =============
const pmrem = new THREE.PMREMGenerator(renderer);
pmrem.compileEquirectangularShader();
scene.environment = pmrem.fromScene(new RoomEnvironment(renderer), 0.04).texture;
scene.environmentIntensity = 0.5;

// ============= DIRECT LIGHTS (warm key + cool window fill + warm pendants) =============
const key = new THREE.DirectionalLight(0xfff0d8, 1.6);
key.position.set(12, 18, 8);
key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
key.shadow.camera.left = -20; key.shadow.camera.right = 20;
key.shadow.camera.top = 20; key.shadow.camera.bottom = -20;
key.shadow.bias = -0.0005;
key.shadow.radius = 8;
scene.add(key);

const fill = new THREE.DirectionalLight(0x88a4ff, 0.5);
fill.position.set(-18, 6, 6);
scene.add(fill);

// Warm rim near concierge / window edge
const lobbyRim = new THREE.PointLight(0xffb070, 1.0, 16, 1.6);
lobbyRim.position.set(-10, 2.2, 4);
scene.add(lobbyRim);

// ============= PROCEDURAL TEXTURES =============
function makeWoodTexture(w, h, base, grain) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const x = c.getContext('2d');
  x.fillStyle = base; x.fillRect(0, 0, w, h);
  for (let i = 0; i < h; i++) {
    if (Math.random() > 0.6) continue;
    x.strokeStyle = grain;
    x.globalAlpha = 0.04 + Math.random() * 0.18;
    x.lineWidth = 1;
    x.beginPath();
    let y = i;
    x.moveTo(0, y);
    for (let xx = 0; xx < w; xx += 6) {
      y += (Math.random() - 0.5) * 1.4;
      x.lineTo(xx, y);
    }
    x.stroke();
  }
  for (let k = 0; k < 7; k++) {
    const cx = Math.random() * w, cy = Math.random() * h;
    const r = 4 + Math.random() * 12;
    const g = x.createRadialGradient(cx, cy, 0, cx, cy, r);
    g.addColorStop(0, grain); g.addColorStop(1, 'transparent');
    x.globalAlpha = 0.4; x.fillStyle = g;
    x.beginPath(); x.arc(cx, cy, r, 0, Math.PI * 2); x.fill();
  }
  x.globalAlpha = 1;
  const t = new THREE.CanvasTexture(c);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
}
function makeConcreteTexture(size) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const x = c.getContext('2d');
  x.fillStyle = '#26292f'; x.fillRect(0, 0, size, size);
  for (let i = 0; i < size * size * 0.05; i++) {
    const v = 30 + Math.random() * 40;
    x.fillStyle = `rgb(${v},${v},${v + 6})`;
    x.fillRect(Math.random() * size, Math.random() * size, 1, 1);
  }
  for (let p = 0; p < 50; p++) {
    const cx = Math.random() * size, cy = Math.random() * size;
    const r = 8 + Math.random() * 32;
    const g = x.createRadialGradient(cx, cy, 0, cx, cy, r);
    g.addColorStop(0, 'rgba(0,0,0,0.18)'); g.addColorStop(1, 'transparent');
    x.fillStyle = g;
    x.beginPath(); x.arc(cx, cy, r, 0, Math.PI * 2); x.fill();
  }
  const t = new THREE.CanvasTexture(c);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
}
function makeFabricTexture(size, hex) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const x = c.getContext('2d');
  x.fillStyle = hex; x.fillRect(0, 0, size, size);
  const step = 3;
  x.globalAlpha = 0.10;
  for (let yy = 0; yy < size; yy += step) {
    for (let xx = 0; xx < size; xx += step) {
      x.fillStyle = ((xx / step + yy / step) % 2 === 0) ? '#ffffff' : '#000000';
      x.fillRect(xx, yy, step / 2, step / 2);
    }
  }
  x.globalAlpha = 0.04;
  for (let i = 0; i < size * size * 0.02; i++) {
    x.fillStyle = '#ffffff';
    x.fillRect(Math.random() * size, Math.random() * size, 1, 1);
  }
  x.globalAlpha = 1;
  const t = new THREE.CanvasTexture(c);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
}

// Marble texture: lighter base with subtle darker veins (used for marble floor + counter top slab)
function makeMarbleTexture(size, base, vein) {
  const c = document.createElement('canvas');
  c.width = c.height = size;
  const x = c.getContext('2d');
  x.fillStyle = base; x.fillRect(0, 0, size, size);
  // base mottling
  for (let i = 0; i < size * size * 0.02; i++) {
    const v = 80 + Math.random() * 30;
    x.fillStyle = `rgba(${v},${v},${v + 4},0.06)`;
    x.fillRect(Math.random() * size, Math.random() * size, 1, 1);
  }
  // soft cloud blooms
  for (let p = 0; p < 22; p++) {
    const cx = Math.random() * size, cy = Math.random() * size;
    const r = 30 + Math.random() * 80;
    const g = x.createRadialGradient(cx, cy, 0, cx, cy, r);
    g.addColorStop(0, 'rgba(255,255,255,0.10)'); g.addColorStop(1, 'transparent');
    x.fillStyle = g;
    x.beginPath(); x.arc(cx, cy, r, 0, Math.PI * 2); x.fill();
  }
  // a few darker veining streaks
  x.strokeStyle = vein;
  for (let v = 0; v < 8; v++) {
    x.globalAlpha = 0.20 + Math.random() * 0.22;
    x.lineWidth = 0.6 + Math.random() * 1.4;
    x.beginPath();
    let yy = Math.random() * size;
    let xx = 0;
    x.moveTo(xx, yy);
    while (xx < size) {
      xx += 4 + Math.random() * 6;
      yy += (Math.random() - 0.5) * 18;
      x.lineTo(xx, yy);
    }
    x.stroke();
    // forks
    if (Math.random() < 0.6) {
      x.beginPath();
      let yy2 = yy + (Math.random() - 0.5) * 30;
      let xx2 = xx - 60 - Math.random() * 50;
      x.moveTo(xx2, yy2);
      while (xx2 < size) {
        xx2 += 5 + Math.random() * 7;
        yy2 += (Math.random() - 0.5) * 14;
        x.lineTo(xx2, yy2);
      }
      x.stroke();
    }
  }
  x.globalAlpha = 1;
  const t = new THREE.CanvasTexture(c);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
}

// Brushed metal panel (vertical streaks) for elevator doors
function makeBrushedMetalTexture(w, h, base) {
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const x = c.getContext('2d');
  x.fillStyle = base; x.fillRect(0, 0, w, h);
  for (let i = 0; i < w * 6; i++) {
    const xx = Math.random() * w;
    const len = 60 + Math.random() * (h - 60);
    const yy = Math.random() * (h - len);
    const a = 0.04 + Math.random() * 0.10;
    x.strokeStyle = (Math.random() < 0.5) ? `rgba(255,255,255,${a})` : `rgba(0,0,0,${a})`;
    x.lineWidth = 1;
    x.beginPath();
    x.moveTo(xx, yy);
    x.lineTo(xx, yy + len);
    x.stroke();
  }
  const t = new THREE.CanvasTexture(c);
  t.wrapS = t.wrapT = THREE.RepeatWrapping;
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
}

function buildElevatorBank(centerX, z) {
  const g = new THREE.Group();
  const doorW = 1.4, doorH = 2.6, gap = 1.8;
  const doorCount = 3;
  for (let i = 0; i < doorCount; i++) {
    const dx = (i - (doorCount - 1) / 2) * (doorW + gap);
    // brass frame
    const frameW = doorW + 0.18, frameH = doorH + 0.18;
    const frameTop = new THREE.Mesh(new THREE.BoxGeometry(frameW, 0.10, 0.10), MATS.brass);
    frameTop.position.set(dx, doorH + 0.14, z + 0.05); g.add(frameTop);
    const frameLeft = new THREE.Mesh(new THREE.BoxGeometry(0.10, frameH, 0.10), MATS.brass);
    frameLeft.position.set(dx - frameW / 2 + 0.05, frameH / 2, z + 0.05); g.add(frameLeft);
    const frameRight = new THREE.Mesh(new THREE.BoxGeometry(0.10, frameH, 0.10), MATS.brass);
    frameRight.position.set(dx + frameW / 2 - 0.05, frameH / 2, z + 0.05); g.add(frameRight);
    // two-leaf doors (split in middle)
    for (let leaf = 0; leaf < 2; leaf++) {
      const sign = leaf === 0 ? -1 : 1;
      const door = new THREE.Mesh(new THREE.BoxGeometry(doorW / 2 - 0.005, doorH, 0.04), MATS.elevatorPanel);
      door.position.set(dx + sign * doorW / 4, doorH / 2, z); g.add(door);
    }
    // call button + floor display
    const display = new THREE.Mesh(new THREE.BoxGeometry(0.30, 0.10, 0.02),
      new THREE.MeshStandardMaterial({ color: 0x0a0d12, roughness: 0.4, metalness: 0.4,
        emissive: 0xffaa44, emissiveIntensity: 1.4 }));
    display.position.set(dx, doorH + 0.30, z + 0.06); g.add(display);
    const btn = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.02, 12), MATS.brass);
    btn.rotation.x = Math.PI / 2;
    btn.position.set(dx + frameW / 2 + 0.18, 1.30, z + 0.05); g.add(btn);
    // small wall sconce above each elevator
    const sconceLight = new THREE.PointLight(0xffd47a, 0.20, 4, 1.8);
    sconceLight.position.set(dx, doorH + 0.55, z + 0.4); g.add(sconceLight);
  }
  g.position.set(centerX, 0, 0); scene.add(g); return g;
}

// ============= PENDANT CHANDELIERS =============
function buildChandelier(x, y, z, scale = 1.0, intensity = 0.55) {
  const g = new THREE.Group();
  const cordH = 4;
  const cord = new THREE.Mesh(new THREE.CylinderGeometry(0.010, 0.010, cordH, 6), MATS.cord);
  cord.position.y = y + cordH / 2; g.add(cord);
  // Tiered chandelier: outer ring of crystal-glass orbs + inner emissive cluster
  const ringR = 0.55 * scale;
  const ringCount = 8;
  for (let i = 0; i < ringCount; i++) {
    const ang = (i / ringCount) * Math.PI * 2;
    const orb = new THREE.Mesh(new THREE.SphereGeometry(0.07 * scale, 12, 10), MATS.chandelierGlass);
    orb.position.set(Math.cos(ang) * ringR, y - 0.18, Math.sin(ang) * ringR);
    g.add(orb);
  }
  // upper smaller ring
  const innerCount = 5;
  for (let i = 0; i < innerCount; i++) {
    const ang = (i / innerCount) * Math.PI * 2 + 0.3;
    const orb = new THREE.Mesh(new THREE.SphereGeometry(0.05 * scale, 10, 10), MATS.chandelierGlass);
    orb.position.set(Math.cos(ang) * 0.30 * scale, y + 0.05, Math.sin(ang) * 0.30 * scale);
    g.add(orb);
  }
  // central bulb
  const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.10 * scale, 16, 14), MATS.pendantBulb);
  bulb.position.y = y - 0.10; g.add(bulb);
  // brass cap
  const cap = new THREE.Mesh(new THREE.CylinderGeometry(0.10 * scale, 0.14 * scale, 0.10 * scale, 16), MATS.brass);
  cap.position.y = y + 0.18; g.add(cap);
  // light source
  const light = new THREE.PointLight(0xffd47a, intensity, 9, 1.7);
  light.position.y = y - 0.20;
  light.castShadow = false;
  g.add(light);
  g.position.set(x, 0, z); scene.add(g); return g;
}

// ============= HUMANOID (procedural articulated person) =============
class Humanoid extends THREE.Group {
  constructor(skin, shirt, pants) {
    super();
    const skinMat = new THREE.MeshStandardMaterial({ color: skin, roughness: 0.72, metalness: 0.0 });
    const shirtMat = new THREE.MeshStandardMaterial({
      color: shirt, roughness: 0.62, metalness: 0.0,
      map: makeFabricTexture(128, '#' + shirt.toString(16).padStart(6, '0')),
    });
    const pantsMat = new THREE.MeshStandardMaterial({ color: pants, roughness: 0.7, metalness: 0.0 });
    const shoeMat = new THREE.MeshStandardMaterial({ color: 0x12161e, roughness: 0.42, metalness: 0.18 });

    // Pelvis at root
    this.pelvis = new THREE.Group();
    this.pelvis.position.y = 0.95;
    this.add(this.pelvis);
    const pelvisMesh = new THREE.Mesh(new THREE.BoxGeometry(0.30, 0.12, 0.18), pantsMat);
    pelvisMesh.castShadow = true; this.pelvis.add(pelvisMesh);

    // Torso
    this.torso = new THREE.Group();
    this.torso.position.y = 0.06;
    this.pelvis.add(this.torso);
    const torsoMesh = new THREE.Mesh(new THREE.CapsuleGeometry(0.17, 0.36, 4, 10), shirtMat);
    torsoMesh.scale.set(1.0, 0.95, 0.62);
    torsoMesh.position.y = 0.28;
    torsoMesh.castShadow = true;
    this.torso.add(torsoMesh);
    // Neck
    const neckMesh = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.06, 0.07, 12), skinMat);
    neckMesh.position.y = 0.55;
    this.torso.add(neckMesh);
    // Head
    this.head = new THREE.Group();
    this.head.position.y = 0.62;
    this.torso.add(this.head);
    const headMesh = new THREE.Mesh(new THREE.SphereGeometry(0.115, 16, 14), skinMat);
    headMesh.scale.set(0.95, 1.05, 1.0);
    headMesh.castShadow = true;
    this.head.add(headMesh);
    // Hair (random color)
    const hairColors = [0x1a1310, 0x2a1f15, 0x3d2818, 0x4a3528, 0x5e4028, 0x150f0a];
    const hairMat = new THREE.MeshStandardMaterial({
      color: hairColors[Math.floor(Math.random() * hairColors.length)],
      roughness: 0.85, metalness: 0.0,
    });
    const hair = new THREE.Mesh(
      new THREE.SphereGeometry(0.122, 14, 12, 0, Math.PI * 2, 0, Math.PI / 2 + 0.15),
      hairMat,
    );
    hair.position.y = 0.025;
    this.head.add(hair);

    // Arms
    this.leftArm = this._buildArm(shirtMat, skinMat);
    this.leftArm.position.set(-0.21, 0.45, 0);
    this.torso.add(this.leftArm);
    this.rightArm = this._buildArm(shirtMat, skinMat);
    this.rightArm.position.set(0.21, 0.45, 0);
    this.torso.add(this.rightArm);

    // Legs
    this.leftLeg = this._buildLeg(pantsMat, shoeMat);
    this.leftLeg.position.set(-0.09, -0.06, 0);
    this.pelvis.add(this.leftLeg);
    this.rightLeg = this._buildLeg(pantsMat, shoeMat);
    this.rightLeg.position.set(0.09, -0.06, 0);
    this.pelvis.add(this.rightLeg);

    this.walkPhase = Math.random() * Math.PI * 2;
    this.targetPose = 'stand';
  }

  _buildArm(shirtMat, skinMat) {
    const arm = new THREE.Group();
    const shoulder = new THREE.Group();
    arm.add(shoulder);
    const upper = new THREE.Mesh(new THREE.CapsuleGeometry(0.045, 0.20, 4, 8), shirtMat);
    upper.position.y = -0.13; upper.castShadow = true; shoulder.add(upper);
    const elbow = new THREE.Group();
    elbow.position.y = -0.26;
    shoulder.add(elbow);
    const lower = new THREE.Mesh(new THREE.CapsuleGeometry(0.04, 0.18, 4, 8), skinMat);
    lower.position.y = -0.11; lower.castShadow = true; elbow.add(lower);
    const hand = new THREE.Mesh(new THREE.SphereGeometry(0.045, 10, 10), skinMat);
    hand.scale.set(1, 0.85, 0.7); hand.position.y = -0.22; elbow.add(hand);
    arm.userData = { shoulder, elbow };
    return arm;
  }

  _buildLeg(pantsMat, shoeMat) {
    const leg = new THREE.Group();
    const hip = new THREE.Group();
    leg.add(hip);
    const upper = new THREE.Mesh(new THREE.CapsuleGeometry(0.07, 0.30, 4, 8), pantsMat);
    upper.position.y = -0.18; upper.castShadow = true; hip.add(upper);
    const knee = new THREE.Group();
    knee.position.y = -0.36;
    hip.add(knee);
    const lower = new THREE.Mesh(new THREE.CapsuleGeometry(0.06, 0.28, 4, 8), pantsMat);
    lower.position.y = -0.16; lower.castShadow = true; knee.add(lower);
    const foot = new THREE.Mesh(new THREE.BoxGeometry(0.10, 0.05, 0.20), shoeMat);
    foot.position.set(0, -0.32, 0.04); foot.castShadow = true; knee.add(foot);
    leg.userData = { hip, knee };
    return leg;
  }

  setPose(pose) { this.targetPose = pose; }

  update(dt, speed, time) {
    if (this.targetPose === 'sit') {
      this.pelvis.position.y = 0.46;
      this.leftLeg.userData.hip.rotation.x = Math.PI / 2;
      this.rightLeg.userData.hip.rotation.x = Math.PI / 2;
      this.leftLeg.userData.knee.rotation.x = -Math.PI / 2;
      this.rightLeg.userData.knee.rotation.x = -Math.PI / 2;
      this.leftArm.userData.shoulder.rotation.x = 0.05;
      this.rightArm.userData.shoulder.rotation.x = 0.05;
      this.leftArm.userData.elbow.rotation.x = 0.0;
      this.rightArm.userData.elbow.rotation.x = 0.0;
      this.torso.rotation.x = -0.08;
    } else if (speed > 0.05) {
      const rate = 5.5;
      this.walkPhase += dt * rate * Math.max(0.4, Math.min(1.2, speed));
      const ph = this.walkPhase, ph2 = ph + Math.PI;
      this.leftLeg.userData.hip.rotation.x = Math.sin(ph) * 0.55;
      this.rightLeg.userData.hip.rotation.x = Math.sin(ph2) * 0.55;
      this.leftLeg.userData.knee.rotation.x = Math.max(0, -Math.sin(ph)) * 0.65;
      this.rightLeg.userData.knee.rotation.x = Math.max(0, -Math.sin(ph2)) * 0.65;
      this.leftArm.userData.shoulder.rotation.x = Math.sin(ph2) * 0.40;
      this.rightArm.userData.shoulder.rotation.x = Math.sin(ph) * 0.40;
      this.leftArm.userData.elbow.rotation.x = -0.15 + Math.abs(Math.sin(ph2)) * 0.20;
      this.rightArm.userData.elbow.rotation.x = -0.15 + Math.abs(Math.sin(ph)) * 0.20;
      this.pelvis.position.y = 0.95 + Math.abs(Math.sin(ph * 2)) * 0.025;
      this.torso.rotation.x = speed > 0.4 ? -0.04 : 0;
    } else {
      this.pelvis.position.y = 0.95 + Math.sin(time * 1.2 + this.walkPhase) * 0.005;
      this.leftLeg.userData.hip.rotation.x *= 0.85;
      this.rightLeg.userData.hip.rotation.x *= 0.85;
      this.leftLeg.userData.knee.rotation.x *= 0.85;
      this.rightLeg.userData.knee.rotation.x *= 0.85;
      this.leftArm.userData.shoulder.rotation.x *= 0.90;
      this.rightArm.userData.shoulder.rotation.x *= 0.90;
      this.leftArm.userData.elbow.rotation.x = -0.12;
      this.rightArm.userData.elbow.rotation.x = -0.12;
      this.torso.rotation.x *= 0.9;
    }
  }
}

function buildZone(z) {
  const group = new THREE.Group();
  const w = z.target.size.w, h = z.target.size.h;

  const planeGeo = new THREE.PlaneGeometry(w, h);
  const planeMat = new THREE.MeshBasicMaterial({
    color: z.color, transparent: true, opacity: 0.0,
    side: THREE.DoubleSide, depthWrite: false
  });
  const plane = new THREE.Mesh(planeGeo, planeMat);
  group.add(plane);

  const edgeGeo = new THREE.EdgesGeometry(planeGeo);
  const edgeMat = new THREE.LineBasicMaterial({
    color: z.color, transparent: true, opacity: 0.0
  });
  const edges = new THREE.LineSegments(edgeGeo, edgeMat);
  group.add(edges);

  const corners = new THREE.Group();
  const cornerCoords = [[-w/2,-h/2],[w/2,-h/2],[w/2,h/2],[-w/2,h/2]];
  cornerCoords.forEach(([x, y]) => {
    const cg = new THREE.SphereGeometry(0.16, 12, 12);
    const cm = new THREE.MeshBasicMaterial({ color: z.color, transparent: true, opacity: 0.0 });
    const c = new THREE.Mesh(cg, cm);
    c.position.set(x, y, 0);
    corners.add(c);
  });
  group.add(corners);

  const labelCanvas = document.createElement('canvas');
  labelCanvas.width = 512; labelCanvas.height = 128;
  const ctx = labelCanvas.getContext('2d');
  ctx.fillStyle = `#${z.color.toString(16).padStart(6,'0')}`;
  roundRect(ctx, 4, 4, 504, 120, 22); ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.font = '700 52px Inter, -apple-system, sans-serif';
  ctx.textBaseline = 'middle'; ctx.textAlign = 'center';
  ctx.fillText(z.shortName.toUpperCase(), 256, 64);
  const tex = new THREE.CanvasTexture(labelCanvas);
  tex.colorSpace = THREE.SRGBColorSpace;
  const labelMat = new THREE.SpriteMaterial({ map: tex, transparent: true, opacity: 0.0, depthTest: false });
  const label = new THREE.Sprite(labelMat);
  label.scale.set(3.0, 0.75, 1);
  label.position.set(0, 0, 0.04);
  group.add(label);

  group.userData = { plane, edges, corners, label };
  scene.add(group);
  return group;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

  { role: 'elevator', isStaff: false, startPos: new THREE.Vector3(0, 0, -11) },
  { role: 'mingle', isStaff: false, startPos: new THREE.Vector3(-5, 0, 0) },
  { role: 'mingle', isStaff: false, startPos: new THREE.Vector3(4, 0, 4) },
  { role: 'mingle', isStaff: false, startPos: new THREE.Vector3(-7, 0, 2) },
];

for (let i = 0; i < PEOPLE_COUNT; i++) {
  const plan = ROLE_PLAN[i];
  const skin = SKIN_TONES[i % SKIN_TONES.length];
  const shirt = plan.isStaff
    ? STAFF_SHIRT_COLOR
    : GUEST_SHIRT_COLORS[(i * 3) % GUEST_SHIRT_COLORS.length];
  const pants = plan.isStaff ? 0x14181f : PANTS_COLORS[(i * 5) % PANTS_COLORS.length];
  const human = new Humanoid(skin, shirt, pants);
  human.position.copy(plan.startPos);

  // Map role → home zone (used for occupancy + drift target during zone-create phase)
  let homeZone = null;
  if (plan.role === 'checkin_staff' || plan.role === 'checkin_guest') homeZone = 'Check-in Queue';
  else if (plan.role === 'seating') homeZone = 'Lobby Seating';
  else if (plan.role === 'bar') homeZone = 'Lobby Bar';
  else if (plan.role === 'elevator') homeZone = 'Elevator Bank';

  // Speed: staff stationary or slow, guests vary
  let speed;
  if (plan.role === 'checkin_staff') speed = 0.0;            // stay behind counter
  else if (plan.role === 'concierge_staff') speed = (i === 3) ? 0.5 : 0.0; // one moves slightly
  else if (plan.role === 'checkin_guest') speed = 0.45;
  else if (plan.role === 'seating') speed = 0.0;             // mostly stationary, "waiting"
  else if (plan.role === 'bar') speed = 0.40;
  else if (plan.role === 'elevator') speed = 1.05 + Math.random() * 0.4;
  else speed = 0.80 + Math.random() * 0.4;

  human.userData = {
    target: new THREE.Vector3(),
    speed,
    waitTime: 0,
    pickNew: true,
    role: plan.role,
    isStaff: plan.isStaff,
    homeZone,
    bobOffset: Math.random() * Math.PI * 2,
    velocityCache: 0,
    sittingAt: null,
  };
  peopleGroup.add(human);
  people.push(human);
}

// Zone target sample positions (for live behavior)
const TARGETS_BY_ZONE = {
  'Check-in Queue': () => new THREE.Vector3(-10 + (Math.random() - 0.5) * 4, 0, -8.5 + (Math.random() - 0.5) * 2),
  'Lobby Seating':  () => new THREE.Vector3(0 + (Math.random() - 0.5) * 4, 0, 6.5 + (Math.random() - 0.5) * 4),
  'Lobby Bar':      () => new THREE.Vector3(13 + (Math.random() - 0.5) * 3, 0, -10 + (Math.random() - 0.5) * 0.6),
  'Elevator Bank':  () => new THREE.Vector3(-2 + (Math.random() - 0.5) * 8, 0, -12.5 + (Math.random() - 0.5) * 1.5)
};

function pickTarget(person) {
  const ud = person.userData;
  let zone;
  if (ud.role === 'checkin_staff') {
    // staff stays behind counter
    ud.target.set(-10 + (Math.random() - 0.5) * 3, 0, -10.2 + (Math.random() - 0.5) * 0.4);
    ud.targetZone = 'Check-in Queue';
    ud.waitTime = 5 + Math.random() * 5;
    ud.pickNew = false;
    return;
  }
  if (ud.role === 'concierge_staff') {
    // gentle drift around concierge desk
    ud.target.set(7.5 + (Math.random() - 0.5) * 2, 0, 0 + (Math.random() - 0.5) * 1.6);
    ud.targetZone = null;
    ud.waitTime = 4 + Math.random() * 4;
    ud.pickNew = false;
    return;
  }
  if (ud.role === 'checkin_guest') {
    zone = 'Check-in Queue';
    ud.waitTime = 4 + Math.random() * 4;
  } else if (ud.role === 'seating') {
    zone = 'Lobby Seating';
    ud.waitTime = 8 + Math.random() * 6; // dwell long, "waiting"
  } else if (ud.role === 'bar') {
    zone = 'Lobby Bar';
    ud.waitTime = 5 + Math.random() * 5;
  } else if (ud.role === 'elevator') {
    // Walk to/from elevator bank, alternating
    if (Math.random() < 0.5) {
      ud.target.set(-2 + (Math.random() - 0.5) * 8, 0, -12.5 + (Math.random() - 0.5) * 1.0);
    } else {
      // exit toward seating / center
      ud.target.set((Math.random() - 0.5) * 12, 0, (Math.random() - 0.2) * 6);
    }
    ud.targetZone = 'Elevator Bank';
    ud.waitTime = 1.0 + Math.random() * 1.5;
    ud.pickNew = false;
    return;
  } else {
    // mingle
    const r = Math.random();
    if (r < 0.30) zone = 'Check-in Queue';
    else if (r < 0.60) zone = 'Lobby Seating';
    else if (r < 0.80) zone = 'Elevator Bank';
    else zone = 'Lobby Bar';
    ud.waitTime = 2 + Math.random() * 3;
  }
  ud.target.copy(TARGETS_BY_ZONE[zone]());
  ud.targetZone = zone;
  ud.pickNew = false;
}

function pointInZone(point, zone) {
  const t = zone.target;
  const dx = point.x - t.pos.x;
  const dz = point.z - t.pos.z;
  const w = t.size.w / 2, h = t.size.h / 2;
  return Math.abs(dx) < w && Math.abs(dz) < h;
}

// ============= UI WIRING =============
const zoneListEl = document.getElementById('zones');
const zoneRowEls = {};
ZONES.forEach((z) => {
  const row = document.createElement('div');
  row.className = 'zoneRow';
  const swatch = `<div class="swatch" style="background:#${z.color.toString(16).padStart(6,'0')}"></div>`;
  row.innerHTML = `${swatch}<div class="zoneName">${z.name}</div><div class="count countDash" data-zone="${z.name}">—</div>`;
  zoneListEl.appendChild(row);
  zoneRowEls[z.name] = row;
});
const countEls = {};
ZONES.forEach(z => { countEls[z.name] = document.querySelector(`[data-zone="${z.name}"]`); });

const STEPS = [
  { num: '01', name: 'Define' },
  { num: '02', name: 'Orient' },
  { num: '03', name: 'Anchor' },
  { num: '04', name: 'Commit' },
];

const stepNumEl = document.getElementById('stepNum');
const stepNameEl = document.getElementById('stepName');
const stepProgEl = document.getElementById('stepProgressFill');
const captionEl = document.getElementById('caption');
const captionTextEl = document.getElementById('captionText');
const scrubberFillEl = document.getElementById('scrubberFill');
const zonesTotalEl = document.getElementById('zonesTotal');
const endCardEl = document.getElementById('endCard');

function setStep(num, name, progress) {
  if (stepNumEl.textContent !== num) stepNumEl.textContent = num;
  if (stepNameEl.textContent !== name) stepNameEl.textContent = name;
  stepProgEl.style.width = (progress * 100) + '%';
}
function showCaption(text) {
  if (captionTextEl.textContent === text && captionEl.classList.contains('visible')) return;
  captionTextEl.textContent = text;
  captionEl.classList.add('visible');
}
function hideCaption() { captionEl.classList.remove('visible'); }

// ============= TIMELINE =============
// 4 zones × 3.6s = 14.4s for zone creation + 3.0s intro + 12.0s live + 4.5s endcard = 33.9s total
const TIMELINE = [
  { kind: 'intro', dur: 3.0 },
  { kind: 'zone', zoneIdx: 0, dur: 3.6 },
  { kind: 'zone', zoneIdx: 1, dur: 3.6 },
  { kind: 'zone', zoneIdx: 2, dur: 3.6 },
  { kind: 'zone', zoneIdx: 3, dur: 3.6 },
  { kind: 'live', dur: 12.0 },
  { kind: 'endcard', dur: 4.5 },
];
const LOOP_TOTAL = TIMELINE.reduce((a, s) => a + s.dur, 0);

function easeInOut(t) { return t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2)/2; }
function easeOut(t) { return 1 - Math.pow(1-t, 3); }
function easeIn(t)  { return t * t * t; }

// ============= SFX TRIGGER STATE =============
const sfxState = {
  zoneIdx: -1,
  cornersPlaced: -1,
  whooshFired: false,
  placeFired: false,
  commitFired: false,
  liveFired: false,
};
function resetSfxStateForZone(zoneIdx) {
  sfxState.zoneIdx = zoneIdx;
  sfxState.cornersPlaced = 0;
  sfxState.whooshFired = false;
  sfxState.placeFired = false;
  sfxState.commitFired = false;
}

function animateZone(zone, group, p) {
  const { plane, edges, corners, label } = group.userData;
  const t = zone.target;

  const hoverPos = new THREE.Vector3(t.pos.x, t.pos.y + 4.2, t.pos.z + 1.2);

  if (p < 0.18) {
    const u = p / 0.18;
    plane.material.opacity = 0;
    edges.material.opacity = easeOut(u) * 0.95;
    const cornersToPlace = Math.floor(u * 4);
    corners.children.forEach((c, ci) => {
      c.material.opacity = ci <= cornersToPlace ? easeOut(Math.min(1, (u * 4) - ci)) : 0;
    });
    if (cornersToPlace > sfxState.cornersPlaced) {
      sfxState.cornersPlaced = cornersToPlace;
      sfxClick();
    }
    group.position.copy(hoverPos);
    group.rotation.set(-0.55, u * 0.6, u * 0.4);
    group.scale.setScalar(0.7 + 0.3 * easeOut(u));
    label.material.opacity = 0;
  } else if (p < 0.55) {
    const u = (p - 0.18) / (0.55 - 0.18);
    edges.material.opacity = 0.95;
    corners.children.forEach(c => c.material.opacity = 1);
    if (!sfxState.whooshFired && u > 0.05) { sfxState.whooshFired = true; sfxWhoosh(); }
    group.position.copy(hoverPos);
    const yawSpins = 1.2;
    group.rotation.set(
      -0.55 + (t.rotEuler.x + 0.55) * easeInOut(u) * 0.55,
      Math.sin(u * Math.PI * 2 * yawSpins) * 0.8 * (1 - u) + 0.6 * (1 - u),
      Math.cos(u * Math.PI * yawSpins) * 0.4 * (1 - u) + 0.4 * (1 - u)
    );
    group.scale.setScalar(1.0);
  } else if (p < 0.82) {
    const u = (p - 0.55) / (0.82 - 0.55);
    const e = easeInOut(u);
    edges.material.opacity = 0.95;
    corners.children.forEach(c => c.material.opacity = 1);
    group.position.lerpVectors(hoverPos, t.pos, e);
    const startRotX = -0.55 + (t.rotEuler.x + 0.55) * 0.55;
    group.rotation.x = startRotX + (t.rotEuler.x - startRotX) * e;
    group.rotation.y = t.rotEuler.y;
    group.rotation.z = t.rotEuler.z;
    if (!sfxState.placeFired && u > 0.85) { sfxState.placeFired = true; sfxPlace(); }
  } else {
    const u = (p - 0.82) / (1.0 - 0.82);
    const e = easeOut(u);
    edges.material.opacity = 0.95;
    corners.children.forEach(c => c.material.opacity = 1 - e * 0.6);
    plane.material.opacity = e * 0.30;
    group.position.copy(t.pos);
    group.rotation.copy(t.rotEuler);
    label.material.opacity = e;
    label.position.set(0, 0, 0.06);
    if (!sfxState.commitFired && u > 0.05) { sfxState.commitFired = true; sfxCommit(); }
  }
}

function holdZone(group) {
  const { plane, edges, corners, label } = group.userData;
  plane.material.opacity = 0.30;
  edges.material.opacity = 0.95;
  corners.children.forEach(c => c.material.opacity = 0.4);
  label.material.opacity = 1;
}

function hideZone(group) {
  const { plane, edges, corners, label } = group.userData;
  plane.material.opacity = 0;
  edges.material.opacity = 0;
  corners.children.forEach(c => c.material.opacity = 0);
  label.material.opacity = 0;
}

// ============= CINEMATIC INTRO CAMERA =============
const introStartPos = new THREE.Vector3(22, 4.5, 28);
const introEndPos = new THREE.Vector3(14, 11, 18);
const introStartTarget = new THREE.Vector3(0, 0.5, 0);

function applyIntroCamera(p) {
  const e = easeInOut(p);
  camera.position.lerpVectors(introStartPos, introEndPos, e);
  controls.target.copy(introStartTarget);
  camera.lookAt(controls.target);
}

let liveEnabledControls = false;
function enableControlsOnce() {
  if (liveEnabledControls) return;
  liveEnabledControls = true;
  controls.enabled = true;
}

// ============= MAIN LOOP =============
let loopT = 0;
const clock = new THREE.Clock();

setTimeout(() => document.getElementById('loading').classList.add('hidden'), 400);

function tick() {
  const dt = Math.min(clock.getDelta(), 0.05);
  loopT = (loopT + dt) % LOOP_TOTAL;

  let acc = 0;
  let phase = null;
  let phaseT = 0;
  let phaseIdx = 0;
  for (let i = 0; i < TIMELINE.length; i++) {
    const seg = TIMELINE[i];
    if (loopT < acc + seg.dur) { phase = seg; phaseT = (loopT - acc) / seg.dur; phaseIdx = i; break; }
    acc += seg.dur;
  }

  scrubberFillEl.style.width = (loopT / LOOP_TOTAL * 100) + '%';

  // ===== CAMERA =====
  if (phase.kind === 'intro') {
    applyIntroCamera(phaseT);
  } else {
    if (!liveEnabledControls) enableControlsOnce();
    if (phase.kind === 'live') {
      controls.target.set(0, 0.5, 0);
    }
    controls.update();
  }

  // ===== ZONES =====
  for (let i = 0; i < ZONES.length; i++) {
    if (phase.kind === 'zone' && phase.zoneIdx === i) {
      if (sfxState.zoneIdx !== i) resetSfxStateForZone(i);
      animateZone(ZONES[i], zoneObjects[i], phaseT);
      zoneRowEls[ZONES[i].name].classList.add('active');
    } else if ((phase.kind === 'zone' && i < phase.zoneIdx) || phase.kind === 'live' || phase.kind === 'endcard') {
      holdZone(zoneObjects[i]);
      zoneRowEls[ZONES[i].name].classList.remove('active');
    } else {
      hideZone(zoneObjects[i]);
      zoneRowEls[ZONES[i].name].classList.remove('active');
    }
  }

  // ===== STEP PILL + CAPTION =====
  if (phase.kind === 'intro') {
    setStep('—', 'Ready', phaseT);
    hideCaption();
    zonesTotalEl.textContent = '0 placed';
  } else if (phase.kind === 'zone') {
    let stepIdx = 0;
    if (phaseT < 0.18) stepIdx = 0;
    else if (phaseT < 0.55) stepIdx = 1;
    else if (phaseT < 0.82) stepIdx = 2;
    else stepIdx = 3;
    setStep(STEPS[stepIdx].num, STEPS[stepIdx].name, phaseT);
    showCaption(ZONES[phase.zoneIdx].caption);
    zonesTotalEl.textContent = `${phase.zoneIdx} placed`;
  } else if (phase.kind === 'live') {
    setStep('—', 'Tracking', 1);
    if (!sfxState.liveFired) { sfxState.liveFired = true; sfxLiveStart(); }
    showCaption('Counts are physical. Zones are surfaces, not pixels.');
    zonesTotalEl.textContent = '4 placed';
  } else if (phase.kind === 'endcard') {
    setStep('—', 'Complete', 1);
    hideCaption();
    sfxState.liveFired = false;
  }

  if (phase.kind !== 'live' && phase.kind !== 'endcard') sfxState.liveFired = false;

  // ===== END CARD VISIBILITY =====
  if (phase.kind === 'endcard') {
    endCardEl.classList.add('visible');
  } else {
    endCardEl.classList.remove('visible');
  }

  // ===== MANNEQUINS =====
  const occ = { 'Check-in Queue': 0, 'Lobby Seating': 0, 'Lobby Bar': 0, 'Elevator Bank': 0 };
  if (phase.kind === 'live') {
    for (const person of people) {
      const ud = person.userData;
      if (ud.pickNew) pickTarget(person);
      const dir = new THREE.Vector3().subVectors(ud.target, person.position); dir.y = 0;
      const dist = dir.length();
      let velocity = 0;
      if (dist > 0.4 && ud.speed > 0.01) {
        const step = ud.speed * dt;
        dir.normalize().multiplyScalar(step);
        person.position.add(dir);
        person.rotation.y = Math.atan2(dir.x, dir.z);
        velocity = ud.speed;
        person.setPose && person.setPose('walk');
        ud.sittingAt = null;
      } else {
        ud.waitTime -= dt;
        velocity = 0;
        // Seating mannequins: stand pose (per spec — they read as "waiting", not seated)
        // checkin_staff & concierge_staff: stationary stand
        if (person.setPose) person.setPose('stand');
        if (ud.waitTime <= 0) ud.pickNew = true;
      }
      if (person.update) person.update(dt, velocity, loopT);

      // Hit-test in floor xy
      const sample = new THREE.Vector3(person.position.x, 0, person.position.z);
      for (const z of ZONES) {
        if (z.name === 'Lobby Bar') {
          const t = z.target;
          const dx = sample.x - t.pos.x, dz = sample.z - t.pos.z;
          if (Math.abs(dx) < t.size.w / 2 + 0.5 && Math.abs(dz) < t.size.h / 2 + 0.5) { occ['Lobby Bar']++; break; }
        } else if (pointInZone(sample, z)) { occ[z.name]++; break; }
      }
    }
  } else if (phase.kind === 'zone') {
    // gentle drift to home zone during zone-creation phase
    for (const person of people) {
      const ud = person.userData;
      if (!ud.driftSet && ud.homeZone) {
        ud.driftTarget = TARGETS_BY_ZONE[ud.homeZone]();
        ud.driftSet = true;
      }
      let velocity = 0;
      if (ud.driftTarget) {
        const dx = ud.driftTarget.x - person.position.x;
        const dz = ud.driftTarget.z - person.position.z;
        const step = Math.hypot(dx, dz) * 0.008;
        person.position.x += dx * 0.008;
        person.position.z += dz * 0.008;
        if (Math.abs(dx) > 0.05 || Math.abs(dz) > 0.05) {
          person.rotation.y = Math.atan2(dx, dz);
          velocity = step / Math.max(dt, 0.001);
        }
      }
      if (person.setPose) person.setPose('stand');
      if (person.update) person.update(dt, Math.min(velocity, 1.2), loopT);
    }
  } else if (phase.kind === 'endcard' || phase.kind === 'intro') {
    for (const person of people) {
      if (person.setPose) person.setPose('stand');
      if (person.update) person.update(dt, 0, loopT);
    }
  }

  for (const z of ZONES) {
    if (phase.kind === 'live') {
      countEls[z.name].textContent = occ[z.name];
      countEls[z.name].classList.remove('countDash');
    } else {
      countEls[z.name].textContent = '—';
      countEls[z.name].classList.add('countDash');
    }
  }

  composer.render();
  requestAnimationFrame(tick);
}

// ============= POST-PROCESSING (Unreal Bloom) =============
const composer = new EffectComposer(renderer);
composer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
composer.setSize(window.innerWidth, window.innerHeight);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight),
  0.45,   // strength
  0.85,   // radius
  0.85,   // threshold
);
composer.addPass(bloomPass);
composer.addPass(new OutputPass());

tick();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
  bloomPass.setSize(window.innerWidth, window.innerHeight);
});

document.getElementById('replay').addEventListener('click', () => {
  loopT = 0;
  liveEnabledControls = false;
  controls.enabled = false;
  people.forEach(p => { p.userData.driftSet = false; });
});

document.getElementById('endCta').addEventListener('click', (e) => {
  e.preventDefault();
  window.open('https://calendly.com', '_blank');
});
</script>
</body>
