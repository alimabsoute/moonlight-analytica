<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Janus — 3D Zone Concept</title>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0f1116; color: #e8eaee; font-family: -apple-system, "SF Pro Display", "Inter", sans-serif; overflow: hidden; }
  #app { position: fixed; inset: 0; }
  #hud {
    position: fixed; top: 24px; left: 24px; z-index: 10; max-width: 380px;
    background: rgba(12, 14, 20, 0.78); backdrop-filter: blur(14px);
    border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 18px 20px;
  }
  #hud h1 { font-size: 13px; letter-spacing: 0.18em; margin: 0 0 4px; color: #8a8f99; font-weight: 600; }
  #hud h2 { font-size: 22px; margin: 0 0 12px; font-weight: 600; letter-spacing: -0.01em; }
  #status { font-size: 14px; color: #cbd0d8; min-height: 20px; }
  #status .step { color: #4d9bff; font-weight: 600; }
  .live { display: inline-flex; align-items: center; gap: 6px; padding: 3px 9px; background: rgba(0, 200, 100, 0.12); color: #2ecc71; border-radius: 999px; font-size: 11px; font-weight: 600; letter-spacing: 0.06em; }
  .live::before { content: ""; width: 6px; height: 6px; border-radius: 50%; background: #2ecc71; }
  #zones { margin-top: 14px; display: grid; gap: 8px; }
  .zoneRow { display: grid; grid-template-columns: 14px 1fr auto; align-items: center; gap: 10px; padding: 8px 10px; background: rgba(255,255,255,0.03); border-radius: 8px; font-size: 13px; }
  .swatch { width: 12px; height: 12px; border-radius: 3px; }
  .count { font-variant-numeric: tabular-nums; font-weight: 600; }
  #legend { position: fixed; bottom: 18px; left: 24px; z-index: 10; font-size: 11px; color: #6a6f78; letter-spacing: 0.04em; }
  #replay { position: fixed; bottom: 18px; right: 24px; z-index: 10; padding: 8px 16px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.04); color: #cbd0d8; border-radius: 8px; font-size: 12px; cursor: pointer; letter-spacing: 0.05em; }
  #replay:hover { background: rgba(255,255,255,0.08); }
</style>
</head>
<body>
<div id="app"></div>

<div id="hud">
  <h1>JANUS  <span class="live">LIVE</span></h1>
  <h2>3D Zone Placement</h2>
  <div id="status"><span class="step">step 1</span> &middot; create &amp; orient zone in 3D space</div>
  <div id="zones"></div>
</div>
<div id="legend">drag to orbit  &middot;  scroll to zoom  &middot;  zones lie on real surfaces in world space</div>
<button id="replay">replay</button>

<script type="importmap">
{ "imports": {
  "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
  "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const root = document.getElementById('app');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
root.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0f1116);
scene.fog = new THREE.Fog(0x0f1116, 30, 80);

const camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(14, 11, 18);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 0.5, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.maxPolarAngle = Math.PI * 0.49;
controls.minDistance = 6;
controls.maxDistance = 50;

scene.add(new THREE.AmbientLight(0xffffff, 0.55));
const key = new THREE.DirectionalLight(0xffffff, 1.1);
key.position.set(12, 18, 8);
key.castShadow = true;
key.shadow.mapSize.set(2048, 2048);
key.shadow.camera.left = -20; key.shadow.camera.right = 20;
key.shadow.camera.top = 20; key.shadow.camera.bottom = -20;
scene.add(key);
const fill = new THREE.DirectionalLight(0x6a8eff, 0.35);
fill.position.set(-10, 8, -6);
scene.add(fill);

const floorGeo = new THREE.PlaneGeometry(40, 30, 1, 1);
const floorMat = new THREE.MeshStandardMaterial({ color: 0x1a1d24, roughness: 0.95, metalness: 0.0 });
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
scene.add(floor);

const grid = new THREE.GridHelper(40, 40, 0x2a2f3a, 0x202430);
grid.position.y = 0.001;
scene.add(grid);

function box(w, h, d, color, x, y, z, opts={}) {
  const g = new THREE.BoxGeometry(w, h, d);
  const m = new THREE.MeshStandardMaterial({ color, roughness: 0.7, metalness: 0.05, ...opts });
  const mesh = new THREE.Mesh(g, m);
  mesh.position.set(x, y + h / 2, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  scene.add(mesh);
  return mesh;
}

box(40, 0.3, 0.2, 0x2a2f3a, 0, 0, -15);
box(0.2, 0.3, 30, 0x2a2f3a, -20, 0, 0);
box(0.2, 0.3, 30, 0x2a2f3a, 20, 0, 0);

box(3, 1.0, 1.6, 0x39424f, -8, 0, -6);

const barCounter = box(11, 1.05, 1.4, 0x39424f, 6, 0, -8);
box(11, 0.05, 1.4, 0x4a5563, 6, 1.05, -8, { roughness: 0.4 });

for (let i = 0; i < 6; i++) {
  const tx = -10 + (i % 3) * 5;
  const tz = i < 3 ? 2 : 7;
  box(1.6, 0.75, 1.6, 0x39424f, tx, 0, tz);
  for (let c = 0; c < 4; c++) {
    const cx = tx + (c % 2 === 0 ? -1.0 : 1.0);
    const cz = tz + (c < 2 ? -1.0 : 1.0);
    box(0.45, 0.45, 0.45, 0x2f3744, cx, 0, cz);
  }
}

const ZONES = [
  {
    name: 'Entrance',
    color: 0x4d9bff,
    target: {
      pos: new THREE.Vector3(-8, 0.012, -6),
      rotEuler: new THREE.Euler(-Math.PI / 2, 0, 0),
      size: { w: 6, h: 5 }
    },
    countTarget: 3
  },
  {
    name: 'Dining',
    color: 0xff8a3d,
    target: {
      pos: new THREE.Vector3(-5, 0.012, 4.5),
      rotEuler: new THREE.Euler(-Math.PI / 2, 0, 0),
      size: { w: 14, h: 10 }
    },
    countTarget: 8
  },
  {
    name: 'Bar Top',
    color: 0xb56cff,
    target: {
      pos: new THREE.Vector3(6, 1.085, -8),
      rotEuler: new THREE.Euler(-Math.PI / 2, 0, 0),
      size: { w: 10.5, h: 1.2 }
    },
    countTarget: 4
  }
];

function buildZone(z) {
  const group = new THREE.Group();
  const w = z.target.size.w, h = z.target.size.h;

  const planeGeo = new THREE.PlaneGeometry(w, h);
  const planeMat = new THREE.MeshBasicMaterial({
    color: z.color, transparent: true, opacity: 0.0,
    side: THREE.DoubleSide, depthWrite: false
  });
  const plane = new THREE.Mesh(planeGeo, planeMat);
  group.add(plane);

  const edgeGeo = new THREE.EdgesGeometry(planeGeo);
  const edgeMat = new THREE.LineBasicMaterial({
    color: z.color, transparent: true, opacity: 0.0, linewidth: 2
  });
  const edges = new THREE.LineSegments(edgeGeo, edgeMat);
  group.add(edges);

  const corners = new THREE.Group();
  const cornerCoords = [[-w/2,-h/2],[w/2,-h/2],[w/2,h/2],[-w/2,h/2]];
  cornerCoords.forEach(([x, y]) => {
    const cg = new THREE.SphereGeometry(0.18, 12, 12);
    const cm = new THREE.MeshBasicMaterial({ color: z.color, transparent: true, opacity: 0.0 });
    const c = new THREE.Mesh(cg, cm);
    c.position.set(x, y, 0);
    corners.add(c);
  });
  group.add(corners);

  const labelCanvas = document.createElement('canvas');
  labelCanvas.width = 512; labelCanvas.height = 128;
  const ctx = labelCanvas.getContext('2d');
  ctx.fillStyle = `#${z.color.toString(16).padStart(6,'0')}`;
  roundRect(ctx, 0, 0, 512, 128, 18); ctx.fill();
  ctx.fillStyle = '#ffffff';
  ctx.font = '700 56px -apple-system, "SF Pro Display", Inter, sans-serif';
  ctx.textBaseline = 'middle'; ctx.textAlign = 'center';
  ctx.fillText(z.name.toUpperCase(), 256, 64);
  const tex = new THREE.CanvasTexture(labelCanvas);
  tex.colorSpace = THREE.SRGBColorSpace;
  const labelMat = new THREE.SpriteMaterial({ map: tex, transparent: true, opacity: 0.0, depthTest: false });
  const label = new THREE.Sprite(labelMat);
  label.scale.set(3.4, 0.85, 1);
  label.position.set(0, 0, 0.04);
  group.add(label);

  group.userData = { plane, edges, corners, label };
  scene.add(group);
  return group;
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r); ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

const zoneObjects = ZONES.map(buildZone);

const PEOPLE_COUNT = 14;
const people = [];
const peopleGroup = new THREE.Group();
scene.add(peopleGroup);
for (let i = 0; i < PEOPLE_COUNT; i++) {
  const personGroup = new THREE.Group();
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0xc9d4e5, roughness: 0.6 });
  const body = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.22, 1.2, 16), bodyMat);
  body.position.y = 0.6; body.castShadow = true;
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.22, 16, 16), bodyMat);
  head.position.y = 1.45; head.castShadow = true;
  personGroup.add(body); personGroup.add(head);

  const startSide = Math.random() < 0.5 ? -1 : 1;
  personGroup.position.set(startSide * (15 + Math.random() * 3), 0, -10 + Math.random() * 18);
  personGroup.userData = {
    target: new THREE.Vector3(),
    speed: 1.2 + Math.random() * 0.8,
    waitTime: 0,
    pickNew: true
  };
  peopleGroup.add(personGroup);
  people.push(personGroup);
}

const TARGETS_BY_ZONE = {
  Entrance: () => new THREE.Vector3(-8 + (Math.random() - 0.5) * 4, 0, -6 + (Math.random() - 0.5) * 3),
  Dining:   () => new THREE.Vector3(-5 + (Math.random() - 0.5) * 12, 0, 4.5 + (Math.random() - 0.5) * 8),
  'Bar Top':() => new THREE.Vector3(6 + (Math.random() - 0.5) * 9, 0, -7 + (Math.random() - 0.5) * 0.6)
};
const ZONE_NAMES = ZONES.map(z => z.name);

function pickTarget(person) {
  const r = Math.random();
  let zone;
  if (r < 0.25) zone = 'Entrance';
  else if (r < 0.7) zone = 'Dining';
  else zone = 'Bar Top';
  person.userData.target.copy(TARGETS_BY_ZONE[zone]());
  person.userData.targetZone = zone;
  person.userData.pickNew = false;
  person.userData.waitTime = 1.5 + Math.random() * 4;
}

function pointInZone(point, zone) {
  const t = zone.target;
  const dx = point.x - t.pos.x;
  const dz = point.z - t.pos.z;
  const w = t.size.w / 2, h = t.size.h / 2;
  const yMatch = zone.name === 'Bar Top' ? Math.abs(point.y - 1.0) < 1.4 : true;
  return Math.abs(dx) < w && Math.abs(dz) < h && yMatch;
}

const zoneListEl = document.getElementById('zones');
ZONES.forEach((z) => {
  const row = document.createElement('div');
  row.className = 'zoneRow';
  const swatch = `<div class="swatch" style="background:#${z.color.toString(16).padStart(6,'0')}"></div>`;
  row.innerHTML = `${swatch}<div>${z.name}</div><div class="count" data-zone="${z.name}">—</div>`;
  zoneListEl.appendChild(row);
});
const countEls = {};
ZONES.forEach(z => { countEls[z.name] = document.querySelector(`[data-zone="${z.name}"]`); });

const statusEl = document.getElementById('status');
function setStatus(step, text) {
  statusEl.innerHTML = `<span class="step">${step}</span> &middot; ${text}`;
}

const TIMELINE = [
  { kind: 'zone', zoneIdx: 0, dur: 3.6 },
  { kind: 'zone', zoneIdx: 1, dur: 3.6 },
  { kind: 'zone', zoneIdx: 2, dur: 3.6 },
  { kind: 'live', dur: 14.0 }
];
const LOOP_TOTAL = TIMELINE.reduce((a, s) => a + s.dur, 0);

function easeInOut(t) { return t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2)/2; }
function easeOut(t) { return 1 - Math.pow(1-t, 3); }

function animateZone(zone, group, p) {
  const { plane, edges, corners, label } = group.userData;
  const t = zone.target;

  const hoverPos = new THREE.Vector3(t.pos.x, t.pos.y + 4.2, t.pos.z + 1.2);

  if (p < 0.18) {
    const u = p / 0.18;
    plane.material.opacity = 0;
    edges.material.opacity = easeOut(u) * 0.95;
    corners.children.forEach(c => c.material.opacity = easeOut(u));
    group.position.copy(hoverPos);
    group.rotation.set(-0.55, u * 0.6, u * 0.4);
    group.scale.setScalar(0.6 + 0.4 * easeOut(u));
    label.material.opacity = 0;
  } else if (p < 0.55) {
    const u = (p - 0.18) / (0.55 - 0.18);
    edges.material.opacity = 0.95;
    corners.children.forEach(c => c.material.opacity = 1);
    group.position.copy(hoverPos);
    const yawSpins = 1.2;
    group.rotation.set(
      -0.55 + (t.rotEuler.x + 0.55) * easeInOut(u) * 0.55,
      Math.sin(u * Math.PI * 2 * yawSpins) * 0.8 * (1 - u) + 0.6 * (1 - u),
      Math.cos(u * Math.PI * yawSpins) * 0.4 * (1 - u) + 0.4 * (1 - u)
    );
    group.scale.setScalar(1.0);
  } else if (p < 0.82) {
    const u = (p - 0.55) / (0.82 - 0.55);
    const e = easeInOut(u);
    edges.material.opacity = 0.95;
    corners.children.forEach(c => c.material.opacity = 1);
    group.position.lerpVectors(hoverPos, t.pos, e);
    const startRotX = -0.55 + (t.rotEuler.x + 0.55) * 0.55;
    group.rotation.x = startRotX + (t.rotEuler.x - startRotX) * e;
    group.rotation.y = t.rotEuler.y;
    group.rotation.z = t.rotEuler.z;
  } else {
    const u = (p - 0.82) / (1.0 - 0.82);
    const e = easeOut(u);
    edges.material.opacity = 0.95;
    corners.children.forEach(c => c.material.opacity = 1 - e * 0.6);
    plane.material.opacity = e * 0.30;
    group.position.copy(t.pos);
    group.rotation.copy(t.rotEuler);
    label.material.opacity = e;
    label.position.set(0, 0, 0.06);
  }
}

function holdZone(group) {
  const { plane, edges, corners, label } = group.userData;
  plane.material.opacity = 0.30;
  edges.material.opacity = 0.95;
  corners.children.forEach(c => c.material.opacity = 0.4);
  label.material.opacity = 1;
}

function hideZone(group) {
  const { plane, edges, corners, label } = group.userData;
  plane.material.opacity = 0;
  edges.material.opacity = 0;
  corners.children.forEach(c => c.material.opacity = 0);
  label.material.opacity = 0;
}

let loopT = 0;
const clock = new THREE.Clock();

function tick() {
  const dt = Math.min(clock.getDelta(), 0.05);
  loopT = (loopT + dt) % LOOP_TOTAL;

  let acc = 0;
  let phase = null;
  let phaseT = 0;
  for (const seg of TIMELINE) {
    if (loopT < acc + seg.dur) { phase = seg; phaseT = (loopT - acc) / seg.dur; break; }
    acc += seg.dur;
  }

  for (let i = 0; i < ZONES.length; i++) {
    if (phase.kind === 'zone' && phase.zoneIdx === i) {
      animateZone(ZONES[i], zoneObjects[i], phaseT);
    } else if (phase.kind === 'zone' && i < phase.zoneIdx) {
      holdZone(zoneObjects[i]);
    } else if (phase.kind === 'live') {
      holdZone(zoneObjects[i]);
    } else {
      hideZone(zoneObjects[i]);
    }
  }

  if (phase.kind === 'zone') {
    const zname = ZONES[phase.zoneIdx].name;
    if (phaseT < 0.18) setStatus(`step ${phase.zoneIdx + 1}.1`, `create &nbsp;<i style="opacity:0.6">— wireframe materializes above scene</i>`);
    else if (phaseT < 0.55) setStatus(`step ${phase.zoneIdx + 1}.2`, `rotate in 3D &nbsp;<i style="opacity:0.6">— pitch / yaw / roll</i>`);
    else if (phaseT < 0.82) setStatus(`step ${phase.zoneIdx + 1}.3`, `place on surface &nbsp;<i style="opacity:0.6">— ${zname.toLowerCase()}</i>`);
    else setStatus(`step ${phase.zoneIdx + 1}.4`, `commit &nbsp;<i style="opacity:0.6">— zone is live</i>`);
  } else {
    setStatus('LIVE', 'tracking active &middot; counts update in real time');
  }

  const occ = { Entrance: 0, Dining: 0, 'Bar Top': 0 };
  if (phase.kind === 'live') {
    for (const person of people) {
      const ud = person.userData;
      if (ud.pickNew) { pickTarget(person); }
      const dir = new THREE.Vector3().subVectors(ud.target, person.position); dir.y = 0;
      const dist = dir.length();
      if (dist > 0.4) {
        dir.normalize().multiplyScalar(ud.speed * dt);
        person.position.add(dir);
        person.rotation.y = Math.atan2(dir.x, dir.z);
      } else {
        ud.waitTime -= dt;
        if (ud.waitTime <= 0) ud.pickNew = true;
      }
      const sample = new THREE.Vector3(person.position.x, 0, person.position.z);
      for (const z of ZONES) {
        if (z.name === 'Bar Top') {
          const t = z.target;
          const dx = sample.x - t.pos.x, dz = sample.z - t.pos.z;
          if (Math.abs(dx) < t.size.w/2 + 0.5 && Math.abs(dz) < t.size.h/2 + 0.5) { occ['Bar Top']++; break; }
        } else if (pointInZone(sample, z)) { occ[z.name]++; break; }
      }
    }
  } else if (phase.kind === 'zone') {
    for (const person of people) {
      person.position.x += (person.userData.target.x - person.position.x) * 0.005;
      person.position.z += (person.userData.target.z - person.position.z) * 0.005;
    }
  }
  for (const z of ZONES) {
    countEls[z.name].textContent = phase.kind === 'live' ? occ[z.name] : '—';
  }

  controls.update();
  renderer.render(scene, camera);
  requestAnimationFrame(tick);
}
tick();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

document.getElementById('replay').addEventListener('click', () => { loopT = 0; });
</script>
</body>
</html>
