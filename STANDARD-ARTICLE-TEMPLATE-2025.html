<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ARTICLE_TITLE}} - Moonlight Analytica</title>
    
    <!-- Primary Meta Tags -->
    <meta name="title" content="{{SEO_TITLE}}">
    <meta name="description" content="{{SEO_DESCRIPTION}}">
    <meta name="keywords" content="{{SEO_KEYWORDS}}">
    <meta name="author" content="Moonlight Analytica">
    <meta name="robots" content="index, follow">
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="article">
    <meta property="og:url" content="https://moonlightanalytica.com/{{ARTICLE_FILENAME}}.html">
    <meta property="og:title" content="{{SEO_TITLE}}">
    <meta property="og:description" content="{{SEO_DESCRIPTION}}">
    <meta property="og:image" content="https://moonlightanalytica.com/{{PREVIEW_IMAGE}}">
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://moonlightanalytica.com/{{ARTICLE_FILENAME}}.html">
    <meta property="twitter:title" content="{{SEO_TITLE}}">
    <meta property="twitter:description" content="{{SEO_DESCRIPTION}}">
    <meta property="twitter:image" content="https://moonlightanalytica.com/{{PREVIEW_IMAGE}}">
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://moonlightanalytica.com/{{ARTICLE_FILENAME}}.html">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* STANDARD ARTICLE TEMPLATE CSS - TESTED & WORKING */
        
        /* Focus states for accessibility */
        button:focus, 
        input:focus, 
        textarea:focus, 
        select:focus, 
        a:focus {
            outline: 2px solid var(--cyber-blue, #00bfff);
            outline-offset: 2px;
        }

        .btn:focus {
            box-shadow: 0 0 0 3px rgba(0, 191, 255, 0.3);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary-neon: #3498db;
            --secondary-neon: #2980b9;
            --accent-blue: #3498db;
            --cyber-blue: #3498db;
            --cyber-green: #10b981;
            --cyber-cyan: #87ceeb;
            --bg-primary: #faf8f3;
            --bg-secondary: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --border-neon: rgba(52, 152, 219, 0.3);
            --shadow-neon: 0 0 20px rgba(52, 152, 219, 0.3);
        }
        
        /* VANILLA BACKGROUND - NO GRADIENTS */
        body {
            font-family: 'Inter', sans-serif;
            background: #faf8f3;
            color: #1f2937;
            line-height: 1.6;
            overflow-x: hidden;
        }
        
        /* STANDARD NAVIGATION - EXACT WORKING VERSION */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 20px 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid rgba(135, 206, 235, 0.2);
        }
        
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            padding: 0 10px;
            gap: 3rem;
        }
        
        .logo {
            font-family: 'Poppins', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: #e5e7eb;
            text-decoration: none;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s ease;
            text-shadow: 0 0 20px rgba(135, 206, 235, 0.4);
            animation: logoPulse 3s ease-in-out infinite;
        }
        
        .logo:hover {
            transform: scale(1.05);
            text-shadow: 0 0 30px rgba(135, 206, 235, 0.6);
            animation-duration: 1.5s;
        }
        
        .logo-icon {
            width: 50px;
            height: 50px;
            filter: drop-shadow(0 0 10px rgba(135, 206, 235, 0.5));
            animation: iconPulse 3s ease-in-out infinite 1.5s;
        }
        
        @keyframes logoPulse {
            0%, 100% {
                text-shadow: 0 0 20px rgba(135, 206, 235, 0.4);
                color: #e5e7eb;
            }
            50% {
                text-shadow: 0 0 50px rgba(135, 206, 235, 1.0), 0 0 80px rgba(70, 130, 180, 0.8);
                color: #00bfff;
            }
        }
        
        @keyframes iconPulse {
            0%, 100% {
                filter: drop-shadow(0 0 10px rgba(135, 206, 235, 0.5));
            }
            50% {
                filter: drop-shadow(0 0 50px rgba(135, 206, 235, 1.0)) drop-shadow(0 0 80px rgba(70, 130, 180, 0.8));
            }
        }
        
        .nav-menu {
            display: flex;
            list-style: none;
            gap: 2.5rem;
            margin-left: auto;
        }
        
        .nav-link {
            color: #1f2937;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
        }
        
        .nav-link:hover, .nav-link.active {
            color: #00bfff;
            text-shadow: 0 0 10px rgba(0, 191, 255, 0.5);
            transform: translateY(-2px);
        }
        
        /* Dropdown Styles */
        .nav-dropdown {
            position: relative;
        }
        
        .nav-dropdown-toggle {
            color: #1f2937;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            position: relative;
            padding-right: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .nav-dropdown-toggle::after {
            content: '▼';
            font-size: 0.7rem;
            transition: transform 0.3s ease;
            opacity: 0.8;
        }
        
        .nav-dropdown:hover .nav-dropdown-toggle::after {
            transform: rotate(180deg);
        }
        
        .nav-dropdown-toggle:hover {
            color: #00bfff;
            transform: translateY(-2px);
        }
        
        .dropdown-menu {
            position: absolute;
            top: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(135, 206, 235, 0.3);
            border-radius: 12px;
            padding: 15px 0;
            min-width: 200px;
            opacity: 0;
            visibility: hidden;
            transform: translateX(-50%) translateY(-10px);
            transition: all 0.3s ease;
            margin-top: 20px;
            box-shadow: 
                0 10px 40px rgba(0, 191, 255, 0.15),
                0 0 80px rgba(135, 206, 235, 0.1),
                inset 0 0 20px rgba(135, 206, 235, 0.05);
        }
        
        .nav-dropdown:hover .dropdown-menu {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) translateY(0);
        }
        
        .dropdown-item {
            display: block;
            padding: 10px 25px;
            color: #1f2937;
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .dropdown-item::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            width: 3px;
            height: 0;
            background: linear-gradient(180deg, transparent, #00bfff, transparent);
            transition: height 0.3s ease;
        }
        
        .dropdown-item:hover {
            background: rgba(135, 206, 235, 0.1);
            color: #00bfff;
            padding-left: 30px;
            text-shadow: 0 0 10px rgba(0, 191, 255, 0.5);
        }
        
        .dropdown-item:hover::before {
            height: 100%;
        }
        
        /* ARTICLE CONTAINER */
        .article-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 120px 40px 40px;
        }
        
        /* GOOGLE-STYLE ARTICLE HEADER - EXACT WORKING VERSION */
        .article-header {
            margin-bottom: 3rem;
        }
        
        .article-category {
            background: #8b5cf6;  /* Purple - change color as needed */
            color: white;
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-block;
            margin-bottom: 1.5rem;
        }
        
        .article-title {
            font-family: 'Poppins', sans-serif;
            font-size: 2.5rem;
            font-weight: 700;
            color: #1a1a1a;
            line-height: 1.2;
            margin-bottom: 1.5rem;
        }
        
        .article-meta {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        
        .author-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .author-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            color: white;
        }
        
        .article-meta span {
            color: #6b7280;
            font-size: 0.9rem;
        }
        
        /* SINGLE SEPARATOR LINE - NEVER DUPLICATE */
        .separator-line {
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #3498db, #2980b9);
            margin: 30px 0;
            border-radius: 2px;
        }

        /* PERFECT COMPANY LOGO SECTION - TESTED & WORKING */
        .company-logo-section {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 2.4rem 0;           /* 20% reduced margins */
            padding: 1.6rem;            /* 20% reduced padding */
            background: #fafafa;        /* ESSENTIAL gray background */
            border-radius: 8px;
        }

        .company-logo-image {
            width: 280px;               /* Standard size (30% smaller than 400px) */
            height: auto;
            max-width: 350px;
            min-width: 245px;
            object-fit: contain;
            filter: 
                drop-shadow(0 4px 12px rgba(0, 0, 0, 0.15))
                saturate(1.1)
                contrast(1.02);
            transition: all 0.3s ease;
        }

        /* MOBILE RESPONSIVE - ESSENTIAL */
        @media (max-width: 768px) {
            .company-logo-image {
                width: 245px;
                max-width: 280px;
                min-width: 196px;
            }
        }
        
        /* FORCE LOGO SIZE - USE IF CONFLICTS EXIST */
        .company-logo-section .company-logo-image {
            width: 280px !important;
            max-width: 350px !important;
            min-width: 245px !important;
        }

        /* Introduction Paragraph */
        .article-intro {
            margin-bottom: 3rem;
        }

        .article-intro p {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #374151;
            font-weight: 400;
            text-align: justify;
            margin: 0;
        }
        
        /* Article Content */
        .article-content {
            font-size: 1rem;
            line-height: 1.7;
            color: #4b5563;
        }
        
        .article-content h2 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.8rem;
            font-weight: 600;
            color: #1f2937;
            margin: 2rem 0 1rem;
        }
        
        .article-content h3 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.4rem;
            font-weight: 600;
            color: #374151;
            margin: 1.5rem 0 0.75rem;
        }
        
        .article-content p {
            margin-bottom: 1.2rem;
        }
        
        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .article-title {
                font-size: 2rem;
            }
            
            .article-meta {
                flex-wrap: wrap;
                gap: 0.5rem;
            }
            
            .article-container {
                padding: 100px 20px 40px;
            }
        }

        @media (max-width: 480px) {
            .article-title {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <!-- STANDARD NAVIGATION - NO PRODUCTS DROPDOWN -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="moonlight-complete-structure.html" class="logo">
                <svg class="logo-icon" width="50" height="50" viewBox="0 0 80 80">
                    <defs>
                        <linearGradient id="gradientPhase" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#ffffff">
                                <animate attributeName="stop-color" values="#ffffff;#00bfff;#ffffff" dur="3s" begin="1.5s" repeatCount="indefinite"/>
                            </stop>
                            <stop offset="50%" style="stop-color:#e5e7eb">
                                <animate attributeName="stop-color" values="#e5e7eb;#87ceeb;#e5e7eb" dur="3s" begin="1.5s" repeatCount="indefinite"/>
                            </stop>
                            <stop offset="100%" style="stop-color:#9ca3af">
                                <animate attributeName="stop-color" values="#9ca3af;#4682b4;#9ca3af" dur="3s" begin="1.5s" repeatCount="indefinite"/>
                            </stop>
                        </linearGradient>
                        <filter id="glowFilter">
                            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
                            <feMerge> 
                                <feMergeNode in="coloredBlur"/>
                                <feMergeNode in="SourceGraphic"/>
                            </feMerge>
                            <animate attributeName="stdDeviation" values="3;8;3" dur="3s" begin="1.5s" repeatCount="indefinite"/>
                        </filter>
                    </defs>
                    <g transform="translate(40, 40)" filter="url(#glowFilter)">
                        <circle cx="0" cy="0" r="35" fill="none" stroke="url(#gradientPhase)" stroke-width="1" opacity="0.2">
                            <animateTransform attributeName="transform" type="rotate" values="0 0 0;360 0 0" dur="30s" repeatCount="indefinite"/>
                            <animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" begin="1.5s" repeatCount="indefinite"/>
                        </circle>
                        <circle cx="0" cy="-20" r="6" fill="none" stroke="url(#gradientPhase)" stroke-width="2" opacity="0.8">
                            <animateTransform attributeName="transform" type="rotate" values="0 0 0;360 0 0" dur="8s" repeatCount="indefinite"/>
                            <animate attributeName="opacity" values="0.8;1.0;0.8" dur="3s" begin="1.5s" repeatCount="indefinite"/>
                        </circle>
                        <circle cx="0" cy="-20" r="3" fill="url(#gradientPhase)" opacity="0.9">
                            <animateTransform attributeName="transform" type="rotate" values="0 0 0;360 0 0" dur="8s" repeatCount="indefinite"/>
                            <animate attributeName="opacity" values="0.9;1.0;0.9" dur="3s" begin="1.5s" repeatCount="indefinite"/>
                        </circle>
                        <circle cx="0" cy="25" r="4" fill="none" stroke="url(#gradientPhase)" stroke-width="1.5" opacity="0.6">
                            <animateTransform attributeName="transform" type="rotate" values="0 0 0;-360 0 0" dur="12s" repeatCount="indefinite"/>
                            <animate attributeName="opacity" values="0.6;1.0;0.6" dur="3s" begin="1.5s" repeatCount="indefinite"/>
                        </circle>
                        <circle cx="0" cy="25" r="2" fill="url(#gradientPhase)" opacity="0.7">
                            <animateTransform attributeName="transform" type="rotate" values="0 0 0;-360 0 0" dur="12s" repeatCount="indefinite"/>
                            <animate attributeName="opacity" values="0.7;1.0;0.7" dur="3s" begin="1.5s" repeatCount="indefinite"/>
                        </circle>
                        <path d="M -15,-10 A 20,20 0 0,1 15,-10" fill="none" stroke="url(#gradientPhase)" stroke-width="2" opacity="0.4">
                            <animate attributeName="opacity" values="0.4;0.8;0.4" dur="6s" repeatCount="indefinite"/>
                        </path>
                    </g>
                </svg>
                Moonlight Analytica
            </a>
            <ul class="nav-menu">
                <li><a href="moonlight-complete-structure.html" class="nav-link">Home</a></li>
                <li><a href="solutions.html" class="nav-link">Solutions</a></li>
                <li class="nav-dropdown">
                    <a href="#" class="nav-dropdown-toggle">Content Hub</a>
                    <div class="dropdown-menu">
                        <a href="news.html" class="dropdown-item">News</a>
                        <a href="insights.html" class="dropdown-item">Insights</a>
                        <a href="trends.html" class="dropdown-item">Trends</a>
                        <a href="games.html" class="dropdown-item">Games</a>
                    </div>
                </li>
                <li><a href="contact.html" class="nav-link">Contact</a></li>
            </ul>
        </div>
    </nav>

    <!-- ARTICLE CONTENT -->
    <main class="article-container">
        <!-- GOOGLE-STYLE HEADER - EXACT WORKING FORMAT -->
        <header class="article-header">
            <!-- Category Tag -->
            <div class="article-category">
                {{CATEGORY}}
            </div>

            <!-- Main Title -->
            <h1 class="article-title">{{ARTICLE_TITLE}}</h1>
            
            <!-- Meta Information -->
            <div class="article-meta">
                <div class="author-info">
                    <div class="author-avatar">🌙</div>
                    <span>Moonlight Analytica Team</span>
                </div>
                <span>•</span>
                <span>{{PUBLISH_DATE}}</span>
                <span>•</span>

            <!-- SINGLE Separator Line -->
            <div class="separator-line"></div>

            <!-- Company Logo Section -->
            <div class="company-logo-section">
                <img src="{{COMPANY_LOGO}}" alt="{{COMPANY_NAME}}" class="company-logo-image">
            </div>

            <!-- Introduction Paragraph -->
            <div class="article-intro">
                <p>{{INTRO_PARAGRAPH}}</p>
            </div>
        </header>

        <!-- Article Content -->
        <div class="article-content">
            {{ARTICLE_CONTENT}}
        </div>

</body>
</html>

<!-- 
REPLACEMENT VARIABLES:
{{ARTICLE_TITLE}} - Main headline

{{ARTICLE_FILENAME}} - File name without .html
{{PREVIEW_IMAGE}} - Social media preview image
