<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Janus — 3D Polygonal Zone Visualization</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  body{
    background:#0c0e14;
    font-family:'Inter','Segoe UI',system-ui,-apple-system,sans-serif;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    color:#e0e6f0;
    overflow:hidden;
  }

  /* =============================================
     ZONE VIZ WRAPPER — FULL VIEWPORT SHOWPIECE
     ============================================= */
  .zone-viz{
    position:relative;
    width:min(95vw,1100px);
    height:clamp(600px,80vh,850px);
    border-radius:20px;
    background:linear-gradient(145deg,#11131a 0%,#161924 50%,#11131a 100%);
    border:1px solid rgba(77,216,230,.12);
    box-shadow:
      0 0 80px rgba(77,216,230,.06),
      0 30px 80px rgba(0,0,0,.5),
      inset 0 1px 0 rgba(255,255,255,.04);
    overflow:hidden;
  }

  /* Ambient glow backdrop */
  .zone-viz::before{
    content:'';
    position:absolute;
    top:-40%;left:-20%;
    width:140%;height:140%;
    background:radial-gradient(ellipse at 30% 20%,rgba(77,216,230,.07) 0%,transparent 60%),
               radial-gradient(ellipse at 70% 80%,rgba(139,92,246,.05) 0%,transparent 50%);
    pointer-events:none;
    z-index:0;
  }

  /* =============================================
     HEADER — INDUSTRY LABEL + ICON
     ============================================= */
  .zone-viz__header{
    position:absolute;
    top:0;left:0;right:0;
    z-index:20;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:14px;
    padding:24px 30px 16px;
    background:linear-gradient(180deg,rgba(12,14,20,.95) 0%,transparent 100%);
  }

  .zone-viz__icon{
    font-size:clamp(28px,3.5vw,38px);
    filter:drop-shadow(0 0 8px rgba(77,216,230,.4));
    transition:all .6s ease;
  }

  .zone-viz__industry-name{
    font-size:clamp(20px,2.8vw,30px);
    font-weight:700;
    letter-spacing:-.02em;
    background:linear-gradient(135deg,#4dd8e6,#36d6b3);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    transition:opacity .5s ease;
  }

  .zone-viz__subtitle{
    position:absolute;
    top:60px;
    left:50%;
    transform:translateX(-50%);
    font-size:clamp(11px,1.3vw,13px);
    color:rgba(224,230,240,.4);
    letter-spacing:.08em;
    text-transform:uppercase;
    white-space:nowrap;
  }

  /* =============================================
     3D SCENE CONTAINER
     ============================================= */
  .zone-viz__stage{
    position:absolute;
    top:80px;
    left:50%;
    width:min(88vw,950px);
    height:calc(100% - 140px);
    transform:translateX(-50%);
    perspective:1400px;
    perspective-origin:50% 35%;
  }

  .zone-viz__scene{
    position:absolute;
    inset:0;
    transform-style:preserve-3d;
    transform:rotateX(55deg) rotateZ(-15deg);
    transition:transform .3s ease;
  }

  /* =============================================
     FLOOR / FLOORPLAN
     ============================================= */
  .zone-viz__floor{
    position:absolute;
    left:50%;top:50%;
    width:600px;height:440px;
    transform:translate(-50%,-50%) translateZ(0px);
    transform-style:preserve-3d;
    opacity:0;
    transition:opacity .8s ease;
  }

  .zone-viz__floor.active{
    opacity:1;
  }

  .zone-viz__floor-surface{
    position:absolute;
    inset:0;
    background:rgba(20,24,36,.9);
    border:1px solid rgba(77,216,230,.15);
    border-radius:6px;
    overflow:hidden;
  }

  /* Grid lines on floor */
  .zone-viz__floor-surface::before{
    content:'';
    position:absolute;inset:0;
    background-image:
      linear-gradient(rgba(77,216,230,.06) 1px,transparent 1px),
      linear-gradient(90deg,rgba(77,216,230,.06) 1px,transparent 1px);
    background-size:40px 40px;
  }

  /* Floorplan SVG overlay */
  .zone-viz__floorplan-svg{
    position:absolute;
    inset:0;
    z-index:1;
  }

  .zone-viz__floorplan-svg svg{
    width:100%;height:100%;
  }

  /* =============================================
     3D BOX ZONE ENCLOSURES
     ============================================= */
  .zone-box{
    position:absolute;
    transform-style:preserve-3d;
    opacity:0;
    transform:scaleY(0);
    transform-origin:bottom;
    transition:opacity .6s ease, transform .8s cubic-bezier(.34,1.56,.64,1);
  }

  .zone-box.visible{
    opacity:1;
    transform:scaleY(1);
  }

  /* Each face of the 3D box */
  .zone-face{
    position:absolute;
    backface-visibility:visible;
  }

  /* Bottom face — on the floor */
  .zone-face--bottom{
    width:100%;height:100%;
    transform:translateZ(0px);
    border:1.5px solid var(--zone-color);
    background:var(--zone-bg);
  }

  /* Top face */
  .zone-face--top{
    width:100%;height:100%;
    transform:translateZ(var(--zone-h));
    background:var(--zone-top-bg);
    border:1.5px solid var(--zone-color);
  }

  /* Front face */
  .zone-face--front{
    width:100%;
    height:var(--zone-h-px);
    bottom:0;left:0;
    transform-origin:bottom;
    transform:rotateX(-90deg);
    background:var(--zone-wall-bg);
    border-left:1.5px solid var(--zone-color);
    border-right:1.5px solid var(--zone-color);
    border-top:1.5px solid var(--zone-color);
  }

  /* Back face */
  .zone-face--back{
    width:100%;
    height:var(--zone-h-px);
    top:0;left:0;
    transform-origin:top;
    transform:rotateX(90deg);
    background:var(--zone-wall-bg);
    border-left:1.5px solid var(--zone-color);
    border-right:1.5px solid var(--zone-color);
    border-bottom:1.5px solid var(--zone-color);
  }

  /* Left face */
  .zone-face--left{
    height:100%;
    width:var(--zone-h-px);
    top:0;left:0;
    transform-origin:left;
    transform:rotateY(90deg);
    background:var(--zone-wall-bg);
    border-top:1.5px solid var(--zone-color);
    border-bottom:1.5px solid var(--zone-color);
    border-right:1.5px solid var(--zone-color);
  }

  /* Right face */
  .zone-face--right{
    height:100%;
    width:var(--zone-h-px);
    top:0;right:0;
    transform-origin:right;
    transform:rotateY(-90deg);
    background:var(--zone-wall-bg);
    border-top:1.5px solid var(--zone-color);
    border-bottom:1.5px solid var(--zone-color);
    border-left:1.5px solid var(--zone-color);
  }

  /* Zone label on top face */
  .zone-label{
    position:absolute;
    top:50%;left:50%;
    transform:translate(-50%,-50%) rotateZ(15deg);
    font-size:11px;
    font-weight:600;
    color:var(--zone-color);
    text-shadow:0 0 8px var(--zone-color);
    white-space:nowrap;
    letter-spacing:.02em;
    pointer-events:none;
    z-index:5;
    opacity:0;
    transition:opacity .4s ease .3s;
  }

  .zone-box.visible .zone-label{
    opacity:1;
  }

  /* =============================================
     HOTSPOT BLIPS + LEADER LINES + CALLOUTS
     ============================================= */
  .hotspot{
    position:absolute;
    transform-style:preserve-3d;
    z-index:10;
    opacity:0;
    transition:opacity .5s ease;
    pointer-events:none;
  }

  .hotspot.visible{
    opacity:1;
  }

  /* Pulsing blip dot */
  .hotspot__blip{
    position:absolute;
    width:10px;height:10px;
    border-radius:50%;
    background:var(--blip-color,#4dd8e6);
    box-shadow:0 0 12px var(--blip-color,#4dd8e6),0 0 24px var(--blip-color,#4dd8e6);
    transform:translateZ(var(--blip-z,60px));
    animation:blipPulse 2s ease-in-out infinite;
  }

  .hotspot__blip::after{
    content:'';
    position:absolute;
    inset:-6px;
    border-radius:50%;
    border:1.5px solid var(--blip-color,#4dd8e6);
    opacity:.4;
    animation:blipRing 2s ease-in-out infinite;
  }

  @keyframes blipPulse{
    0%,100%{opacity:.7;transform:translateZ(var(--blip-z,60px)) scale(1)}
    50%{opacity:1;transform:translateZ(var(--blip-z,60px)) scale(1.3)}
  }

  @keyframes blipRing{
    0%,100%{transform:scale(1);opacity:.4}
    50%{transform:scale(1.8);opacity:0}
  }

  /* Leader line (dotted) */
  .hotspot__leader{
    position:absolute;
    transform:translateZ(var(--blip-z,60px));
    border-left:1.5px dashed var(--blip-color,#4dd8e6);
    opacity:.5;
    height:40px;
    left:4px;
    bottom:10px;
  }

  /* Metric callout box */
  .hotspot__callout{
    position:absolute;
    bottom:50px;
    left:-40px;
    transform:translateZ(var(--blip-z,60px));
    background:rgba(12,14,20,.92);
    border:1px solid var(--blip-color,#4dd8e6);
    border-radius:6px;
    padding:5px 10px;
    white-space:nowrap;
    font-size:10px;
    font-weight:600;
    color:var(--blip-color,#4dd8e6);
    box-shadow:0 0 12px rgba(0,0,0,.6),0 0 6px var(--blip-color,#4dd8e6);
    letter-spacing:.02em;
    animation:calloutFloat 3s ease-in-out infinite;
  }

  @keyframes calloutFloat{
    0%,100%{transform:translateZ(var(--blip-z,60px)) translateY(0)}
    50%{transform:translateZ(var(--blip-z,60px)) translateY(-3px)}
  }

  /* =============================================
     PROGRESS INDICATOR
     ============================================= */
  .zone-viz__progress{
    position:absolute;
    bottom:16px;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    gap:8px;
    z-index:20;
  }

  .zone-viz__dot{
    width:8px;height:8px;
    border-radius:50%;
    background:rgba(77,216,230,.15);
    border:1px solid rgba(77,216,230,.25);
    transition:all .4s ease;
    cursor:pointer;
  }

  .zone-viz__dot.active{
    width:28px;
    border-radius:4px;
    background:linear-gradient(90deg,#4dd8e6,#36d6b3);
    border-color:transparent;
    box-shadow:0 0 12px rgba(77,216,230,.4);
  }

  /* =============================================
     TRANSITION OVERLAY
     ============================================= */
  .zone-viz__transition{
    position:absolute;
    inset:0;
    background:radial-gradient(ellipse at center,rgba(12,14,20,.95),rgba(12,14,20,1));
    z-index:15;
    opacity:0;
    pointer-events:none;
    transition:opacity .4s ease;
  }

  .zone-viz__transition.active{
    opacity:1;
  }

  /* =============================================
     SCAN LINE EFFECT
     ============================================= */
  .zone-viz__scanline{
    position:absolute;
    inset:0;
    z-index:18;
    pointer-events:none;
    overflow:hidden;
    opacity:.3;
  }

  .zone-viz__scanline::before{
    content:'';
    position:absolute;
    width:100%;height:2px;
    background:linear-gradient(90deg,transparent,rgba(77,216,230,.4),transparent);
    animation:scanMove 4s linear infinite;
  }

  @keyframes scanMove{
    0%{top:-2px}
    100%{top:100%}
  }

  /* =============================================
     FLOORPLAN SVG STYLES
     ============================================= */
  .fp-wall{fill:none;stroke:rgba(77,216,230,.25);stroke-width:1.5}
  .fp-fixture{fill:rgba(77,216,230,.06);stroke:rgba(77,216,230,.18);stroke-width:1}
  .fp-text{fill:rgba(224,230,240,.2);font-size:9px;font-family:'Inter','Segoe UI',system-ui,sans-serif;text-anchor:middle}
  .fp-door{fill:none;stroke:rgba(54,214,179,.3);stroke-width:1;stroke-dasharray:4 2}

  /* =============================================
     RESPONSIVE
     ============================================= */
  @media(max-width:768px){
    .zone-viz{
      width:98vw;
      height:clamp(500px,75vh,700px);
      border-radius:12px;
    }
    .zone-viz__floor{
      width:400px;height:300px;
    }
    .zone-viz__stage{
      width:95vw;
    }
    .zone-viz__header{gap:10px;padding:18px 20px 12px}
    .zone-viz__subtitle{top:50px;font-size:10px}
    .zone-viz__stage{top:65px;height:calc(100% - 120px)}
    .hotspot__callout{font-size:9px;padding:4px 7px}
    .zone-label{font-size:9px}
  }

  @media(max-width:480px){
    .zone-viz__floor{
      width:310px;height:230px;
    }
  }
</style>
</head>

/* =============================================
   CORE ENGINE
   ============================================= */
let currentIndex = 0;
let rotationAngle = -15;
let rotationDir = 1;
let animFrame;
let cycleTimer;
let isTransitioning = false;

const $scene    = document.getElementById('vizScene');
const $floor    = document.getElementById('vizFloor');
const $fpSvg    = document.getElementById('vizFloorplanSvg');
const $icon     = document.getElementById('vizIcon');
const $name     = document.getElementById('vizName');
const $trans    = document.getElementById('vizTransition');
const $progress = document.getElementById('vizProgress');

/* Build progress dots */
INDUSTRIES.forEach((ind, i) => {
  const dot = document.createElement('div');
  dot.className = 'zone-viz__dot' + (i === 0 ? ' active' : '');
  dot.title = ind.name;
  dot.addEventListener('click', () => {
    if (isTransitioning || i === currentIndex) return;
    clearTimeout(cycleTimer);
    transitionTo(i);
  });
  $progress.appendChild(dot);
});

/* =============================================
   RENDER AN INDUSTRY
   ============================================= */
function renderIndustry(index) {
  const ind = INDUSTRIES[index];

  /* Header */
  $icon.textContent = ind.icon;
  $name.textContent = ind.name;

  /* Floorplan SVG */
  $fpSvg.innerHTML = ind.floorplan;

  /* Clear old zones & hotspots */
  $floor.querySelectorAll('.zone-box, .hotspot').forEach(el => el.remove());

  /* Create 3D box zones */
  ind.zones.forEach((z, zi) => {
    const box = document.createElement('div');
    box.className = 'zone-box';
    box.style.cssText = `
      left:${z.x}px; top:${z.y}px; width:${z.w}px; height:${z.h}px;
      --zone-color:${z.color};
      --zone-bg:${z.color}11;
      --zone-top-bg:${z.color}18;
      --zone-wall-bg:linear-gradient(180deg,${z.color}15,${z.color}08);
      --zone-h:${z.height}px;
      --zone-h-px:${z.height}px;
    `;

    /* 6 faces */
    const faces = ['bottom','top','front','back','left','right'];
    faces.forEach(f => {
      const face = document.createElement('div');
      face.className = `zone-face zone-face--${f}`;
      box.appendChild(face);
    });

    /* Label on top face */
    const lbl = document.createElement('div');
    lbl.className = 'zone-label';
    lbl.textContent = z.label;
    /* Place label on the top face */
    lbl.style.cssText = `transform:translate(-50%,-50%) rotateZ(${15}deg) translateZ(${z.height + 2}px);`;
    box.appendChild(lbl);

    $floor.appendChild(box);

    /* Stagger reveal */
    setTimeout(() => box.classList.add('visible'), 300 + zi * 350);
  });

  /* Create hotspots */
  ind.hotspots.forEach((h, hi) => {
    const zone = ind.zones[h.zoneIdx];
    const spot = document.createElement('div');
    spot.className = 'hotspot';
    spot.style.cssText = `
      left:${zone.x + h.ox}px;
      top:${zone.y + h.oy}px;
      --blip-color:${h.color};
      --blip-z:${zone.height + 15}px;
    `;

    /* Blip dot */
    const blip = document.createElement('div');
    blip.className = 'hotspot__blip';
    blip.style.animationDelay = `${hi * 0.4}s`;
    spot.appendChild(blip);

    /* Leader line */
    const leader = document.createElement('div');
    leader.className = 'hotspot__leader';
    spot.appendChild(leader);

    /* Callout */
    const callout = document.createElement('div');
    callout.className = 'hotspot__callout';
    callout.textContent = h.metric;
    callout.style.animationDelay = `${hi * 0.3}s`;
    spot.appendChild(callout);

    $floor.appendChild(spot);

    /* Stagger hotspot reveal after zones are built */
    setTimeout(() => spot.classList.add('visible'), 1600 + hi * 400);
  });

  /* Activate floor */
  $floor.classList.add('active');
}

/* =============================================
   TRANSITION BETWEEN INDUSTRIES
   ============================================= */
function transitionTo(nextIndex) {
  if (isTransitioning) return;
  isTransitioning = true;

  /* Fade out */
  $trans.classList.add('active');
  $floor.classList.remove('active');

  /* Update dots */
  $progress.querySelectorAll('.zone-viz__dot').forEach((d, i) => {
    d.classList.toggle('active', i === nextIndex);
  });

  setTimeout(() => {
    currentIndex = nextIndex;
    renderIndustry(currentIndex);

    /* Fade in */
    setTimeout(() => {
      $trans.classList.remove('active');
      isTransitioning = false;
      scheduleCycle();
    }, 200);
  }, 500);
}

function nextIndustry() {
  const next = (currentIndex + 1) % INDUSTRIES.length;
  transitionTo(next);
}

function scheduleCycle() {
  clearTimeout(cycleTimer);
  cycleTimer = setTimeout(nextIndustry, 5500);
}

/* =============================================
   SUBTLE 3D ROTATION ANIMATION
   ============================================= */
function animateRotation() {
  rotationAngle += 0.015 * rotationDir;
  if (rotationAngle > -5) rotationDir = -1;
  if (rotationAngle < -25) rotationDir = 1;

  const baseX = 55 + Math.sin(Date.now() * 0.0003) * 3;
  $scene.style.transform = `rotateX(${baseX}deg) rotateZ(${rotationAngle}deg)`;

  animFrame = requestAnimationFrame(animateRotation);
}

/* =============================================
   INIT
   ============================================= */
renderIndustry(0);
animateRotation();
scheduleCycle();

/* Pause on hover (optional UX improvement) */
const $viz = document.getElementById('zoneViz');
$viz.addEventListener('mouseenter', () => clearTimeout(cycleTimer));
$viz.addEventListener('mouseleave', scheduleCycle);
</script>
