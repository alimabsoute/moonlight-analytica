/* ═══ NAVBAR ═══ */
:root {
  --bg: #06080d;
  --bg-2: #0a0f1a;
  --bg-3: #0e1525;
  --surface: rgba(14, 21, 37, 0.7);
  --border: rgba(255, 255, 255, 0.06);
  --border-hover: rgba(255, 255, 255, 0.12);
  --text: #edf0f7;
  --text-2: #a0aec0;
  --text-3: #5a6a85;
  --cyan: #4dd8e6;
  --cyan-dim: rgba(77, 216, 230, 0.08);
  --teal: #36d6b3;
  --teal-dim: rgba(54, 214, 179, 0.08);
  --font: 'Instrument Sans', sans-serif;
  --font-display: 'Outfit', sans-serif;
}
html { scroll-behavior: smooth; }
.navbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  padding: 18px 0;
  background: rgba(6, 8, 13, 0.6);
  backdrop-filter: blur(30px) saturate(160%);
  border-bottom: 1px solid var(--border);
  transition: all 0.4s ease;
}
.navbar.scrolled {
  padding: 12px 0;
  background: rgba(6, 8, 13, 0.92);
  border-bottom-color: rgba(77, 216, 230, 0.08);
}
.nav-container {
  max-width: 1200px; margin: 0 auto;
  display: flex; align-items: center; padding: 0 24px; gap: 3rem;
}
.logo {
  font-family: var(--font-display); font-size: 1.45rem; font-weight: 700;
  color: var(--text); text-decoration: none;
  display: flex; align-items: center; gap: 12px;
  letter-spacing: -0.5px;
}
.logo:hover { opacity: 0.85; }
.logo-icon { width: 40px; height: 40px; filter: drop-shadow(0 0 10px rgba(77, 216, 230, 0.4)); }
.nav-menu {
  display: flex; list-style: none; gap: 2.2rem; margin-left: auto;
}
.nav-link {
  color: var(--text-2); text-decoration: none; font-weight: 500;
  font-size: 0.88rem; letter-spacing: 0.2px;
  transition: color 0.25s ease; position: relative;
}
.nav-link:hover { color: #fff; }
.nav-link::after {
  content: ''; position: absolute; bottom: -4px; left: 0;
  width: 0; height: 1.5px; border-radius: 1px;
  background: var(--cyan); transition: width 0.3s ease;
}
.nav-link:hover::after { width: 100%; }
.hamburger {
  display: none; flex-direction: column; gap: 5px; cursor: pointer;
  padding: 8px; margin-left: auto;
}
.hamburger span {
  width: 22px; height: 2px; background: var(--text-2);
  border-radius: 2px; transition: all 0.3s ease;
}

/* ═══ DASHBOARD MOCKUP STYLES ═══ */

/* Floating KPI metric cards — heavy, weighty feel */
.float-metrics{position:absolute;inset:-15px;pointer-events:none;z-index:5}
.float-card{
  position:absolute;background:rgba(255,255,255,.82);border-radius:14px;padding:14px 18px;
  box-shadow:0 1px 2px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.06),0 12px 28px rgba(0,0,0,.10),0 28px 56px rgba(0,0,0,.08),0 0 40px rgba(77,216,230,.06);
  border:1px solid rgba(255,255,255,.25);
  animation:floatBob 4s ease-in-out infinite, floatIn .6s cubic-bezier(.175,.885,.32,1.275) forwards;
  font-family:'Outfit',sans-serif;
  backdrop-filter:blur(16px) saturate(1.4);-webkit-backdrop-filter:blur(16px) saturate(1.4);
  transition:transform .3s ease,box-shadow .3s ease;cursor:default;pointer-events:auto;
  min-width:140px;opacity:0;overflow:hidden
}
.float-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.6) 30%,rgba(255,255,255,.8) 50%,rgba(255,255,255,.6) 70%,transparent);pointer-events:none}
.float-card:hover{transform:translateY(-10px) scale(1.04)!important;box-shadow:0 4px 8px rgba(0,0,0,.06),0 16px 32px rgba(0,0,0,.12),0 32px 64px rgba(0,0,0,.12),0 0 50px rgba(77,216,230,.1)}
.float-card .fc-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.8rem;margin-bottom:6px}
.float-card .fc-label{font-size:.62rem;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:#94a3b8;margin-bottom:3px}
.float-card .fc-value{font-size:1.5rem;font-weight:800;color:#111827;line-height:1.1;letter-spacing:-.5px}
.float-card .fc-change{font-size:.68rem;font-weight:600;margin-top:4px;display:inline-flex;align-items:center;gap:4px}
.float-card .fc-spark{display:flex;align-items:flex-end;gap:2px;margin-top:6px;height:20px}
.float-card .fc-spark span{width:3px;border-radius:1px;background:#4dd8e6;opacity:.7;box-shadow:0 0 4px rgba(77,216,230,.3)}
.fc-up{color:#22c55e}
.fc-down{color:#ef4444}
@keyframes floatIn{0%{opacity:0;transform:scale(.8) translateY(16px)}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes floatBob{0%,100%{transform:translateY(0) rotate(0deg)}25%{transform:translateY(-12px) rotate(.5deg)}50%{transform:translateY(-5px) rotate(0deg)}75%{transform:translateY(-16px) rotate(-.5deg)}}

/* Dashboard widget shapes for Janus section */
.dash-widget{
  background:#fff;border-radius:14px;padding:16px;
  box-shadow:0 2px 4px rgba(0,0,0,.03),0 8px 24px rgba(0,0,0,.06),0 32px 64px rgba(0,0,0,.06);
  border:1px solid rgba(0,0,0,.05);font-family:'Outfit',sans-serif;
  transform:perspective(600px) rotateY(-1deg) rotateX(1deg);
  transition:transform .4s ease,box-shadow .4s ease
}
.dash-widget:hover{transform:perspective(600px) rotateY(0) rotateX(0);box-shadow:0 4px 8px rgba(0,0,0,.04),0 16px 32px rgba(0,0,0,.1)}
.dash-widget .dw-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.dash-widget .dw-title{font-size:.72rem;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.5px}
.dash-widget .dw-badge{font-size:.55rem;font-weight:600;padding:2px 8px;border-radius:6px}

/* 3D depth utility for capability cards */
.depth-card{
  transform:perspective(1000px) rotateX(2deg) rotateY(-2deg);
  box-shadow:0 2px 4px rgba(0,0,0,.04),0 8px 16px rgba(0,0,0,.06),0 24px 48px rgba(0,0,0,.08),0 48px 96px rgba(0,0,0,.04);
  transition:transform .4s ease,box-shadow .4s ease;border-radius:20px;overflow:hidden
}
.depth-card:hover{transform:perspective(1000px) rotateX(0deg) rotateY(0deg);box-shadow:0 4px 8px rgba(0,0,0,.06),0 16px 32px rgba(0,0,0,.1),0 32px 64px rgba(0,0,0,.08)}

/* Animated bar chart utility */
@keyframes barGrow{0%{transform:scaleY(0)}100%{transform:scaleY(1)}}
.anim-bars{display:flex;align-items:flex-end;gap:3px;height:40px}
.anim-bars span{width:5px;border-radius:2px 2px 0 0;background:#4dd8e6;transform-origin:bottom;animation:barGrow .6s ease-out forwards}

/* Animated sparkline */
@keyframes sparkDraw{0%{stroke-dashoffset:200}100%{stroke-dashoffset:0}}
.anim-spark svg{overflow:visible}
.anim-spark path{stroke-dasharray:200;animation:sparkDraw 2s ease-out forwards}

/* Browser chrome frames */
.browser-safari{border-radius:12px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.12);border:1px solid rgba(0,0,0,.06)}
.browser-safari .chrome{background:linear-gradient(to bottom,#e8e8e8,#d4d4d4);padding:10px 16px;display:flex;align-items:center;gap:8px}
.browser-safari .chrome .dots{display:flex;gap:6px}
.browser-safari .chrome .dots span{width:10px;height:10px;border-radius:50%}
.browser-safari .chrome .dots span:nth-child(1){background:#ff5f57}
.browser-safari .chrome .dots span:nth-child(2){background:#febc2e}
.browser-safari .chrome .dots span:nth-child(3){background:#28c840}
.browser-safari .chrome .url-bar{flex:1;margin:0 40px;background:#fff;border-radius:6px;padding:5px 12px;font-size:.65rem;color:#64748b;text-align:center}

.browser-chrome{border-radius:12px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.12);border:1px solid rgba(0,0,0,.06)}
.browser-chrome .chrome{background:#292a2d;padding:8px 12px 0;display:flex;flex-direction:column}
.browser-chrome .chrome .tab-row{display:flex;align-items:flex-end;gap:0}
.browser-chrome .chrome .tab-active{background:#1a1a2e;border-radius:8px 8px 0 0;padding:6px 16px;font-size:.6rem;color:#ccc;display:flex;align-items:center;gap:6px}
.browser-chrome .chrome .controls{display:flex;align-items:center;gap:8px;padding:6px 4px;background:#1a1a2e}
.browser-chrome .chrome .controls .url{flex:1;background:#292a2d;border-radius:16px;padding:4px 12px;font-size:.6rem;color:#999}

.browser-minimal{border-radius:16px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.12);border:1px solid rgba(0,0,0,.06)}
.browser-minimal .chrome{background:#1a1a2e;padding:8px 16px;display:flex;align-items:center;gap:6px}
.browser-minimal .chrome span:not(.flex){width:8px;height:8px;border-radius:50%}
.browser-minimal .chrome .flex{flex:1}
.browser-minimal .chrome .label{font-size:.6rem;color:rgba(255,255,255,.4);letter-spacing:1px}

/* CSS Dashboard mockup components */
.mock-tracking{position:relative;background:#0f1219;min-height:200px;overflow:hidden}
.mock-tracking .scan-line{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#4dd8e6,transparent);animation:scanDown 3s linear infinite}
@keyframes scanDown{0%{top:0}100%{top:100%}}
.mock-tracking .bbox{position:absolute;border:2px solid #4dd8e6;border-radius:4px;animation:bboxPulse 2s ease-in-out infinite}
@keyframes bboxPulse{0%,100%{opacity:.8;transform:scale(1)}50%{opacity:1;transform:scale(1.02)}}
.mock-tracking .live-badge{position:absolute;top:12px;left:12px;display:flex;align-items:center;gap:6px;background:rgba(0,0,0,.6);padding:4px 10px;border-radius:6px;font-size:.65rem;font-weight:600;color:#fff;backdrop-filter:blur(4px)}
.mock-tracking .live-dot{width:6px;height:6px;border-radius:50%;background:#ef4444;animation:livePulse 1.5s ease-in-out infinite}
@keyframes livePulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(239,68,68,.4)}50%{opacity:.8;box-shadow:0 0 0 4px rgba(239,68,68,0)}}
.mock-tracking .counter{position:absolute;bottom:12px;right:12px;background:rgba(0,0,0,.7);padding:6px 12px;border-radius:8px;font-family:'Outfit',sans-serif;font-size:1.1rem;font-weight:700;color:#4dd8e6;backdrop-filter:blur(4px)}

/* Heatmap mockup */
.mock-heatmap{position:relative;background:#f8fafb;min-height:200px;overflow:hidden}
.mock-heatmap .floor{position:absolute;inset:10px;border:1.5px solid #e2e8f0;border-radius:4px}
.mock-heatmap .floor .wall{position:absolute;background:#cbd5e1}
.mock-heatmap .heat-zone{position:absolute;border-radius:50%;filter:blur(20px);animation:heatPulse 3s ease-in-out infinite}
@keyframes heatPulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:.7;transform:scale(1.05)}}

.mock-forecast .y-label{position:absolute;left:0;font-size:.5rem;color:#94a3b8;transform:translateY(-50%)}
.mock-forecast .x-label{position:absolute;bottom:-16px;font-size:.5rem;color:#94a3b8;transform:translateX(-50%)}

/* Campaign ROI mockup */

/* ═══ 3D ZONE VISUALIZATION — REBUILT WITH DEPTH ═══ */
.zviz{position:relative;width:100%;height:540px;background:linear-gradient(145deg,#11131a 0%,#161924 50%,#11131a 100%);border-radius:16px;border:1px solid rgba(77,216,230,.12);overflow:hidden;font-family:'Outfit',sans-serif;box-shadow:0 0 60px rgba(77,216,230,.04),0 20px 60px rgba(0,0,0,.3)}
.zviz::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(77,216,230,.06) 0%,transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(139,92,246,.04) 0%,transparent 50%);pointer-events:none}
.zviz__head{position:absolute;top:0;left:0;right:0;z-index:10;display:flex;align-items:center;justify-content:center;gap:12px;padding:18px 24px 0;text-align:center}
.zviz__icon{font-size:1.5rem;filter:drop-shadow(0 0 6px rgba(77,216,230,.4))}
.zviz__title{font-size:1.1rem;font-weight:700;letter-spacing:-.02em;background:linear-gradient(135deg,#4dd8e6,#36d6b3);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.zviz__sub{position:absolute;top:44px;left:50%;transform:translateX(-50%);font-size:.55rem;color:rgba(224,230,240,.35);letter-spacing:.1em;text-transform:uppercase;white-space:nowrap}
.zviz__scan{position:absolute;inset:0;z-index:8;pointer-events:none;overflow:hidden;opacity:.2}
.zviz__scan::before{content:'';position:absolute;width:100%;height:2px;background:linear-gradient(90deg,transparent,rgba(77,216,230,.5),transparent);animation:zvScan 4s linear infinite}
@keyframes zvScan{0%{top:-2px}100%{top:100%}}
/* 3D stage */
.zviz__stage{position:absolute;top:60px;left:50%;width:90%;height:calc(100% - 90px);transform:translateX(-50%);perspective:1200px;perspective-origin:50% 35%}
.zviz__scene{position:absolute;inset:0;transform-style:preserve-3d;transform:rotateX(55deg) rotateZ(-12deg);animation:zvRotate 20s ease-in-out infinite}
@keyframes zvRotate{0%,100%{transform:rotateX(55deg) rotateZ(-12deg)}50%{transform:rotateX(55deg) rotateZ(-18deg)}}
/* Floor plane */
.zviz__floor{position:absolute;left:50%;top:50%;width:420px;height:320px;transform:translate(-50%,-50%) translateZ(0);transform-style:preserve-3d}
.zviz__floor-surface{position:absolute;inset:0;background:rgba(20,24,36,.9);border:1px solid rgba(77,216,230,.12);border-radius:4px}
.zviz__floor-surface::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(77,216,230,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(77,216,230,.05) 1px,transparent 1px);background-size:30px 30px}
/* 3D box zones with 6 faces */
.zbox{position:absolute;transform-style:preserve-3d;opacity:0;transform:scaleY(0);transform-origin:bottom;animation:zboxIn .8s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes zboxIn{0%{opacity:0;transform:scaleY(0)}100%{opacity:1;transform:scaleY(1)}}
.zface{position:absolute;backface-visibility:visible}
.zface--bot{width:100%;height:100%;transform:translateZ(0);border:1.5px solid var(--zc);background:var(--zc-bg,rgba(77,216,230,.1));background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:12px 12px}
.zface--top{width:100%;height:100%;transform:translateZ(var(--zh));background:var(--zc-top,rgba(77,216,230,.35));border:1.5px solid var(--zc);backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);border-radius:2px;animation:zfaceShimmer 6s ease-in-out infinite}
@keyframes zfaceShimmer{0%,100%{background:var(--zc-top,rgba(77,216,230,.22))}50%{background:var(--zc-top,rgba(77,216,230,.30))}}
.zface--front{width:100%;height:var(--zh);bottom:0;left:0;transform-origin:bottom;transform:rotateX(-90deg);background:linear-gradient(0deg,var(--zc-wall,rgba(77,216,230,.38)) 0%,var(--zc-wall2,rgba(77,216,230,.18)) 100%);border-left:1.5px solid var(--zc);border-right:1.5px solid var(--zc);border-top:1.5px solid var(--zc);backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);box-shadow:inset 0 0 20px var(--zc-glow,rgba(77,216,230,.08))}
.zface--back{width:100%;height:var(--zh);top:0;left:0;transform-origin:top;transform:rotateX(90deg);background:linear-gradient(0deg,var(--zc-wall,rgba(77,216,230,.38)) 0%,var(--zc-wall2,rgba(77,216,230,.18)) 100%);border-left:1.5px solid var(--zc);border-right:1.5px solid var(--zc);border-bottom:1.5px solid var(--zc);backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);box-shadow:inset 0 0 20px var(--zc-glow,rgba(77,216,230,.08))}
.zface--left{height:100%;width:var(--zh);top:0;left:0;transform-origin:left;transform:rotateY(90deg);background:linear-gradient(0deg,var(--zc-wall,rgba(77,216,230,.38)) 0%,var(--zc-wall2,rgba(77,216,230,.18)) 100%);border-top:1.5px solid var(--zc);border-bottom:1.5px solid var(--zc);border-right:1.5px solid var(--zc);backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);box-shadow:inset 0 0 20px var(--zc-glow,rgba(77,216,230,.08))}
.zface--right{height:100%;width:var(--zh);top:0;right:0;transform-origin:right;transform:rotateY(-90deg);background:linear-gradient(0deg,var(--zc-wall,rgba(77,216,230,.38)) 0%,var(--zc-wall2,rgba(77,216,230,.18)) 100%);border-top:1.5px solid var(--zc);border-bottom:1.5px solid var(--zc);border-left:1.5px solid var(--zc);backdrop-filter:blur(2px);-webkit-backdrop-filter:blur(2px);box-shadow:inset 0 0 20px var(--zc-glow,rgba(77,216,230,.08))}
.zbox__label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) translateZ(calc(var(--zh) + 2px)) rotateZ(12deg);font-size:.55rem;font-weight:600;color:var(--zc);text-shadow:0 0 6px var(--zc);white-space:nowrap;pointer-events:none;letter-spacing:.02em;opacity:0;animation:zlblIn .3s ease forwards .6s}
@keyframes zlblIn{to{opacity:1}}
/* Hotspot blips */
.zblip{position:absolute;transform-style:preserve-3d;z-index:10;opacity:0;animation:zblipIn .5s ease forwards}
@keyframes zblipIn{to{opacity:1}}
.zblip__dot{position:absolute;width:8px;height:8px;border-radius:50%;background:var(--bc,#4dd8e6);box-shadow:0 0 10px var(--bc,#4dd8e6),0 0 20px var(--bc,#4dd8e6);transform:translateZ(var(--bz,50px));animation:zbpulse 2s ease-in-out infinite}
.zblip__dot::after{content:'';position:absolute;inset:-5px;border-radius:50%;border:1.5px solid var(--bc,#4dd8e6);opacity:.4;animation:zbring 2s ease-in-out infinite}
@keyframes zbpulse{0%,100%{opacity:.7;transform:translateZ(var(--bz,50px)) scale(1)}50%{opacity:1;transform:translateZ(var(--bz,50px)) scale(1.3)}}
@keyframes zbring{0%,100%{transform:scale(1);opacity:.4}50%{transform:scale(1.8);opacity:0}}
.zblip__leader{position:absolute;transform:translateZ(var(--bz,50px));border-left:1.5px dashed var(--bc,#4dd8e6);opacity:.4;height:35px;left:3px;bottom:8px}
.zblip__callout{position:absolute;bottom:44px;left:-35px;transform:translateZ(var(--bz,50px));background:rgba(12,14,20,.92);border:1px solid var(--bc,#4dd8e6);border-radius:5px;padding:4px 9px;white-space:nowrap;font-size:.5rem;font-weight:600;color:var(--bc,#4dd8e6);box-shadow:0 0 10px rgba(0,0,0,.6),0 0 4px var(--bc,#4dd8e6);letter-spacing:.02em;animation:zcFloat 3s ease-in-out infinite}
@keyframes zcFloat{0%,100%{transform:translateZ(var(--bz,50px)) translateY(0)}50%{transform:translateZ(var(--bz,50px)) translateY(-3px)}}
/* Progress dots */
.zviz__dots{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:10}
.zviz__dot{width:6px;height:6px;border-radius:50%;background:rgba(77,216,230,.15);border:1px solid rgba(77,216,230,.25)}
.zviz__dot--active{width:22px;border-radius:3px;background:linear-gradient(90deg,#4dd8e6,#36d6b3);border-color:transparent;box-shadow:0 0 8px rgba(77,216,230,.3)}

/* Interior furniture pieces inside zones */
.zfurn{position:absolute;transform-style:preserve-3d;transform:translateZ(1px);opacity:0;animation:zfurnIn .5s ease forwards}
@keyframes zfurnIn{0%{opacity:0;transform:translateZ(1px) scale(.5)}100%{opacity:1;transform:translateZ(1px) scale(1)}}
.zfurn--rect{border-radius:2px}
.zfurn--circle{border-radius:50%}
.zfurn--dot{border-radius:50%}
.zfurn--lshape{border-radius:2px;clip-path:polygon(0 0,60% 0,60% 50%,100% 50%,100% 100%,0 100%)}

/* ── LEGACY FLAT ZONE VIZ (kept for backward compat) ── */
.zone-viz-container{position:relative;width:100%;height:280px;perspective:800px;overflow:hidden}
.zone-floor{
  position:absolute;left:50%;top:50%;width:260px;height:200px;

  animation:zoneAppear .8s ease-out forwards;opacity:0;transform-style:preserve-3d
}
@keyframes zoneAppear{0%{opacity:0;transform:translateZ(0) scale(.8)}100%{opacity:1;transform:translateZ(var(--z)) scale(1)}}
.zone-poly .zone-tag{

}

.zstruct__top{position:absolute;width:100%;height:100%;transform:translateZ(var(--sh));background:var(--sc);opacity:.35;border:1.5px solid var(--sc);border-radius:1px;box-shadow:0 0 8px var(--sc)}

  const bg = cfg.bg.startsWith('linear') ? cfg.bg : cfg.bg;

  const featsMed = [...featsMin, 'Zone-level dwell time analytics with heatmap overlays — identify bottlenecks and engagement hotspots','Custom polygonal zone definitions on any floorplan — checkout queues, display areas, waiting rooms, entrance corridors'];
  const featsRich = [...featsMed, 'ML-powered anomaly detection alerts when traffic patterns deviate from baselines by more than 2 standard deviations','Multi-location benchmarking to compare store performance across your entire portfolio in one dashboard'];
  const feats = cfg.density === 'rich' ? featsRich : cfg.density === 'minimal' ? featsMin : featsMed;
  const extra = {badges: cfg.density === 'rich', stat: cfg.density === 'rich'};

  const vid = `<video autoplay muted loop playsinline style="width:100%;display:block"><source src="retail-store-preview.mp4" type="video/mp4"></video>`;

  // Variation categories by visual treatment
  const vt = cfg.visual || 'standard';

  // 1-4: Standard with browser chrome varieties
  if (cfg.id <= 4) {
    const chromeType = cfg.id === 1 ? 'minimal' : cfg.id === 2 ? 'safari' : cfg.id === 3 ? 'chrome' : 'minimal';
    return `<div class="s-janus" style="background:${bg}"><div class="container">
      <div style="display:grid;grid-template-columns:${cfg.layout==='asymmetric'?'1.2fr 1fr':'1fr 1.15fr'};gap:60px;align-items:center">

function renderCTA(cfg) {
  const isDark = cfg.style === 'dark' || cfg.style === 'dark-full';
  const textCol = isDark ? '#fff' : '#111827';
  const subCol = isDark ? 'rgba(255,255,255,.5)' : '#94a3b8';
  const inputBg = isDark ? 'rgba(255,255,255,.06)' : 'rgba(0,0,0,.04)';
  const inputBorder = isDark ? 'rgba(255,255,255,.1)' : 'rgba(0,0,0,.1)';
  const btnStyle = `padding:14px 24px;background:#4dd8e6;color:#0a0f1a;border:none;border-radius:12px;font-weight:700;font-size:.88rem;cursor:pointer;font-family:inherit;white-space:nowrap`;
  const inputStyle = `flex:1;padding:14px 18px;border:1px solid ${inputBorder};border-radius:12px;background:${inputBg};color:${textCol};font-size:.92rem;font-family:inherit;outline:none`;

  let form = '';
  const socialProof = `<div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-top:16px">
    <div style="display:flex"><span style="width:24px;height:24px;border-radius:50%;background:#e2e8f0;border:2px solid ${isDark?'#1a1f2e':'#fff'};display:inline-block;margin-right:-8px"></span><span style="width:24px;height:24px;border-radius:50%;background:#cbd5e1;border:2px solid ${isDark?'#1a1f2e':'#fff'};display:inline-block;margin-right:-8px"></span><span style="width:24px;height:24px;border-radius:50%;background:#94a3b8;border:2px solid ${isDark?'#1a1f2e':'#fff'};display:inline-block"></span></div>
    <span style="font-size:.78rem;font-weight:600;color:${isDark?'rgba(255,255,255,.7)':'#64748b'}">Join <span style="color:#4dd8e6">500+</span> teams already on the waitlist</span>
  </div>`;

  if (cfg.style === 'toggle') {
    const tBg = isDark ? 'rgba(255,255,255,.08)' : 'rgba(0,0,0,.06)';
    form = `<div style="margin-bottom:20px">
        <div style="display:inline-flex;background:${tBg};border-radius:8px;overflow:hidden;margin-bottom:24px" id="ctaToggle">
          <button onclick="this.style.background='#4dd8e6';this.style.color='#0a0f1a';this.nextElementSibling.style.background='none';this.nextElementSibling.style.color='#64748b';this.closest('.s-cta').querySelector('.cta-biz').style.display='none';this.closest('.s-cta').querySelector('.cta-ind').style.display='flex'" style="padding:8px 20px;background:#4dd8e6;color:#0a0f1a;border:none;font-weight:600;font-size:.82rem;cursor:pointer;font-family:inherit;transition:all .2s">Individual</button>

        </div>
      </div>
      <div class="cta-ind" style="display:flex;gap:10px;max-width:460px;margin:0 auto">
        <input type="email" placeholder="you@email.com" style="${inputStyle}">
        <button style="${btnStyle}">Join Waitlist</button>
      </div>
      <div class="cta-biz" style="display:none;flex-direction:column;gap:10px;max-width:460px;margin:0 auto">
        <div style="display:flex;gap:10px">
          <input type="text" placeholder="Company name" style="${inputStyle}">
          <input type="text" placeholder="Team size" style="${inputStyle};max-width:120px">
        </div>
        <div style="display:flex;gap:10px">
          <input type="email" placeholder="work@company.com" style="${inputStyle}">

  } else if (cfg.style === 'card') {
    form = `<div style="max-width:480px;margin:0 auto;padding:36px 32px;border-radius:20px;background:${isDark?'rgba(255,255,255,.04)':'#fff'};border:1px solid ${isDark?'rgba(255,255,255,.06)':'rgba(0,0,0,.06)'};box-shadow:0 4px 24px rgba(0,0,0,.04)">

      <p style="font-size:.85rem;color:${subCol};margin-bottom:20px;line-height:1.6">Priority access to Janus Beta and the full suite.</p>

        <input type="email" placeholder="you@company.com" style="${inputStyle};flex:initial">

      </div>
      <p style="margin-top:12px;font-size:.72rem;color:${subCol};opacity:.6;text-align:center">No spam. Unsubscribe anytime.</p>
    </div>`;

  } else if (cfg.style === 'banner') {
    form = `<div style="display:flex;align-items:center;gap:20px;max-width:720px;margin:0 auto;padding:20px 28px;border-radius:16px;background:${isDark?'rgba(255,255,255,.04)':'rgba(0,0,0,.02)'};border:1px solid ${isDark?'rgba(255,255,255,.06)':'rgba(0,0,0,.06)'}">

        <p style="font-size:.8rem;color:${subCol}">Join 500+ teams on the waitlist.</p>
      </div>
      <div style="display:flex;gap:8px;flex-shrink:0">

        <button style="${btnStyle}">Join</button>
      </div>
    </div>`;
    return `<div class="s-cta" style="background:${cfg.bg}"><div class="container" style="padding-top:3rem;padding-bottom:3rem">${form}</div></div>`;

  } else if (cfg.style === 'gradient') {
    form = `<div style="display:flex;gap:10px;max-width:460px;margin:0 auto">

  } else if (cfg.style === 'social-proof') {
    form = `${socialProof}

      <input type="email" placeholder="you@company.com" style="${inputStyle}">
      <button style="${btnStyle}">Join Waitlist</button>
    </div>
    <div style="display:flex;justify-content:center;gap:24px;margin-top:20px">
      <span style="font-size:.72rem;color:${subCol}">&#10003; Free tier available</span>
      <span style="font-size:.72rem;color:${subCol}">&#10003; No credit card</span>
      <span style="font-size:.72rem;color:${subCol}">&#10003; Cancel anytime</span>
    </div>`;

  } else {
    // simple, dark, dark-full
    form = `<div style="display:flex;gap:10px;max-width:460px;margin:0 auto">
      <input type="email" placeholder="you@company.com" style="${inputStyle}">
      <button style="${btnStyle}">Join Waitlist</button>
    </div>`;
  }

  return `<div class="s-cta" style="background:${cfg.bg}">
    <div class="container">
      <span style="display:block;font-size:.72rem;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:${isDark?'#4dd8e6':'#94a3b8'};margin-bottom:1rem">Early Access</span>

      <p style="font-size:.95rem;color:${subCol};max-width:440px;margin:0 auto 2rem;line-height:1.7">Join the mailing list for Janus Beta access and ecosystem updates.</p>
      ${form}
      ${cfg.style !== 'social-proof' && cfg.style !== 'two-col' && cfg.style !== 'banner' ? `<p style="margin-top:1rem;font-size:.72rem;color:${subCol};opacity:.6">No spam. Unsubscribe anytime.</p>` : ''}

}
