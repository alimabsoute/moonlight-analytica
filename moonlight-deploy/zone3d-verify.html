<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>3D Zone Verification</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0c0e14;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:system-ui,sans-serif;color:#fff}
.container{width:700px;height:520px;position:relative;background:#0f1219;border-radius:16px;overflow:hidden;border:1px solid rgba(77,216,230,.15)}
.title{text-align:center;padding:16px;font-size:18px;font-weight:700;color:#4dd8e6}
.stage{position:absolute;top:60px;left:50%;width:90%;height:calc(100% - 80px);transform:translateX(-50%);perspective:1200px;perspective-origin:50% 35%}
.scene{position:absolute;inset:0;transform-style:preserve-3d;transform:rotateX(55deg) rotateZ(-12deg)}
.floor{position:absolute;left:50%;top:50%;width:420px;height:320px;transform:translate(-50%,-50%) translateZ(0);transform-style:preserve-3d}
.floor-grid{position:absolute;inset:0;background:rgba(20,24,36,.9);border:1px solid rgba(77,216,230,.12);border-radius:4px}
.floor-grid::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(77,216,230,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(77,216,230,.05) 1px,transparent 1px);background-size:30px 30px}

/* 3D Box */
.zbox{position:absolute;transform-style:preserve-3d}
.zface{position:absolute;backface-visibility:visible}

/* BOTTOM face - floor of the zone */
.zface--bot{width:100%;height:100%;transform:translateZ(0);border:1.5px solid var(--zc);background:var(--zc-bg)}

/* TOP face - ceiling, floating above */
.zface--top{width:100%;height:100%;transform:translateZ(var(--zh));background:var(--zc-top);border:1.5px solid var(--zc);border-radius:2px}

/* WALLS - fold up perpendicular from each edge */
.zface--front{width:100%;height:var(--zh);bottom:0;left:0;transform-origin:bottom;transform:rotateX(-90deg);background:linear-gradient(0deg,var(--zc-wall) 0%,var(--zc-wall2) 100%);border-left:1.5px solid var(--zc);border-right:1.5px solid var(--zc);border-top:1.5px solid var(--zc)}
.zface--back{width:100%;height:var(--zh);top:0;left:0;transform-origin:top;transform:rotateX(90deg);background:linear-gradient(0deg,var(--zc-wall) 0%,var(--zc-wall2) 100%);border-left:1.5px solid var(--zc);border-right:1.5px solid var(--zc);border-bottom:1.5px solid var(--zc)}
.zface--left{height:100%;width:var(--zh);top:0;left:0;transform-origin:left;transform:rotateY(90deg);background:linear-gradient(0deg,var(--zc-wall) 0%,var(--zc-wall2) 100%);border-top:1.5px solid var(--zc);border-bottom:1.5px solid var(--zc);border-right:1.5px solid var(--zc)}
.zface--right{height:100%;width:var(--zh);top:0;right:0;transform-origin:right;transform:rotateY(-90deg);background:linear-gradient(0deg,var(--zc-wall) 0%,var(--zc-wall2) 100%);border-top:1.5px solid var(--zc);border-bottom:1.5px solid var(--zc);border-left:1.5px solid var(--zc)}

.zbox__label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) translateZ(calc(var(--zh) + 2px)) rotateZ(12deg);font-size:12px;font-weight:600;color:var(--zc);text-shadow:0 0 6px var(--zc);white-space:nowrap}
</style>
</head><body>
<div class="container">
  <div class="title">Hotel Lobby — 3D Zone Enclosures</div>
  <div class="stage"><div class="scene"><div class="floor">
    <div class="floor-grid"></div>

    <!-- Front Desk zone -->
    <div class="zbox" style="left:20px;top:10px;width:160px;height:90px;--zc:#8b5cf6;--zh:58px;--zc-bg:#8b5cf618;--zc-top:#8b5cf638;--zc-wall:#8b5cf640;--zc-wall2:#8b5cf618">
      <div class="zface zface--bot"></div>
      <div class="zface zface--top"></div>
      <div class="zface zface--front"></div>
      <div class="zface zface--back"></div>
      <div class="zface zface--left"></div>
      <div class="zface zface--right"></div>
      <div class="zbox__label">Front Desk</div>
    </div>

    <!-- Lobby Lounge zone -->
    <div class="zbox" style="left:200px;top:10px;width:190px;height:170px;--zc:#4dd8e6;--zh:85px;--zc-bg:#4dd8e618;--zc-top:#4dd8e638;--zc-wall:#4dd8e640;--zc-wall2:#4dd8e618">
      <div class="zface zface--bot"></div>
      <div class="zface zface--top"></div>
      <div class="zface zface--front"></div>
      <div class="zface zface--back"></div>
      <div class="zface zface--left"></div>
      <div class="zface zface--right"></div>
      <div class="zbox__label">Lobby Lounge</div>
    </div>

    <!-- Elevator Bank zone -->
    <div class="zbox" style="left:30px;top:120px;width:120px;height:100px;--zc:#3b82f6;--zh:105px;--zc-bg:#3b82f618;--zc-top:#3b82f638;--zc-wall:#3b82f640;--zc-wall2:#3b82f618">
      <div class="zface zface--bot"></div>
      <div class="zface zface--top"></div>
      <div class="zface zface--front"></div>
      <div class="zface zface--back"></div>
      <div class="zface zface--left"></div>
      <div class="zface zface--right"></div>
      <div class="zbox__label">Elevator Bank</div>
    </div>

    <!-- Concierge zone -->
    <div class="zbox" style="left:30px;top:240px;width:150px;height:60px;--zc:#36d6b3;--zh:50px;--zc-bg:#36d6b318;--zc-top:#36d6b338;--zc-wall:#36d6b340;--zc-wall2:#36d6b318">
      <div class="zface zface--bot"></div>
      <div class="zface zface--top"></div>
      <div class="zface zface--front"></div>
      <div class="zface zface--back"></div>
      <div class="zface zface--left"></div>
      <div class="zface zface--right"></div>
      <div class="zbox__label">Concierge</div>
    </div>

  </div></div></div>
</div>
</body></html>
