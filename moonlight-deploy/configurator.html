<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moonlight Design Configurator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Instrument+Sans:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══ APP SHELL ═══ */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --app-bg:#111118;--app-surface:#1a1a24;--app-border:#2a2a3a;
  --app-text:#e0e0ec;--app-text2:#8888a0;--app-accent:#4dd8e6;
  --app-accent2:#36d6b3;--sidebar-w:280px;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Instrument Sans',sans-serif;background:var(--app-bg);color:var(--app-text)}

/* ── TOOLBAR ── */
.toolbar{
  height:52px;display:flex;align-items:center;padding:0 16px;gap:12px;
  background:var(--app-surface);border-bottom:1px solid var(--app-border);z-index:100;
}
.toolbar-brand{font-family:'Outfit',sans-serif;font-weight:700;font-size:1rem;color:var(--app-accent);white-space:nowrap;margin-right:auto}
.toolbar-brand span{color:var(--app-text2);font-weight:400;font-size:.8rem;margin-left:8px}
.btn-group{display:flex;background:var(--app-bg);border-radius:8px;overflow:hidden;border:1px solid var(--app-border)}
.btn-group button{
  padding:6px 14px;background:none;border:none;color:var(--app-text2);
  font-size:.78rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit
}
.btn-group button.active{background:var(--app-accent);color:#0a0f1a}
.btn-group button:hover:not(.active){color:var(--app-text)}
.tool-btn{
  padding:6px 14px;background:var(--app-bg);border:1px solid var(--app-border);
  border-radius:8px;color:var(--app-text2);font-size:.78rem;font-weight:600;
  cursor:pointer;transition:all .2s;font-family:inherit;white-space:nowrap
}
.tool-btn:hover{border-color:var(--app-accent);color:var(--app-accent)}
.tool-btn.active{background:var(--app-accent);color:#0a0f1a;border-color:var(--app-accent)}
.saved-count{
  display:inline-flex;align-items:center;justify-content:center;
  background:var(--app-accent);color:#0a0f1a;border-radius:10px;
  min-width:18px;height:18px;font-size:.65rem;font-weight:700;margin-left:4px;padding:0 4px
}

/* ── WORKSPACE ── */
.workspace{display:flex;height:calc(100vh - 52px)}
.sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--app-surface);
  border-right:1px solid var(--app-border);display:flex;flex-direction:column;overflow:hidden
}
.section-tabs{display:flex;flex-direction:column;padding:12px;gap:4px}
.section-tab{
  padding:10px 14px;background:none;border:none;border-radius:8px;
  color:var(--app-text2);font-size:.82rem;font-weight:600;cursor:pointer;
  text-align:left;transition:all .2s;font-family:inherit;display:flex;align-items:center;gap:8px
}
.section-tab:hover{background:rgba(77,216,230,.06);color:var(--app-text)}
.section-tab.active{background:rgba(77,216,230,.1);color:var(--app-accent)}
.section-tab .tab-num{
  width:22px;height:22px;border-radius:6px;display:flex;align-items:center;justify-content:center;
  font-size:.65rem;font-weight:700;background:var(--app-bg);color:var(--app-text2);flex-shrink:0
}
.section-tab.active .tab-num{background:var(--app-accent);color:#0a0f1a}
.sidebar-divider{height:1px;background:var(--app-border);margin:4px 12px}

/* ── SIDEBAR CONFIG PANELS (Configurator mode) ── */
.config-panels{flex:1;overflow-y:auto;padding:12px;display:none}
.config-panels.visible{display:block}
.config-section{display:none}
.config-section.visible{display:block}
.config-group{margin-bottom:16px}
.config-group label{display:block;font-size:.72rem;font-weight:600;color:var(--app-text2);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
.config-select{
  width:100%;padding:8px 12px;background:var(--app-bg);border:1px solid var(--app-border);
  border-radius:8px;color:var(--app-text);font-size:.82rem;font-family:inherit;cursor:pointer;outline:none
}
.config-select:focus{border-color:var(--app-accent)}

/* Thumbnail strip in configurator sidebar */
.thumb-strip{display:flex;gap:6px;flex-wrap:wrap}
.thumb-item{
  width:52px;height:36px;border-radius:6px;border:2px solid var(--app-border);
  cursor:pointer;overflow:hidden;transition:all .2s;position:relative;background:var(--app-bg)
}
.thumb-item:hover{border-color:var(--app-text2)}
.thumb-item.selected{border-color:var(--app-accent);box-shadow:0 0 8px rgba(77,216,230,.3)}
.thumb-item .thumb-label{
  position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.7);
  font-size:.5rem;text-align:center;padding:1px 2px;color:#fff
}

/* ── MAIN PANEL ── */
.main-panel{flex:1;overflow:hidden;display:flex;flex-direction:column;position:relative}
.panel-header{
  padding:12px 20px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--app-border);background:var(--app-surface);min-height:44px
}
.panel-title{font-size:.85rem;font-weight:600;color:var(--app-text)}
.panel-subtitle{font-size:.72rem;color:var(--app-text2);margin-left:8px}
.panel-actions{display:flex;gap:6px}

/* ── GALLERY VIEW ── */
.gallery-view{flex:1;overflow-y:auto;padding:20px}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px}
.gallery-card{
  border-radius:12px;border:1px solid var(--app-border);overflow:hidden;
  background:var(--app-surface);cursor:pointer;transition:all .3s;position:relative
}
.gallery-card:hover{border-color:var(--app-accent);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.gallery-card.recommended{border-color:var(--app-accent2)}
.gallery-card.recommended::after{
  content:'★ Recommended';position:absolute;top:8px;right:8px;
  background:var(--app-accent2);color:#0a0f1a;font-size:.6rem;font-weight:700;
  padding:2px 8px;border-radius:4px;letter-spacing:.5px;text-transform:uppercase
}
.card-preview{
  height:180px;overflow:hidden;position:relative;
  display:flex;align-items:center;justify-content:center
}
.card-preview.dark-bg{background:#06080d}
.card-preview.light-bg{background:#fafafa}
.card-info{padding:14px 16px;border-top:1px solid var(--app-border)}
.card-id{font-size:.65rem;font-weight:700;color:var(--app-accent);margin-bottom:2px}
.card-name{font-size:.88rem;font-weight:600;color:var(--app-text);margin-bottom:4px}
.card-desc{font-size:.75rem;color:var(--app-text2);line-height:1.5}

/* Sub-tab bar for Hero section */
.sub-tabs{display:flex;gap:2px;padding:0 20px;background:var(--app-surface);border-bottom:1px solid var(--app-border)}
.sub-tab{
  padding:8px 16px;background:none;border:none;border-bottom:2px solid transparent;
  color:var(--app-text2);font-size:.78rem;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit
}
.sub-tab:hover{color:var(--app-text)}
.sub-tab.active{color:var(--app-accent);border-bottom-color:var(--app-accent)}

/* ── PREVIEW VIEW (Configurator mode) ── */
.preview-view{flex:1;overflow:auto;display:none;background:#1e1e2a;padding:20px}
.preview-view.visible{display:flex}
.preview-container{
  margin:0 auto;background:#fff;border-radius:12px;overflow:hidden;
  box-shadow:0 0 40px rgba(0,0,0,.4);transition:width .4s ease;position:relative
}
.preview-container.desktop{width:1200px;max-width:100%}
.preview-container.mobile{width:375px}
.preview-page{width:100%}

/* ── COMPARE MODE ── */
.compare-wrapper{display:none;flex:1;overflow:auto;padding:20px;gap:20px}
.compare-wrapper.visible{display:flex}
.compare-wrapper .preview-container{flex:1;min-width:0}
.compare-label{
  text-align:center;padding:8px;font-size:.72rem;font-weight:700;
  color:var(--app-accent);letter-spacing:1px;text-transform:uppercase
}

/* ── MODAL ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;
  display:none;align-items:center;justify-content:center;padding:40px
}
.modal-overlay.visible{display:flex}
.modal-content{
  background:var(--app-surface);border-radius:16px;max-width:1200px;width:100%;
  max-height:90vh;overflow:auto;border:1px solid var(--app-border);position:relative
}
.modal-close{
  position:sticky;top:12px;float:right;margin:12px;width:32px;height:32px;
  border-radius:8px;background:var(--app-bg);border:1px solid var(--app-border);
  color:var(--app-text);cursor:pointer;font-size:1.1rem;display:flex;
  align-items:center;justify-content:center;z-index:10
}
.modal-close:hover{background:var(--app-accent);color:#0a0f1a}
.modal-preview{padding:20px;min-height:300px}
.modal-info{padding:20px;border-top:1px solid var(--app-border)}
.modal-info h3{font-family:'Outfit',sans-serif;font-size:1.2rem;margin-bottom:8px}
.modal-info p{font-size:.88rem;color:var(--app-text2);line-height:1.6}

/* ── SAVED COMBOS MODAL ── */
.saved-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px;padding:20px}
.saved-card{
  border-radius:10px;border:1px solid var(--app-border);padding:16px;
  background:var(--app-bg);cursor:pointer;transition:all .2s
}
.saved-card:hover{border-color:var(--app-accent)}
.saved-card h4{font-size:.88rem;margin-bottom:6px}
.saved-card p{font-size:.72rem;color:var(--app-text2)}
.saved-card .saved-actions{display:flex;gap:6px;margin-top:10px}
.saved-card .saved-actions button{
  padding:4px 10px;border-radius:6px;border:1px solid var(--app-border);
  background:none;color:var(--app-text2);font-size:.7rem;cursor:pointer;font-family:inherit
}
.saved-card .saved-actions button:hover{border-color:var(--app-accent);color:var(--app-accent)}
.saved-card .saved-actions button.delete:hover{border-color:#e24d4d;color:#e24d4d}

/* ═══ SECTION BASE STYLES (for rendering in preview) ═══ */
/* These are the base styles shared by all section variations */
.s-hero{
  position:relative;min-height:500px;display:flex;align-items:center;justify-content:center;
  overflow:hidden;background:#06080d;font-family:'Outfit',sans-serif
}
.s-hero .video-bg{position:absolute;inset:0;background:#06080d}
.s-hero .video-bg video{width:100%;height:100%;object-fit:cover;filter:saturate(1.3) brightness(1.05)}
.s-hero .overlay{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(6,8,13,.10) 0%,rgba(6,8,13,.05) 40%,rgba(6,8,13,.35) 75%,rgba(6,8,13,.85) 100%)
}
.s-hero .hero-inner{position:relative;z-index:10;text-align:center;max-width:860px;padding:0 24px}
.s-hero .tag{
  display:inline-flex;align-items:center;gap:8px;padding:5px 16px;border-radius:100px;
  border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);
  color:rgba(255,255,255,.8);font-size:.75rem;font-weight:600;letter-spacing:1.8px;
  text-transform:uppercase;margin-bottom:2rem;backdrop-filter:blur(10px)
}
.s-hero .tag-dot{width:6px;height:6px;border-radius:50%;background:#4dd8e6;box-shadow:0 0 8px #4dd8e6;animation:s-blink 2.5s ease-in-out infinite}
@keyframes s-blink{0%,100%{opacity:1}50%{opacity:.3}}
.s-hero h1{
  font-size:clamp(2.2rem,5vw,4rem);font-weight:800;line-height:1.08;color:#fff;
  letter-spacing:-2px;margin-bottom:1.2rem;text-shadow:0 4px 30px rgba(0,0,0,.6)
}
.s-hero .sub{
  font-family:'Instrument Sans',sans-serif;font-size:clamp(.95rem,1.8vw,1.15rem);
  color:#c8dcea;max-width:600px;margin:0 auto 2rem;line-height:1.75;text-shadow:0 2px 16px rgba(0,0,0,.55)
}

/* Hero button base */
.hero-btn{
  display:inline-flex;align-items:center;gap:10px;padding:14px 32px;
  font-family:'Outfit',sans-serif;font-size:.95rem;font-weight:600;
  border-radius:60px;text-decoration:none;cursor:pointer;transition:all .35s cubic-bezier(.16,1,.3,1);
  border:none;color:#fff
}
.hero-btn svg{width:18px;height:18px}

/* ── 20 HERO BUTTON STYLES ── */
.btn-1{background:transparent;border:1px solid #4dd8e6;color:#fff;box-shadow:0 0 20px rgba(77,216,230,.12)}
.btn-1:hover{background:rgba(77,216,230,.12);box-shadow:0 0 30px rgba(77,216,230,.25)}
.btn-2{background:transparent;border:2px solid transparent;background-image:linear-gradient(#06080d,#06080d),linear-gradient(135deg,#4dd8e6,#36d6b3);background-origin:border-box;background-clip:padding-box,border-box;color:#fff}
.btn-2:hover{box-shadow:0 0 20px rgba(77,216,230,.2)}
.btn-3{background:rgba(255,255,255,.1);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.2);color:#fff}
.btn-3:hover{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.3)}
.btn-4{background:none;border:none;color:#fff;padding:14px 8px;border-bottom:2px solid #4dd8e6;border-radius:0}
.btn-4:hover{border-bottom-color:#fff;color:#4dd8e6}
.btn-5-wrap{display:inline-flex;gap:12px;align-items:center}
.btn-5a{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;background:transparent;border:1px solid rgba(255,255,255,.2);border-radius:60px;color:#fff;font-family:'Outfit',sans-serif;font-size:.88rem;font-weight:500;text-decoration:none;cursor:pointer;transition:all .3s}
.btn-5a:hover{border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.05)}
.btn-5b{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;background:#4dd8e6;border:none;border-radius:60px;color:#0a0f1a;font-family:'Outfit',sans-serif;font-size:.88rem;font-weight:600;text-decoration:none;cursor:pointer;transition:all .3s}
.btn-5b:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(77,216,230,.3)}
.btn-6{background:#4dd8e6;color:#0a0f1a;font-weight:700;border:none}
.btn-6:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(77,216,230,.35)}
.btn-7{background:#fff;color:#0a0f1a;font-weight:700;border:none}
.btn-7:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(255,255,255,.2)}
.btn-8{background:linear-gradient(135deg,#4dd8e6,#36d6b3);color:#fff;font-weight:600;border:none}
.btn-8:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(54,214,179,.3)}
.btn-9{background:none;border:none;color:#fff;padding:14px 4px;border-radius:0;position:relative}
.btn-9::after{content:'';position:absolute;bottom:8px;left:0;width:0;height:2px;background:#4dd8e6;transition:width .4s ease}
.btn-9:hover::after{width:100%}
.btn-10{background:transparent;border:1.5px solid rgba(255,255,255,.25);color:#fff}
.btn-10:hover{border-color:#4dd8e6;background:rgba(77,216,230,.06)}
.btn-11{background:#1a1a2e;color:#fff;border:1px solid rgba(255,255,255,.08);box-shadow:0 4px 16px rgba(0,0,0,.4)}
.btn-11:hover{background:#22223a;border-color:rgba(255,255,255,.15)}
.btn-12{background:#fff;color:#0a0f1a;font-weight:700;border:none;transition:transform .15s ease}
.btn-13{background:transparent;border:1px solid rgba(255,255,255,.2);color:#fff;padding:14px 20px;overflow:hidden;max-width:160px;transition:max-width .4s ease,padding .4s ease}
.btn-13:hover{max-width:300px;padding:14px 32px}
.btn-14-wrap{display:inline-flex;border-radius:60px;overflow:hidden}
.btn-14a{padding:14px 18px;background:rgba(77,216,230,.15);color:#4dd8e6;border:none;cursor:pointer;display:flex;align-items:center}
.btn-14a svg{width:18px;height:18px}
.btn-14b{padding:14px 24px;background:#fff;color:#0a0f1a;border:none;font-family:'Outfit',sans-serif;font-size:.88rem;font-weight:600;cursor:pointer}
.btn-15{background:#fff;color:#0a0f1a;font-weight:700;border:none;position:relative;overflow:hidden}
.btn-15::before{content:'';position:absolute;top:0;left:-100%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(77,216,230,.3),transparent);animation:s-shimmer 2.5s ease-in-out infinite}
@keyframes s-shimmer{0%{left:-100%}100%{left:200%}}
.btn-16{background:#fff;color:#0a0f1a;font-weight:700;border:none;border-radius:8px 60px 60px 8px;clip-path:polygon(8px 0,100% 0,100% 100%,0 100%,0 8px)}
.btn-17{background:none;border:none;color:#fff;display:inline-flex;align-items:center;gap:10px;padding:14px 8px;border-radius:0}
.btn-17 .pulse-dot{width:8px;height:8px;border-radius:50%;background:#4dd8e6;box-shadow:0 0 8px #4dd8e6;animation:s-blink 2s ease-in-out infinite}
.btn-18{background:transparent;border:1.5px solid #4dd8e6;color:#fff;transition:all .35s ease}
.btn-18:hover{background:#4dd8e6;color:#0a0f1a}
.btn-19-wrap{display:inline-flex;flex-direction:column;align-items:center;gap:8px}
.btn-19a{display:inline-flex;align-items:center;gap:10px;padding:14px 32px;background:#4dd8e6;color:#0a0f1a;font-family:'Outfit',sans-serif;font-size:.95rem;font-weight:700;border:none;border-radius:60px;cursor:pointer;transition:all .3s}
.btn-19a:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(77,216,230,.3)}
.btn-19b{font-size:.78rem;color:rgba(255,255,255,.5);font-family:'Instrument Sans',sans-serif;cursor:pointer;text-decoration:none;border:none;background:none}
.btn-19b:hover{color:#fff}
.btn-20{display:inline-flex;align-items:center;gap:8px;padding:8px 20px;background:rgba(77,216,230,.12);border:1px solid rgba(77,216,230,.3);border-radius:100px;color:#4dd8e6;font-size:.82rem;font-weight:600}
.btn-20:hover{background:rgba(77,216,230,.2);border-color:#4dd8e6}

/* ── SECTION STYLES (Janus, Caps, Eco, CTA base) ── */
.s-janus{padding:100px 24px;font-family:'Outfit',sans-serif}
.s-janus .container{max-width:1160px;margin:0 auto}
.s-caps{padding:100px 24px;font-family:'Outfit',sans-serif}
.s-caps .container{max-width:1160px;margin:0 auto}
.s-eco{padding:100px 24px;font-family:'Outfit',sans-serif}
.s-eco .container{max-width:1160px;margin:0 auto}
.s-cta{padding:100px 24px;font-family:'Outfit',sans-serif}
.s-cta .container{max-width:640px;margin:0 auto;text-align:center}

/* Empty state */
.empty-state{display:flex;align-items:center;justify-content:center;height:200px;color:var(--app-text2);font-size:.88rem}

/* ═══ DASHBOARD MOCKUP STYLES ═══ */

/* Floating KPI metric cards — heavy, weighty feel */
.float-metrics{position:absolute;inset:-15px;pointer-events:none;z-index:5}
.float-card{
  position:absolute;background:#fff;border-radius:14px;padding:14px 18px;
  box-shadow:0 2px 4px rgba(0,0,0,.04),0 8px 20px rgba(0,0,0,.08),0 24px 48px rgba(0,0,0,.10),0 48px 80px rgba(0,0,0,.04);
  border:1px solid rgba(0,0,0,.06);
  animation:floatBob 4s ease-in-out infinite;font-family:'Outfit',sans-serif;
  backdrop-filter:blur(8px);transition:transform .3s ease,box-shadow .3s ease;cursor:default;pointer-events:auto;
  min-width:140px
}
.float-card:hover{transform:translateY(-10px) scale(1.04)!important;box-shadow:0 4px 8px rgba(0,0,0,.06),0 16px 32px rgba(0,0,0,.12),0 32px 64px rgba(0,0,0,.12)}
.float-card .fc-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.8rem;margin-bottom:6px}
.float-card .fc-label{font-size:.62rem;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:#94a3b8;margin-bottom:3px}
.float-card .fc-value{font-size:1.5rem;font-weight:800;color:#111827;line-height:1.1;letter-spacing:-.5px}
.float-card .fc-change{font-size:.68rem;font-weight:600;margin-top:4px;display:inline-flex;align-items:center;gap:4px}
.float-card .fc-spark{display:flex;align-items:flex-end;gap:2px;margin-top:6px;height:20px}
.float-card .fc-spark span{width:3px;border-radius:1px;background:#4dd8e6;opacity:.5}
.fc-up{color:#22c55e}
.fc-down{color:#ef4444}
@keyframes floatBob{0%,100%{transform:translateY(0) rotate(0deg)}25%{transform:translateY(-8px) rotate(.3deg)}50%{transform:translateY(-4px) rotate(0deg)}75%{transform:translateY(-10px) rotate(-.3deg)}}

/* Dashboard widget shapes for Janus section */
.dash-widget{
  background:#fff;border-radius:14px;padding:16px;
  box-shadow:0 2px 4px rgba(0,0,0,.03),0 8px 24px rgba(0,0,0,.06),0 32px 64px rgba(0,0,0,.06);
  border:1px solid rgba(0,0,0,.05);font-family:'Outfit',sans-serif;
  transform:perspective(600px) rotateY(-1deg) rotateX(1deg);
  transition:transform .4s ease,box-shadow .4s ease
}

.anim-spark svg{overflow:visible}
.anim-spark path{stroke-dasharray:200;animation:sparkDraw 2s ease-out forwards}

.zone-floor{
  position:absolute;left:50%;top:50%;width:260px;height:200px;

}
.zone-poly{
  position:absolute;border:2px solid;border-radius:2px;
  animation:zoneAppear .8s ease-out forwards;opacity:0;transform-style:preserve-3d
}
@keyframes zoneAppear{0%{opacity:0;transform:translateZ(0) scale(.8)}100%{opacity:1;transform:translateZ(var(--z)) scale(1)}}
.zone-poly .zone-tag{
  position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);

.zone-vertex{
  position:absolute;width:6px;height:6px;border-radius:50%;background:#fff;border:2px solid;
  transform:translate(-50%,-50%);z-index:2
}

/* ═══════════════════════════════════════════════════
   APP STATE & LOGIC
   ═══════════════════════════════════════════════════ */

const state = {
  mode: 'gallery',          // 'gallery' | 'configurator'
  device: 'desktop',        // 'desktop' | 'mobile'
  section: 'hero',          // current section tab
  heroSub: 'buttons',       // hero sub-tab
  compare: false,
  // Current selections (for configurator mode)
  sel: {
    heroBtn: 5, heroH1: 4, heroSub: 4,
    janus: 1, caps: 1, eco: 1, ecoName: 1, cta: 1
  },
  // Compare selections
  selB: {
    heroBtn: 7, heroH1: 10, heroSub: 1,
    janus: 2, caps: 2, eco: 2, ecoName: 9, cta: 2
  }
};

// DOM refs
const $ = id => document.getElementById(id);
const galleryView = $('galleryView');
const galleryGrid = $('galleryGrid');
const previewView = $('previewView');
const compareView = $('compareView');
const heroSubTabs = $('heroSubTabs');
const configPanels = $('configPanels');
const previewPage = $('previewPage');
const previewContainer = $('previewContainer');
const modal = $('modal');
const modalPreview = $('modalPreview');
const modalInfo = $('modalInfo');
const savedModal = $('savedModal');

// ── MODE SWITCHING ──
function setMode(mode) {
  state.mode = mode;
  document.querySelectorAll('#modeSwitch button').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  galleryView.style.display = mode === 'gallery' ? 'block' : 'none';
  previewView.classList.toggle('visible', mode === 'configurator' && !state.compare);
  compareView.classList.toggle('visible', mode === 'configurator' && state.compare);
  heroSubTabs.style.display = mode === 'gallery' && state.section === 'hero' ? 'flex' : 'none';
  configPanels.classList.toggle('visible', mode === 'configurator');
  if (mode === 'gallery') renderGallery();
  else renderPreview();
}

// ── DEVICE TOGGLE ──
function setDevice(device) {
  state.device = device;
  document.querySelectorAll('#deviceSwitch button').forEach(b => b.classList.toggle('active', b.dataset.device === device));
  document.querySelectorAll('.preview-container').forEach(c => {
    c.classList.toggle('desktop', device === 'desktop');
    c.classList.toggle('mobile', device === 'mobile');
  });
}

// ── SECTION TAB SWITCHING ──
function setSection(section) {
  state.section = section;
  document.querySelectorAll('.section-tab').forEach(t => t.classList.toggle('active', t.dataset.section === section));
  heroSubTabs.style.display = state.mode === 'gallery' && section === 'hero' ? 'flex' : 'none';
  // Config panels
  document.querySelectorAll('.config-section').forEach(p => p.classList.toggle('visible', p.dataset.for === section));
  if (state.mode === 'gallery') renderGallery();
}

// ── HERO SUB-TAB ──
function setHeroSub(sub) {
  state.heroSub = sub;
  document.querySelectorAll('.sub-tab').forEach(t => t.classList.toggle('active', t.dataset.sub === sub));
  renderGallery();
}

// ── GALLERY RENDERING ──
function renderGallery() {
  galleryGrid.innerHTML = '';
  const sec = state.section;

  if (sec === 'hero') {
    const sub = state.heroSub;
    if (sub === 'buttons') {
      HERO_BUTTONS.forEach(btn => {
        galleryGrid.innerHTML += galleryCard(btn, 'dark-bg', btn.html);
      });
    } else if (sub === 'headlines') {
      HERO_HEADLINES.forEach(h => {
        galleryGrid.innerHTML += galleryCard(h, 'dark-bg',
          `<h1 style="font-family:'Outfit',sans-serif;font-size:1.4rem;font-weight:800;color:#fff;letter-spacing:-1px;text-align:center;padding:16px">${h.text}</h1>`);
      });
    } else {
      HERO_SUBS.forEach(s => {
        galleryGrid.innerHTML += galleryCard(s, 'dark-bg',
          `<p style="font-family:'Instrument Sans',sans-serif;font-size:.82rem;color:#c8dcea;text-align:center;padding:16px;line-height:1.6">${s.text}</p>`);
      });
    }
  } else {
    const vars = sec === 'janus' ? JANUS_VARS : sec === 'capabilities' ? CAPS_VARS : sec === 'ecosystem' ? ECO_VARS : CTA_VARS;
    vars.forEach(v => {
      const isDark = v.bg && (v.bg.includes('06080d') || v.bg.includes('0a0f1a'));
      galleryGrid.innerHTML += galleryCard(v, isDark ? 'dark-bg' : 'light-bg',
        `<div style="transform:scale(0.35);transform-origin:top left;width:285%;pointer-events:none">${renderSection(sec, v)}</div>`);
    });
  }
}

function galleryCard(item, bgClass, previewHtml) {
  return `<div class="gallery-card${item.rec ? ' recommended' : ''}" onclick="openModal('${state.section}',${item.id})">
    <div class="card-preview ${bgClass}">${previewHtml}</div>
    <div class="card-info">
      <div class="card-id">#${item.id}</div>
      <div class="card-name">${item.name || item.text?.slice(0,40)+'...' || ''}</div>
      <div class="card-desc">${item.desc || ''}</div>
    </div>
  </div>`;
}

function renderSection(sec, cfg) {
  if (sec === 'janus') return renderJanus(cfg);
  if (sec === 'capabilities') return renderCaps(cfg);
  if (sec === 'ecosystem') return renderEco(cfg, ECO_NAMES[0].name);
  if (sec === 'cta') return renderCTA(cfg);
  return '';
}

// ── PREVIEW RENDERING (Configurator mode) ──
function renderPreview(target) {
  const s = state.sel;
  const page = target || previewPage;
  const btn = HERO_BUTTONS.find(b=>b.id===s.heroBtn) || HERO_BUTTONS[0];
  const h1 = HERO_HEADLINES.find(h=>h.id===s.heroH1) || HERO_HEADLINES[0];
  const sub = HERO_SUBS.find(su=>su.id===s.heroSub) || HERO_SUBS[0];
  const janus = JANUS_VARS.find(j=>j.id===s.janus) || JANUS_VARS[0];
  const caps = CAPS_VARS.find(c=>c.id===s.caps) || CAPS_VARS[0];
  const eco = ECO_VARS.find(e=>e.id===s.eco) || ECO_VARS[0];
  const ecoName = ECO_NAMES.find(n=>n.id===s.ecoName) || ECO_NAMES[0];
  const cta = CTA_VARS.find(c=>c.id===s.cta) || CTA_VARS[0];

  page.innerHTML = renderHero(btn, h1, sub) + renderJanus(janus) + renderCaps(caps) + renderEco(eco, ecoName.name) + renderCTA(cta);
}

function renderPreviewB() {
  const savedSel = state.sel;
  state.sel = state.selB;
  renderPreview($('compareB'));
  state.sel = savedSel;
}

// ── MODAL ──
function openModal(section, id) {
  let item, previewHtml = '';
  if (section === 'hero') {
    const sub = state.heroSub;
    if (sub === 'buttons') {
      item = HERO_BUTTONS.find(b=>b.id===id);
      previewHtml = `<div style="background:#06080d;padding:60px;display:flex;justify-content:center">${item.html}</div>`;
    } else if (sub === 'headlines') {
      item = HERO_HEADLINES.find(h=>h.id===id);
      previewHtml = `<div style="background:#06080d;padding:40px"><h1 style="font-family:'Outfit',sans-serif;font-size:2.5rem;font-weight:800;color:#fff;letter-spacing:-2px;text-align:center">${item.text}</h1></div>`;
    } else {
      item = HERO_SUBS.find(s=>s.id===id);
      previewHtml = `<div style="background:#06080d;padding:40px"><p style="font-family:'Instrument Sans',sans-serif;font-size:1.1rem;color:#c8dcea;text-align:center;line-height:1.7;max-width:600px;margin:0 auto">${item.text}</p></div>`;
    }
  } else {
    const vars = section === 'janus' ? JANUS_VARS : section === 'capabilities' ? CAPS_VARS : section === 'ecosystem' ? ECO_VARS : CTA_VARS;
    item = vars.find(v=>v.id===id);
    previewHtml = renderSection(section, item);
  }

  modalPreview.innerHTML = previewHtml;
  modalInfo.innerHTML = `<h3>#${item.id} — ${item.name || ''}</h3><p>${item.desc || item.text || ''}</p>`;
  modal.classList.add('visible');
}

// ── SAVE / LOAD COMBOS ──
function getSaved() { return JSON.parse(localStorage.getItem('ml-combos') || '[]'); }
function saveCombos(combos) { localStorage.setItem('ml-combos', JSON.stringify(combos)); updateSavedCount(); }
function updateSavedCount() { $('savedCount').textContent = getSaved().length; }

function saveCombo() {
  const combos = getSaved();
  const s = state.sel;
  combos.push({
    id: Date.now(),
    name: `Combo ${combos.length + 1}`,
    date: new Date().toLocaleDateString(),
    sel: {...s},
    code: `H-btn${s.heroBtn} H1-${s.heroH1} Sub${s.heroSub} J${s.janus} C${s.caps} E${s.eco} EN${s.ecoName} CTA${s.cta}`
  });
  saveCombos(combos);
  alert('Combo saved!');
}

function showSaved() {
  const combos = getSaved();
  const grid = $('savedGrid');
  grid.innerHTML = combos.length === 0 ? '<p style="color:var(--app-text2);padding:20px">No saved combinations yet.</p>' :
    combos.map(c => `<div class="saved-card">
      <h4>${c.name}</h4>
      <p>${c.code}</p>
      <p>${c.date}</p>
      <div class="saved-actions">
        <button onclick="loadCombo(${c.id})">Load</button>
        <button class="delete" onclick="deleteCombo(${c.id})">Delete</button>
      </div>
    </div>`).join('');
  savedModal.classList.add('visible');
}

function loadCombo(id) {
  const combo = getSaved().find(c=>c.id===id);
  if (combo) { state.sel = {...combo.sel}; populateSelectors(); renderPreview(); savedModal.classList.remove('visible'); setMode('configurator'); }
}

function deleteCombo(id) {
  saveCombos(getSaved().filter(c=>c.id!==id));
  showSaved();
}

// ── RANDOMIZE ──
function randomize() {
  const rnd = arr => arr[Math.floor(Math.random()*arr.length)];
  state.sel = {
    heroBtn: rnd(HERO_BUTTONS).id, heroH1: rnd(HERO_HEADLINES).id, heroSub: rnd(HERO_SUBS).id,
    janus: rnd(JANUS_VARS).id, caps: rnd(CAPS_VARS).id, eco: rnd(ECO_VARS).id,
    ecoName: rnd(ECO_NAMES).id, cta: rnd(CTA_VARS).id
  };
  populateSelectors();
  if (state.mode === 'configurator') renderPreview();
}

// ── COMPARE MODE ──
function toggleCompare() {
  state.compare = !state.compare;
  $('compareBtn').classList.toggle('active', state.compare);
  if (state.mode === 'configurator') {
    previewView.classList.toggle('visible', !state.compare);
    compareView.classList.toggle('visible', state.compare);
    if (state.compare) { renderPreview($('compareA')); renderPreviewB(); }
  }
}

// ── EXPORT HTML ──
function exportHTML() {
  const s = state.sel;
  const btn = HERO_BUTTONS.find(b=>b.id===s.heroBtn);
  const h1 = HERO_HEADLINES.find(h=>h.id===s.heroH1);
  const sub = HERO_SUBS.find(su=>su.id===s.heroSub);
  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Moonlight Analytica</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Instrument Sans',sans-serif;background:#06080d;color:#edf0f7}
${document.querySelector('style').textContent.match(/\/\* ── 20 HERO.*?(?=\/\* ──(?! 20))/s)?.[0] || ''}
</style></head><body>${previewPage.innerHTML}</body></html>`;
  const blob = new Blob([html], {type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'moonlight-combo-export.html';
  a.click();
}

// ── POPULATE SELECTORS ──
function populateSelectors() {
  const opt = (arr, sel) => arr.map(i => `<option value="${i.id}" ${i.id===sel?'selected':''}>${i.id}. ${i.name||i.text?.slice(0,50)||''}</option>`).join('');
  $('selHeroBtn').innerHTML = opt(HERO_BUTTONS, state.sel.heroBtn);
  $('selHeroH1').innerHTML = opt(HERO_HEADLINES, state.sel.heroH1);
  $('selHeroSub').innerHTML = opt(HERO_SUBS, state.sel.heroSub);
  $('selJanus').innerHTML = opt(JANUS_VARS, state.sel.janus);
  $('selCaps').innerHTML = opt(CAPS_VARS, state.sel.caps);
  $('selEco').innerHTML = opt(ECO_VARS, state.sel.eco);
  $('selEcoName').innerHTML = opt(ECO_NAMES, state.sel.ecoName);
  $('selCta').innerHTML = opt(CTA_VARS, state.sel.cta);
}

// ── EVENT LISTENERS ──
function init() {
  // Mode switch
  document.querySelectorAll('#modeSwitch button').forEach(b => b.addEventListener('click', () => setMode(b.dataset.mode)));
  // Device switch
  document.querySelectorAll('#deviceSwitch button').forEach(b => b.addEventListener('click', () => setDevice(b.dataset.device)));
  // Section tabs
  document.querySelectorAll('.section-tab').forEach(t => t.addEventListener('click', () => setSection(t.dataset.section)));
  // Hero sub-tabs
  document.querySelectorAll('.sub-tab').forEach(t => t.addEventListener('click', () => setHeroSub(t.dataset.sub)));
  // Toolbar buttons
  $('compareBtn').addEventListener('click', toggleCompare);
  $('randomBtn').addEventListener('click', randomize);
  $('saveBtn').addEventListener('click', saveCombo);
  $('savedBtn').addEventListener('click', showSaved);
  $('exportBtn').addEventListener('click', exportHTML);
  // Modals
  $('modalClose').addEventListener('click', () => modal.classList.remove('visible'));
  $('savedModalClose').addEventListener('click', () => savedModal.classList.remove('visible'));
  modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('visible'); });
  savedModal.addEventListener('click', e => { if (e.target === savedModal) savedModal.classList.remove('visible'); });
  // Config selectors
  $('selHeroBtn').addEventListener('change', e => { state.sel.heroBtn = +e.target.value; renderPreview(); });
  $('selHeroH1').addEventListener('change', e => { state.sel.heroH1 = +e.target.value; renderPreview(); });
  $('selHeroSub').addEventListener('change', e => { state.sel.heroSub = +e.target.value; renderPreview(); });
  $('selJanus').addEventListener('change', e => { state.sel.janus = +e.target.value; renderPreview(); });
  $('selCaps').addEventListener('change', e => { state.sel.caps = +e.target.value; renderPreview(); });
  $('selEco').addEventListener('change', e => { state.sel.eco = +e.target.value; renderPreview(); });
  $('selEcoName').addEventListener('change', e => { state.sel.ecoName = +e.target.value; renderPreview(); });
  $('selCta').addEventListener('change', e => { state.sel.cta = +e.target.value; renderPreview(); });

  // Init
  populateSelectors();
  updateSavedCount();
  renderGallery();
}

init();
</script>
</body>
</html>
